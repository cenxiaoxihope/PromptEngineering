</span>(<span <span class=\"keyword\">class</span>=\"string\">\"手机号: \"</span> + <span class=\"func\">maskPhone</span>(phone));\n        scanner.<span class=\"func\">close</span>();\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">boolean</span> <span class=\"func\">isValidUsername</span>(<span class=\"keyword\">String</span> username) {\n        <span class=\"keyword\">if</span> (username.<span class=\"func\">length</span>() &lt; <span <span class=\"keyword\">class</span>=\"number\">3</span> || username.<span class=\"func\">length</span>() &gt; <span <span class=\"keyword\">class</span>=\"number\">20</span>) <span class=\"keyword\">return</span> <span class=\"keyword\">false</span>;\n        <span class=\"keyword\">return</span> username.<span class=\"func\">matches</span>(<span <span class=\"keyword\">class</span>=\"string\">\"^[a-zA-Z0-<span <span class=\"keyword\">class</span>=\"number\">9</span>]+$\"</span>);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">boolean</span> <span class=\"func\">isValidPhone</span>(<span class=\"keyword\">String</span> phone) {\n        <span class=\"keyword\">return</span> phone.<span class=\"func\">matches</span>(<span <span class=\"keyword\">class</span>=\"string\">\"^<span <span class=\"keyword\">class</span>=\"number\">1</span>[<span <span class=\"keyword\">class</span>=\"number\">3</span>-<span <span class=\"keyword\">class</span>=\"number\">9</span>]\\\\d{<span <span class=\"keyword\">class</span>=\"number\">9</span>}$\"</span>);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">String</span> <span class=\"func\">maskPhone</span>(<span class=\"keyword\">String</span> phone) {\n        <span class=\"keyword\">return</span> phone.<span class=\"func\">substring</span>(<span <span class=\"keyword\">class</span>=\"number\">0</span>, <span <span class=\"keyword\">class</span>=\"number\">3</span>) + <span <span class=\"keyword\">class</span>=\"string\">\"****\"</span> + phone.<span class=\"func\">substring</span>(<span <span class=\"keyword\">class</span>=\"number\">7</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：给注册工具增加功能。</p><ol><li>增加邮箱校验（简单判断包含@和.）</li><li>增加密码强度检测（必须同时包含字母和数字）</li><li>注册成功后显示一个\"欢迎横幅\"</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>Scanner.nextInt后不换行</strong></td><td>nextInt不会消耗换行符，后面的nextLine会读到空字符串</td><td>nextInt后手动scanner.nextLine()消耗换行</td></tr><tr><td><strong>没关Scanner</strong></td><td>虽然不影响小程序，但好的习惯是关闭资源</td><td>用完scanner.close()</td></tr><tr><td><strong>正则表达式转义</strong></td><td>Java字符串里\\\\才表示一个反斜杠</td><td>写\\\\d而不是\\d</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>用本周学到的所有知识，独立实现一个\"学生成绩管理系统\"CLI，支持录入5个学生的姓名和成绩，然后输出平均分、最高分和排名</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第2周开始：面向对象核心。我们将进入Java最核心的部分——类与对象、封装继承多态。</div>"
},
{
    id: 6,
    week: 2,
    title: "类与对象 —— 设计你的第一个Java类",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解类和对象的关系（类比JS的class和instance）</li><li>掌握Java类的定义、属性、方法、构造器</li><li>理解this关键字的作用</li><li>掌握对象的创建和使用</li><li>能够设计简单的业务实体类</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第5课，掌握Java基础语法</li><li>熟悉JavaScript/TypeScript的class语法</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 类与对象：图纸和房子</h3><p>类（Class）是对象的模板，对象（Object）是类的实例。这和你用JavaScript的class完全一样：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">类与对象对比</span></div><code><span class=\"comment\">// JavaScript</span>\n<span class=\"keyword\">class</span> User {\n    <span class=\"func\">constructor</span>(name, age) {\n        <span class=\"keyword\">this</span>.name = name;\n        <span class=\"keyword\">this</span>.age = age;\n    }\n    <span class=\"func\">sayHi</span>() {\n        console.<span class=\"func\">log</span>(`Hi, I'm ${<span class=\"keyword\">this</span>.name}`);\n    }\n}\nconst u = <span class=\"keyword\">new</span> <span class=\"func\">User</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>, <span <span class=\"keyword\">class</span>=\"number\">25</span>);\n\n<span class=\"comment\">// Java</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">int</span> age;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">User</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">int</span> age) {\n        <span class=\"keyword\">this</span>.name = name;\n        <span class=\"keyword\">this</span>.age = age;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">sayHi</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Hi, I'm \"</span> + <span class=\"keyword\">this</span>.name);\n    }\n}\nUser u = <span class=\"keyword\">new</span> <span class=\"func\">User</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>, <span <span class=\"keyword\">class</span>=\"number\">25</span>);</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>类就像<strong>建筑图纸</strong>，对象就像<strong>按图纸盖出来的房子</strong>。图纸本身不能住人（类不能直接用来做事），但你可以根据图纸盖很多栋相同的房子（创建多个对象）。</div><h3>2. 构造方法：对象的\"出生仪式\"</h3><p>构造方法是一种特殊的方法，名字和类名相同，没有返回值。它在创建对象时自动调用。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">构造方法重载</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> Product {\n    <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">double</span> price;\n    \n    <span class=\"comment\">// 无参构造</span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Product</span>() {}\n    \n    <span class=\"comment\">// 带参构造</span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Product</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price) {\n        <span class=\"keyword\">this</span>.name = name;\n        <span class=\"keyword\">this</span>.price = price;\n    }\n}\n\nProduct p1 = <span class=\"keyword\">new</span> <span class=\"func\">Product</span>();\nProduct p2 = <span class=\"keyword\">new</span> <span class=\"func\">Product</span>(<span <span class=\"keyword\">class</span>=\"string\">\"键盘\"</span>, <span <span class=\"keyword\">class</span>=\"number\">299.0</span>);</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>如果你不写任何构造方法，Java会默认提供一个无参构造。但如果你写了一个带参构造，默认的无参构造就消失了！需要手动补回来。这是新手常踩的坑。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Product.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> Product {\n    <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">double</span> price;\n    <span class=\"keyword\">int</span> stock;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Product</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price, <span class=\"keyword\">int</span> stock) {\n        <span class=\"keyword\">this</span>.name = name;\n        <span class=\"keyword\">this</span>.price = price;\n        <span class=\"keyword\">this</span>.stock = stock;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">display</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"商品: \"</span> + name);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"价格: \"</span> + price + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"库存: \"</span> + stock + <span <span class=\"keyword\">class</span>=\"string\">\"件\"</span>);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">boolean</span> <span class=\"func\">purchase</span>(<span class=\"keyword\">int</span> quantity) {\n        <span class=\"keyword\">if</span> (quantity &gt; stock) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"库存不足！\"</span>);\n            <span class=\"keyword\">return</span> <span class=\"keyword\">false</span>;\n        }\n        stock -= quantity;\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"购买成功！剩余库存: \"</span> + stock);\n        <span class=\"keyword\">return</span> <span class=\"keyword\">true</span>;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        Product keyboard = <span class=\"keyword\">new</span> <span class=\"func\">Product</span>(<span <span class=\"keyword\">class</span>=\"string\">\"机械键盘\"</span>, <span <span class=\"keyword\">class</span>=\"number\">299.0</span>, <span <span class=\"keyword\">class</span>=\"number\">50</span>);\n        keyboard.<span class=\"func\">display</span>();\n        keyboard.<span class=\"func\">purchase</span>(<span <span class=\"keyword\">class</span>=\"number\">5</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：设计一个User类。</p><ol><li>属性：用户名、密码、邮箱、注册时间（long时间戳）</li><li>构造方法：带全部参数的构造方法</li><li>方法：显示用户信息、验证密码（传入密码，返回boolean）、修改密码</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>忘记写无参构造</strong></td><td>写了带参构造后，默认无参构造消失</td><td>要么不写任何构造，要么把无参构造也写上</td></tr><tr><td><strong>this忘记写</strong></td><td>构造方法里name = name，实际没赋值</td><td>用this.name = name区分成员变量和参数</td></tr><tr><td><strong>类名和文件名不一致</strong></td><td>public class User必须放在User.java里</td><td>保持文件名和public类名一致</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>设计一个Book类（书名、作者、价格、库存），支持借阅和归还功能</li><li>思考题：Java的class和JavaScript的class在底层实现上有什么区别？</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第7课：封装与继承 —— 设计用户体系。学习private/public、getter/setter、extends等核心概念。</div>"
},
{
    id: 7,
    week: 2,
    title: "封装与继承 —— 设计用户体系",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解封装的意义，掌握private/public的使用</li><li>熟练编写getter和setter方法</li><li>理解继承的概念，掌握extends关键字</li><li>理解方法重写（Override）</li><li>能够设计带继承关系的业务实体</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第6课，掌握类与对象的基本概念</li><li>理解JavaScript的class继承</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 封装：把内部细节藏起来</h3><p>封装是面向对象三大特性之一。它的核心思想是：<strong>把对象的属性设为私有（private），通过公开的方法（getter/setter）来访问</strong>。</p><p>为什么要这样做？想象一下，如果你直接让外部代码修改一个对象的属性，就像让任何人都可以直接走进你家翻箱倒柜。封装就像是给房子装上了门和锁，外人只能通过门铃（getter）和信箱（setter）来和你交互。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">封装示例</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    private String name;   <span class=\"comment\">// 私有属性，外部不能直接访问</span>\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> age;\n    \n    <span class=\"comment\">// getter - 获取属性值</span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getName</span>() {\n        <span class=\"keyword\">return</span> name;\n    }\n    \n    <span class=\"comment\">// setter - 设置属性值，可以加入校验逻辑</span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">setAge</span>(<span class=\"keyword\">int</span> age) {\n        <span class=\"keyword\">if</span> (age &lt; <span <span class=\"keyword\">class</span>=\"number\">0</span> || age &gt; <span <span class=\"keyword\">class</span>=\"number\">150</span>) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"年龄不合法！\"</span>);\n            <span class=\"keyword\">return</span>;\n        }\n        <span class=\"keyword\">this</span>.age = age;\n    }\n}</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就像是前端React组件里的<strong>props和state</strong>——你不希望外部组件直接修改你的内部state，而是通过setState方法来更新。Java的getter/setter就是这个概念的\"原生版\"。</div><h3>2. 继承：站在巨人的肩膀上</h3><p>继承让你可以基于一个已有的类创建新类，新类自动拥有父类的所有属性和方法。Java用<code class='inline'>extends</code>关键字实现继承。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">继承示例</span></div><code><span class=\"comment\">// 父类</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    protected String name;  <span class=\"comment\">// protected：子类可以访问</span>\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">int</span> age;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">login</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(name + <span <span class=\"keyword\">class</span>=\"string\">\" 登录成功\"</span>);\n    }\n}\n\n<span class=\"comment\">// 子类</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> VipUser <span class=\"keyword\">extends</span> User {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> level;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">buy</span>() {\n        System.out.println(name + \" 购买了商品\");  <span class=\"comment\">// 可以直接用父类的name</span>\n    }\n    \n    <span class=\"comment\">// 方法重写</span>\n    @Override\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">login</span>() {\n        super.login();  <span class=\"comment\">// 调用父类方法</span>\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"欢迎VIP用户！\"</span>);\n    }\n}</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>Java是单继承语言，一个类只能extends一个父类。这和JavaScript的class一样。如果需要\"多继承\"的效果，可以用接口（下节课讲）。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserSystem.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"comment\">// 父类：基础用户</span>\n<span class=\"keyword\">class</span> BaseUser {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> userId;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> userName;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> password;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">BaseUser</span>(<span class=\"keyword\">String</span> userId, <span class=\"keyword\">String</span> userName, <span class=\"keyword\">String</span> password) {\n        <span class=\"keyword\">this</span>.userId = userId;\n        <span class=\"keyword\">this</span>.userName = userName;\n        <span class=\"keyword\">this</span>.password = password;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getUserName</span>() { <span class=\"keyword\">return</span> userName; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">setUserName</span>(<span class=\"keyword\">String</span> userName) { <span class=\"keyword\">this</span>.userName = userName; }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">boolean</span> <span class=\"func\">checkPassword</span>(<span class=\"keyword\">String</span> input) {\n        <span class=\"keyword\">return</span> <span class=\"keyword\">this</span>.password.<span class=\"func\">equals</span>(input);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">showInfo</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户ID: \"</span> + userId + <span <span class=\"keyword\">class</span>=\"string\">\", 昵称: \"</span> + userName);\n    }\n}\n\n<span class=\"comment\">// 子类：会员用户</span>\n<span class=\"keyword\">class</span> MemberUser <span class=\"keyword\">extends</span> BaseUser {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> points;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> level;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">MemberUser</span>(<span class=\"keyword\">String</span> userId, <span class=\"keyword\">String</span> userName, <span class=\"keyword\">String</span> password, <span class=\"keyword\">String</span> level) {\n        <span class=\"keyword\">super</span>(userId, userName, password);\n        <span class=\"keyword\">this</span>.level = level;\n        <span class=\"keyword\">this</span>.points = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">addPoints</span>(<span class=\"keyword\">int</span> p) {\n        points += p;\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span class=\"func\">getUserName</span>() + <span <span class=\"keyword\">class</span>=\"string\">\" 获得 \"</span> + p + <span <span class=\"keyword\">class</span>=\"string\">\" 积分，当前积分: \"</span> + points);\n    }\n    \n    @Override\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">showInfo</span>() {\n        <span class=\"keyword\">super</span>.<span class=\"func\">showInfo</span>();\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"等级: \"</span> + level + <span <span class=\"keyword\">class</span>=\"string\">\", 积分: \"</span> + points);\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserSystem {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        BaseUser normal = <span class=\"keyword\">new</span> <span class=\"func\">BaseUser</span>(<span <span class=\"keyword\">class</span>=\"string\">\"U001\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"普通用户\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123456</span>\"</span>);\n        normal.<span class=\"func\">showInfo</span>();\n        \n        MemberUser vip = <span class=\"keyword\">new</span> <span class=\"func\">MemberUser</span>(<span <span class=\"keyword\">class</span>=\"string\">\"U002\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"VIP小王\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">888888</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Gold\"</span>);\n        vip.<span class=\"func\">showInfo</span>();\n        vip.<span class=\"func\">addPoints</span>(<span <span class=\"keyword\">class</span>=\"number\">100</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：设计一个电商商品继承体系。</p><ol><li>父类Product：名称、价格、库存</li><li>子类Electronics：增加保修期（月）、品牌</li><li>子类Clothing：增加尺码、颜色</li><li>重写display()方法，展示各自的特有属性</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>子类构造忘调super()</strong></td><td>子类构造方法第一行必须调用父类构造</td><td>如果父类只有带参构造，子类必须用super(...)调用</td></tr><tr><td><strong>private属性子类不可见</strong></td><td>private只能在当前类访问</td><td>需要子类访问时用protected</td></tr><tr><td><strong>方法重写没加@Override</strong></td><td>虽然不加也能运行，但加上可以检查拼写错误</td><td>养成加@Override的习惯</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>设计一个学校人员体系：Person（姓名、年龄）→ Teacher（科目、工龄）和 Student（学号、班级），都有showInfo()方法</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第8课：多态与接口 —— 支付渠道抽象。学习Java最灵活的特性：多态和接口。</div>"
},
{
    id: 8,
    week: 2,
    title: "多态与接口 —— 支付渠道抽象",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解多态的概念和实际价值</li><li>掌握向上转型和动态绑定</li><li>理解接口（interface）的定义和实现</li><li>能够用接口设计可扩展的系统</li><li>对比Java接口和TypeScript接口的异同</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第7课，掌握封装和继承</li><li>理解JavaScript/TypeScript的interface概念</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 多态：同一个方法，不同的表现</h3><p>多态（Polymorphism）字面意思是\"多种形态\"。在Java里，它指的是：<strong>父类引用可以指向子类对象，调用方法时会执行子类的版本</strong>。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">多态示例</span></div><code>BaseUser user1 = <span class=\"keyword\">new</span> <span class=\"func\">BaseUser</span>(<span <span class=\"keyword\">class</span>=\"string\">\"U001\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"张三\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123</span>\"</span>);\nBaseUser user2 = <span class=\"keyword\">new</span> <span class=\"func\">MemberUser</span>(<span <span class=\"keyword\">class</span>=\"string\">\"U002\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"李四\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">456</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Gold\"</span>);\n\nuser1.showInfo();  <span class=\"comment\">// 调用BaseUser版本</span>\nuser2.showInfo();  <span class=\"comment\">// 调用MemberUser版本（动态绑定！）</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就像前端里的<strong>组件多态</strong>——你有一个Button组件的基础引用，但实际渲染的可能是PrimaryButton、DangerButton或GhostButton。你调用onClick时，执行的是实际组件里的方法，而不是基类的方法。</div><h3>2. 接口：只规定\"做什么\"，不规定\"怎么做\"</h3><p>接口（interface）是Java中非常强大的抽象机制。它只定义方法的签名，不实现方法体。类通过<code class='inline'>implements</code>关键字来实现接口。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">接口定义与实现</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">interface</span> Payment {\n    <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount);\n    <span class=\"keyword\">void</span> <span class=\"func\">refund</span>(<span class=\"keyword\">String</span> orderId);\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> Alipay <span class=\"keyword\">implements</span> Payment {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"支付宝支付 \"</span> + amount + <span <span class=\"keyword\">class</span>=\"string\">\" 元\"</span>);\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">refund</span>(<span class=\"keyword\">String</span> orderId) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"支付宝退款: \"</span> + orderId);\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> WechatPay <span class=\"keyword\">implements</span> Payment {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"微信支付 \"</span> + amount + <span <span class=\"keyword\">class</span>=\"string\">\" 元\"</span>);\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">refund</span>(<span class=\"keyword\">String</span> orderId) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"微信退款: \"</span> + orderId);\n    }\n}</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>从Java 8开始，接口可以有default方法（默认实现）和static方法。从Java 9开始，接口还可以有private方法。这让接口更加灵活。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">PaymentSystem.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">interface</span> Payment {\n    <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount);\n    <span class=\"keyword\">String</span> <span class=\"func\">getName</span>();\n}\n\n<span class=\"keyword\">class</span> Alipay <span class=\"keyword\">implements</span> Payment {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[支付宝] 扫码支付 \"</span> + amount + <span <span class=\"keyword\">class</span>=\"string\">\" 元\"</span>);\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getName</span>() { <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"支付宝\"</span>; }\n}\n\n<span class=\"keyword\">class</span> WechatPay <span class=\"keyword\">implements</span> Payment {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[微信支付] 跳转小程序支付 \"</span> + amount + <span <span class=\"keyword\">class</span>=\"string\">\" 元\"</span>);\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getName</span>() { <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"微信支付\"</span>; }\n}\n\n<span class=\"keyword\">class</span> BankCard <span class=\"keyword\">implements</span> Payment {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">pay</span>(<span class=\"keyword\">double</span> amount) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[银行卡] 快捷支付 \"</span> + amount + <span <span class=\"keyword\">class</span>=\"string\">\" 元\"</span>);\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getName</span>() { <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"银行卡\"</span>; }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> PaymentSystem {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">checkout</span>(Payment payment, <span class=\"keyword\">double</span> amount) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"选择支付方式: \"</span> + payment.<span class=\"func\">getName</span>());\n        payment.<span class=\"func\">pay</span>(amount);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"支付完成！\\n\"</span>);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        Payment[] methods = {<span class=\"keyword\">new</span> <span class=\"func\">Alipay</span>(), <span class=\"keyword\">new</span> <span class=\"func\">WechatPay</span>(), <span class=\"keyword\">new</span> <span class=\"func\">BankCard</span>()};\n        <span class=\"keyword\">for</span> (Payment p : methods) {\n            <span class=\"func\">checkout</span>(p, <span <span class=\"keyword\">class</span>=\"number\">199.0</span>);\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：设计一个通知系统接口。</p><ol><li>定义接口Notifier：方法send(String message, String target)</li><li>实现类SmsNotifier、EmailNotifier、AppPushNotifier</li><li>写一个方法批量发送通知给所有渠道</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>接口方法默认public</strong></td><td>接口里的方法不写修饰符也是public，但实现类必须显式写public</td><td>实现接口方法时加上public</td></tr><tr><td><strong>接口不能有实例字段</strong></td><td>接口只能有静态常量（public static final）</td><td>需要状态用抽象类，纯行为用接口</td></tr><tr><td><strong>多态时丢失子类特有方法</strong></td><td>BaseUser u = new MemberUser(); u.addPoints()报错</td><td>需要时进行向下转型：((MemberUser)u).addPoints()</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>设计一个图形系统：接口Shape（getArea、getPerimeter），实现类Rectangle、Circle、Triangle</li><li>写一个方法，接收Shape数组，输出每个图形的面积和周长</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第9课：包与访问控制 —— 模块化拆分项目。学习package、import和四种访问修饰符。</div>"
},
{
    id: 9,
    week: 2,
    title: "包与访问控制 —— 模块化拆分项目",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解package的作用和命名规范</li><li>掌握import的使用，理解静态导入</li><li>掌握四种访问修饰符的区别（private/default/protected/public）</li><li>理解static关键字的作用</li><li>能够合理组织项目包结构</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第8课，掌握多态和接口</li><li>理解npm包的命名空间概念</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 包（Package）：Java的命名空间</h3><p>包就像是Java的\"文件夹+命名空间\"，用来组织类，避免类名冲突。类比npm包，<code class='inline'>com.example.user</code>就像是<code class='inline'>@example/user</code>。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">包的声明与导入</span></div><code><span class=\"comment\">// 声明当前类属于哪个包</span>\n<span class=\"keyword\">package</span> com.example.service;\n\n<span class=\"comment\">// 导入其他包的类</span>\n<span class=\"keyword\">import</span> com.example.model.User;\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">List</span>;\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">ArrayList</span>;\n\n<span class=\"comment\">// 静态导入（直接导入类的静态成员）</span>\n<span class=\"keyword\">import</span> <span class=\"keyword\">static</span> java.lang.<span class=\"type\">Math</span>.PI;\n<span class=\"keyword\">import</span> <span class=\"keyword\">static</span> java.lang.<span class=\"type\">Math</span>.pow;</code></div><h3>2. 四种访问修饰符</h3><table class=\"compare-table\"><tr><th>修饰符</th><th>当前类</th><th>同包</th><th>子类</th><th>任意位置</th></tr><tr><td>private</td><td>✅</td><td>❌</td><td>❌</td><td>❌</td></tr><tr><td>default（不写）</td><td>✅</td><td>✅</td><td>❌</td><td>❌</td></tr><tr><td>protected</td><td>✅</td><td>✅</td><td>✅</td><td>❌</td></tr><tr><td>public</td><td>✅</td><td>✅</td><td>✅</td><td>✅</td></tr></table><h3>3. static：属于类，不属于对象</h3><p>static修饰的成员属于类本身，而不是某个对象实例。所有实例共享同一个static成员。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">static示例</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    static int userCount = 0;  <span class=\"comment\">// 类变量，所有对象共享</span>\n    String name;                <span class=\"comment\">// 实例变量，每个对象独立</span>\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">User</span>(<span class=\"keyword\">String</span> name) {\n        <span class=\"keyword\">this</span>.name = name;\n        userCount++;  <span class=\"comment\">// 每创建一个对象，计数+1</span>\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">showTotal</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"总用户数: \"</span> + userCount);\n    }\n}\n\nUser u1 = <span class=\"keyword\">new</span> <span class=\"func\">User</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);\nUser u2 = <span class=\"keyword\">new</span> <span class=\"func\">User</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>);\nUser.showTotal();  <span class=\"comment\">// 输出: 总用户数: 2</span></code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">ProjectStructure.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.time.<span class=\"type\">LocalDateTime</span>;\n<span class=\"keyword\">import</span> java.time.format.DateTimeFormatter;\n\n<span class=\"keyword\">class</span> AppConfig {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">final</span> <span class=\"keyword\">String</span> APP_NAME = <span <span class=\"keyword\">class</span>=\"string\">\"电商系统\"</span>;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">final</span> <span class=\"keyword\">String</span> VERSION = <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">1.0</span>.<span <span class=\"keyword\">class</span>=\"number\">0</span>\"</span>;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> requestCount = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">logRequest</span>() {\n        requestCount++;\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[\"</span> + <span class=\"func\">now</span>() + <span <span class=\"keyword\">class</span>=\"string\">\"] 第\"</span> + requestCount + <span <span class=\"keyword\">class</span>=\"string\">\"次请求\"</span>);\n    }\n    \n    <span class=\"keyword\">private</span> <span class=\"keyword\">static</span> <span class=\"keyword\">String</span> <span class=\"func\">now</span>() {\n        <span class=\"keyword\">return</span> <span class=\"type\">LocalDateTime</span>.<span class=\"func\">now</span>().<span class=\"func\">format</span>(DateTimeFormatter.<span class=\"func\">ofPattern</span>(<span <span class=\"keyword\">class</span>=\"string\">\"HH:mm:ss\"</span>));\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ProjectStructure {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"应用: \"</span> + AppConfig.APP_NAME + <span <span class=\"keyword\">class</span>=\"string\">\" v\"</span> + AppConfig.VERSION);\n        AppConfig.<span class=\"func\">logRequest</span>();\n        AppConfig.<span class=\"func\">logRequest</span>();\n        AppConfig.<span class=\"func\">logRequest</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：设计一个工具类。</p><ol><li>创建DateUtil工具类，提供formatDate(long timestamp)和getDaysBetween(long t1, long t2)静态方法</li><li>创建IdGenerator工具类，提供generateOrderId()静态方法（基于时间戳+随机数）</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>静态方法里用this</strong></td><td>static方法没有this，因为它不属于任何对象</td><td>静态方法只能访问静态成员</td></tr><tr><td><strong>循环导入</strong></td><td>A导入B，B又导入A</td><td>重构代码，提取公共部分到第三个类</td></tr><tr><td><strong>包名和文件夹结构不一致</strong></td><td>package com.example但文件不在com/example下</td><td>包结构必须和文件夹结构一致</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>按照标准企业项目结构，创建以下包和类：com.example.model(User,Product)、com.example.service(UserService,OrderService)、com.example.util(DateUtil, StringUtil)</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第10课：周实战 —— 商品分类体系设计。综合运用面向对象知识，设计可扩展的商品类目系统。</div>"
},
{
    id: 10,
    week: 2,
    title: "周实战：商品分类体系设计",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>综合运用封装、继承、多态、接口设计系统</li><li>理解抽象类（abstract class）的使用场景</li><li>掌握类的组合关系（has-a）vs 继承关系（is-a）</li><li>完成一个可扩展的商品分类体系</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>抽象类 vs 接口</h3><p>抽象类是介于普通类和接口之间的一种类型。它可以有成员变量、构造方法、普通方法，也可以有抽象方法（没有方法体）。</p><ul><li><strong>接口</strong>：只定义行为契约，没有状态 → \"你能做什么\"</li><li><strong>抽象类</strong>：有部分实现，有状态 → \"你是什么\"</li></ul><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">抽象类示例</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">abstract</span> <span class=\"keyword\">class</span> Product {\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">String</span> id;\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">double</span> price;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Product</span>(<span class=\"keyword\">String</span> id, <span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price) {\n        <span class=\"keyword\">this</span>.id = id;\n        <span class=\"keyword\">this</span>.name = name;\n        <span class=\"keyword\">this</span>.price = price;\n    }\n    \n    <span class=\"comment\">// 抽象方法：子类必须实现</span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">abstract</span> <span class=\"keyword\">String</span> <span class=\"func\">getCategory</span>();\n    \n    <span class=\"comment\">// 普通方法</span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">display</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(id + <span <span class=\"keyword\">class</span>=\"string\">\" | \"</span> + name + <span <span class=\"keyword\">class</span>=\"string\">\" | \"</span> + price + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">CategorySystem.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">abstract</span> <span class=\"keyword\">class</span> Product {\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">String</span> id;\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">protected</span> <span class=\"keyword\">double</span> price;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Product</span>(<span class=\"keyword\">String</span> id, <span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price) {\n        <span class=\"keyword\">this</span>.id = id; <span class=\"keyword\">this</span>.name = name; <span class=\"keyword\">this</span>.price = price; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">abstract</span> <span class=\"keyword\">String</span> <span class=\"func\">getCategory</span>();\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">display</span>() { <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(id + <span <span class=\"keyword\">class</span>=\"string\">\" | \"</span> + name + <span <span class=\"keyword\">class</span>=\"string\">\" | \"</span> + price + <span <span class=\"keyword\">class</span>=\"string\">\"元 | \"</span> + <span class=\"func\">getCategory</span>()); }\n}\n\n<span class=\"keyword\">class</span> Electronics <span class=\"keyword\">extends</span> Product {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> brand;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Electronics</span>(<span class=\"keyword\">String</span> id, <span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price, <span class=\"keyword\">String</span> brand) {\n        <span class=\"keyword\">super</span>(id, name, price); <span class=\"keyword\">this</span>.brand = brand; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getCategory</span>() { <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"电子产品\"</span>; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">display</span>() { <span class=\"keyword\">super</span>.<span class=\"func\">display</span>(); <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"  品牌: \"</span> + brand); }\n}\n\n<span class=\"keyword\">class</span> Clothing <span class=\"keyword\">extends</span> Product {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> size;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">Clothing</span>(<span class=\"keyword\">String</span> id, <span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price, <span class=\"keyword\">String</span> size) {\n        <span class=\"keyword\">super</span>(id, name, price); <span class=\"keyword\">this</span>.size = size; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getCategory</span>() { <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"服装\"</span>; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">display</span>() { <span class=\"keyword\">super</span>.<span class=\"func\">display</span>(); <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"  尺码: \"</span> + size); }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> CategorySystem {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        Product[] products = {\n            <span class=\"keyword\">new</span> <span class=\"func\">Electronics</span>(<span <span class=\"keyword\">class</span>=\"string\">\"E001\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"iPhone\"</span>, <span <span class=\"keyword\">class</span>=\"number\">5999</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Apple\"</span>),\n            <span class=\"keyword\">new</span> <span class=\"func\">Clothing</span>(<span <span class=\"keyword\">class</span>=\"string\">\"C001\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"T恤\"</span>, <span <span class=\"keyword\">class</span>=\"number\">99</span>, <span <span class=\"keyword\">class</span>=\"string\">\"XL\"</span>)\n        };\n        <span class=\"keyword\">for</span> (Product p : products) p.<span class=\"func\">display</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>新增Food类（保质期天数）</li><li>写一个购物车类Cart，可以添加Product，计算总价</li><li>用instanceof判断商品类型并分类统计</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>抽象类不能直接new</strong></td><td>Product p = new Product()报错</td><td>只能new它的非抽象子类</td></tr><tr><td><strong>抽象方法不能有大括号</strong></td><td>public abstract void foo() {} 会报错</td><td>抽象方法以分号结束</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>完善购物车系统，支持添加、删除、清空、计算总价功能</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第3周：常用工具与集合框架。我们将学习String、集合类、泛型等实用工具。</div>"
},
{
    id: 11,
    week: 3,
    title: "String深度解析与常用工具类",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解String的不可变性及其原因</li><li>掌握StringBuilder和StringBuffer的区别</li><li>熟练使用Math、Random、Date/Time API</li><li>能够处理日期格式化和字符串拼接</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. String为什么不可变？</h3><p>在Java里，String一旦被创建就不能修改。任何\"修改\"操作实际上都是创建了一个新的String对象。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">String不可变性</span></div><code><span class=\"keyword\">String</span> s = <span <span class=\"keyword\">class</span>=\"string\">\"hello\"</span>;\ns.concat(\" world\");  <span class=\"comment\">// concat返回新字符串，s本身没变！</span>\nSystem.out.println(s);  <span class=\"comment\">// 还是 \"hello\"</span>\n\ns = s.concat(\" world\");  <span class=\"comment\">// 必须重新赋值</span>\nSystem.out.println(s);  <span class=\"comment\">// \"hello world\"</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>String就像前端里的<strong>immutable state</strong>——每次setState都返回一个新对象，原来的对象不会被修改。这样做的好处是线程安全、可以被缓存（字符串常量池）、作为Map的key更可靠。</div><h3>2. StringBuilder：可变的字符串</h3><p>如果需要频繁拼接字符串，用StringBuilder（线程不安全）或StringBuffer（线程安全）。单线程环境下优先用StringBuilder，性能更好。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">StringBuilder用法</span></div><code><span class=\"type\">StringBuilder</span> sb = <span class=\"keyword\">new</span> <span class=\"type\">StringBuilder</span>();\nsb.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"订单号: \"</span>).<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"ORD2024001\"</span>);\nsb.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"\\n\"</span>);\nsb.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"金额: \"</span>).<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"number\">299.0</span>);\n<span class=\"keyword\">String</span> result = sb.<span class=\"func\">toString</span>();</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">StringTools.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.time.<span class=\"type\">LocalDateTime</span>;\n<span class=\"keyword\">import</span> java.time.format.DateTimeFormatter;\n<span class=\"keyword\">import</span> java.util.Random;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> StringTools {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"comment\">// 订单号生成：前缀 + 日期 + 随机数</span>\n        <span class=\"keyword\">String</span> orderId = <span class=\"func\">generateOrderId</span>();\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"订单号: \"</span> + orderId);\n        \n        <span class=\"comment\">// 格式化金额</span>\n        <span class=\"keyword\">long</span> priceInCents = <span <span class=\"keyword\">class</span>=\"number\">199999</span>;\n        <span class=\"keyword\">String</span> formatted = <span class=\"keyword\">String</span>.<span class=\"func\">format</span>(<span <span class=\"keyword\">class</span>=\"string\">\"%.2f\"</span>, priceInCents / <span <span class=\"keyword\">class</span>=\"number\">100.0</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"金额: \"</span> + formatted + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        \n        <span class=\"comment\">// 日期格式化</span>\n        <span class=\"type\">LocalDateTime</span> now = <span class=\"type\">LocalDateTime</span>.<span class=\"func\">now</span>();\n        <span class=\"keyword\">String</span> dateStr = now.<span class=\"func\">format</span>(DateTimeFormatter.<span class=\"func\">ofPattern</span>(<span <span class=\"keyword\">class</span>=\"string\">\"yyyy-MM-dd HH:mm:ss\"</span>));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"当前时间: \"</span> + dateStr);\n        \n        <span class=\"comment\">// 生成随机验证码</span>\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"验证码: \"</span> + <span class=\"func\">generateCode</span>(<span <span class=\"keyword\">class</span>=\"number\">6</span>));\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">String</span> <span class=\"func\">generateOrderId</span>() {\n        <span class=\"keyword\">String</span> date = <span class=\"type\">LocalDateTime</span>.<span class=\"func\">now</span>().<span class=\"func\">format</span>(DateTimeFormatter.<span class=\"func\">ofPattern</span>(<span <span class=\"keyword\">class</span>=\"string\">\"yyyyMMdd\"</span>));\n        <span class=\"keyword\">int</span> random = <span class=\"keyword\">new</span> <span class=\"func\">Random</span>().<span class=\"func\">nextInt</span>(<span <span class=\"keyword\">class</span>=\"number\">9000</span>) + <span <span class=\"keyword\">class</span>=\"number\">1000</span>;\n        <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"ORD\"</span> + date + random;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">String</span> <span class=\"func\">generateCode</span>(<span class=\"keyword\">int</span> length) {\n        <span class=\"keyword\">String</span> chars = <span <span class=\"keyword\">class</span>=\"string\">\"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789\"</span>;\n        Random r = <span class=\"keyword\">new</span> <span class=\"func\">Random</span>();\n        <span class=\"type\">StringBuilder</span> sb = <span class=\"keyword\">new</span> <span class=\"type\">StringBuilder</span>();\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; length; i++) {\n            sb.<span class=\"func\">append</span>(chars.<span class=\"func\">charAt</span>(r.<span class=\"func\">nextInt</span>(chars.<span class=\"func\">length</span>())));\n        }\n        <span class=\"keyword\">return</span> sb.<span class=\"func\">toString</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>写一个方法，将驼峰命名转为下划线命名（userName → user_name）</li><li>写一个方法，判断字符串是否为合法手机号</li><li>用StringBuilder拼接一个HTML表格字符串</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>String拼接性能差</strong></td><td>循环里用+拼接字符串会创建大量临时对象</td><td>循环外拼接用StringBuilder</td></tr><tr><td><strong>==比较String</strong></td><td>永远不要用==比较字符串内容</td><td>用equals()或equalsIgnoreCase()</td></tr><tr><td><strong>SimpleDateFormat线程不安全</strong></td><td>多线程环境下共用SimpleDateFormat会出错</td><td>用DateTimeFormatter（Java 8+）</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第12课：List集合 —— ArrayList vs LinkedList。学习Java最常用的集合类。</div>"
},
{
    id: 12,
    week: 3,
    title: "List集合 —— ArrayList vs LinkedList",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解Collection框架的体系结构</li><li>掌握ArrayList和LinkedList的特点和适用场景</li><li>熟练使用List的增删改查操作</li><li>理解迭代器的使用</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. List：有序的集合</h3><p>List是Java集合框架中最常用的接口之一，它表示一个<strong>有序、可重复</strong>的元素序列。类比JavaScript的数组。</p><h3>2. ArrayList vs LinkedList</h3><table class=\"compare-table\"><tr><th>特性</th><th>ArrayList</th><th>LinkedList</th><th>类比JS</th></tr><tr><td>底层结构</td><td>动态数组</td><td>双向链表</td><td>Array / 特殊链表</td></tr><tr><td>查询速度</td><td>O(1) 极快</td><td>O(n) 慢</td><td>arr[i] / 遍历</td></tr><tr><td>插入删除</td><td>O(n) 慢（需移动元素）</td><td>O(1) 快</td><td>splice / 手动调整</td></tr><tr><td>内存占用</td><td>较少</td><td>较多（存指针）</td><td>-</td></tr><tr><td>适用场景</td><td>查询多、修改少</td><td>频繁插入删除</td><td>-</td></tr></table><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>ArrayList就像前端里的<strong>普通数组</strong>，随机访问超快，但中间插入元素要搬动后面所有元素。LinkedList就像<strong>双向链表</strong>，插入删除只需要改两个指针，但找第N个元素要从头遍历。</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">List基本操作</span></div><code><span class=\"keyword\">import</span> java.util.<span class=\"type\">ArrayList</span>;\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">List</span>;\n\n<span class=\"type\">List</span>&lt;<span class=\"keyword\">String</span>&gt; names = <span class=\"keyword\">new</span> <span class=\"type\">ArrayList</span>&lt;&gt;();\nnames.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);\nnames.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>);\nnames.add(1, \"Charlie\");  <span class=\"comment\">// 在索引1插入</span>\nnames.<span class=\"func\">remove</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>);\n<span class=\"keyword\">String</span> first = names.<span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=\"number\">0</span>);\n<span class=\"keyword\">int</span> size = names.<span class=\"func\">size</span>();\n<span class=\"keyword\">boolean</span> hasAlice = names.<span class=\"func\">contains</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">ProductList.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">ArrayList</span>;\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">List</span>;\n\n<span class=\"keyword\">class</span> Product {\n    <span class=\"keyword\">String</span> name; <span class=\"keyword\">double</span> price;\n    <span class=\"func\">Product</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price) { <span class=\"keyword\">this</span>.name = name; <span class=\"keyword\">this</span>.price = price; }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ProductList {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"type\">List</span>&lt;Product&gt; products = <span class=\"keyword\">new</span> <span class=\"type\">ArrayList</span>&lt;&gt;();\n        products.<span class=\"func\">add</span>(<span class=\"keyword\">new</span> <span class=\"func\">Product</span>(<span <span class=\"keyword\">class</span>=\"string\">\"键盘\"</span>, <span <span class=\"keyword\">class</span>=\"number\">299</span>));\n        products.<span class=\"func\">add</span>(<span class=\"keyword\">new</span> <span class=\"func\">Product</span>(<span <span class=\"keyword\">class</span>=\"string\">\"鼠标\"</span>, <span <span class=\"keyword\">class</span>=\"number\">99</span>));\n        products.<span class=\"func\">add</span>(<span class=\"keyword\">new</span> <span class=\"func\">Product</span>(<span <span class=\"keyword\">class</span>=\"string\">\"显示器\"</span>, <span <span class=\"keyword\">class</span>=\"number\">1299</span>));\n        \n        <span class=\"comment\">// 遍历方式1：for-each</span>\n        <span class=\"keyword\">for</span> (Product p : products) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(p.name + <span <span class=\"keyword\">class</span>=\"string\">\": \"</span> + p.price);\n        }\n        \n        <span class=\"comment\">// 遍历方式2：普通for</span>\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; products.<span class=\"func\">size</span>(); i++) {\n            Product p = products.<span class=\"func\">get</span>(i);\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>((i+<span <span class=\"keyword\">class</span>=\"number\">1</span>) + <span <span class=\"keyword\">class</span>=\"string\">\". \"</span> + p.name);\n        }\n        \n        <span class=\"comment\">// 计算总价</span>\n        <span class=\"keyword\">double</span> total = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n        <span class=\"keyword\">for</span> (Product p : products) total += p.price;\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"总价: \"</span> + total);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>创建一个String类型的List，存储5个用户名，然后按字母顺序排序（Collections.sort）</li><li>写一个方法，从List中删除所有包含特定关键词的元素</li><li>用LinkedList实现一个模拟队列（先进先出）</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>遍历时删除元素</strong></td><td>for-each里remove会抛ConcurrentModificationException</td><td>用Iterator的remove()方法</td></tr><tr><td><strong>List.of创建的列表不可变</strong></td><td>List.of(1,2,3).add(4)会报错</td><td>需要可变列表用new ArrayList<>()</td></tr><tr><td><strong>泛型不能存基本类型</strong></td><td>List<int>报错</td><td>用包装类：List<Integer></td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第13课：Set与Map —— HashSet和HashMap。学习去重和键值对存储。</div>"
},
{
    id: 13,
    week: 3,
    title: "Set与Map —— HashSet和HashMap",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解Set的无序不可重复特性</li><li>掌握HashSet的去重应用场景</li><li>理解Map的键值对存储模型</li><li>掌握HashMap的CRUD操作</li><li>能够用Map实现缓存和计数器</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Set：不重复的集合</h3><p>Set就像JavaScript的Set——自动去重，不保证顺序。HashSet是最常用的实现，基于哈希表，查询和插入都是O(1)。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">HashSet用法</span></div><code><span class=\"type\">Set</span>&lt;<span class=\"keyword\">String</span>&gt; tags = <span class=\"keyword\">new</span> <span class=\"type\">HashSet</span>&lt;&gt;();\ntags.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"java\"</span>);\ntags.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"backend\"</span>);\ntags.add(\"java\");  <span class=\"comment\">// 重复，不会被添加</span>\nSystem.out.println(tags.size());  <span class=\"comment\">// 2</span>\nSystem.out.println(tags.contains(\"java\"));  <span class=\"comment\">// true</span></code></div><h3>2. Map：键值对字典</h3><p>Map就是JavaScript的对象/Map——通过key找value。HashMap是最常用的实现。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">HashMap用法</span></div><code><span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Integer</span>&gt; scores = <span class=\"keyword\">new</span> <span class=\"type\">HashMap</span>&lt;&gt;();\nscores.<span class=\"func\">put</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>, <span <span class=\"keyword\">class</span>=\"number\">90</span>);\nscores.<span class=\"func\">put</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>, <span <span class=\"keyword\">class</span>=\"number\">85</span>);\n<span class=\"keyword\">int</span> aliceScore = scores.<span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);\nscores.<span class=\"func\">remove</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>);\n\n<span class=\"comment\">// 遍历</span>\n<span class=\"keyword\">for</span> (<span class=\"type\">Map</span>.Entry&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Integer</span>&gt; entry : scores.<span class=\"func\">entrySet</span>()) {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(entry.<span class=\"func\">getKey</span>() + <span <span class=\"keyword\">class</span>=\"string\">\": \"</span> + entry.<span class=\"func\">getValue</span>());\n}</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>HashMap就像前端里的<strong>普通对象（{}）</strong>或者<strong>Map实例</strong>——你可以用key快速查到对应的value。区别是Java的HashMap key和value都可以是任意对象，而JS对象只能把字符串/Symbol当key。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">IpFilter.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> IpFilter {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"comment\">// 用Set存储黑名单IP</span>\n        <span class=\"type\">Set</span>&lt;<span class=\"keyword\">String</span>&gt; blackList = <span class=\"keyword\">new</span> <span class=\"type\">HashSet</span>&lt;&gt;();\n        blackList.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">192.168</span>.<span <span class=\"keyword\">class</span>=\"number\">1.100</span>\"</span>);\n        blackList.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">10.0</span>.<span <span class=\"keyword\">class</span>=\"number\">0.50</span>\"</span>);\n        \n        <span class=\"comment\">// 模拟访问日志</span>\n        <span class=\"keyword\">String</span>[] accessLogs = {<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">192.168</span>.<span <span class=\"keyword\">class</span>=\"number\">1.100</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">172.16</span>.<span <span class=\"keyword\">class</span>=\"number\">0.1</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">10.0</span>.<span <span class=\"keyword\">class</span>=\"number\">0.50</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">192.168</span>.<span <span class=\"keyword\">class</span>=\"number\">1.100</span>\"</span>};\n        \n        <span class=\"comment\">// 用Map统计每个IP的访问次数</span>\n        <span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Integer</span>&gt; visitCount = <span class=\"keyword\">new</span> <span class=\"type\">HashMap</span>&lt;&gt;();\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">String</span> ip : accessLogs) {\n            <span class=\"keyword\">if</span> (blackList.<span class=\"func\">contains</span>(ip)) {\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[拦截] 黑名单IP: \"</span> + ip);\n                <span class=\"keyword\">continue</span>;\n            }\n            visitCount.<span class=\"func\">put</span>(ip, visitCount.<span class=\"func\">getOrDefault</span>(ip, <span <span class=\"keyword\">class</span>=\"number\">0</span>) + <span <span class=\"keyword\">class</span>=\"number\">1</span>);\n        }\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"\\n访问统计:\"</span>);\n        <span class=\"keyword\">for</span> (<span class=\"type\">Map</span>.Entry&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Integer</span>&gt; e : visitCount.<span class=\"func\">entrySet</span>()) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(e.<span class=\"func\">getKey</span>() + <span <span class=\"keyword\">class</span>=\"string\">\" =&gt; \"</span> + e.<span class=\"func\">getValue</span>() + <span <span class=\"keyword\">class</span>=\"string\">\"次\"</span>);\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>用HashSet对一个字符串数组去重并排序（转成List后Collections.sort）</li><li>用HashMap实现一个简单的LRU缓存（最近最少使用）</li><li>统计一段文本中每个字符出现的次数</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>HashMap允许null</strong></td><td>HashMap允许一个null键和多个null值</td><td>HashTable不允许null，ConcurrentHashMap也不允许</td></tr><tr><td><strong>遍历Map时修改</strong></td><td>遍历时put/remove可能导致异常</td><td>用Iterator或先收集key再处理</td></tr><tr><td><strong>自定义对象作Key</strong></td><td>必须重写equals和hashCode</td><td>IDEA可自动生成这两个方法</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第14课：泛型深入 —— 封装通用API返回结果。学习泛型类、泛型方法和通配符。</div>"
},
{
    id: 14,
    week: 3,
    title: "泛型深入 —— 封装通用API返回结果",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解泛型的概念和作用</li><li>掌握泛型类、泛型方法的定义</li><li>理解通配符 ? extends 和 ? super</li><li>能够封装通用的API响应包装类</li><li>对比Java泛型和TypeScript泛型的异同</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 为什么需要泛型？</h3><p>没有泛型时，集合可以存任意对象，取出来时都是Object，需要强制转换，既麻烦又不安全。泛型让集合\"知道\"自己要存什么类型。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">泛型前后对比</span></div><code><span class=\"comment\">// 没有泛型（Java 5之前）</span>\n<span class=\"type\">List</span> list = <span class=\"keyword\">new</span> <span class=\"type\">ArrayList</span>();\nlist.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"hello\"</span>);\nString s = (String) list.get(0);  <span class=\"comment\">// 必须强制转换！</span>\n\n<span class=\"comment\">// 有泛型</span>\n<span class=\"type\">List</span>&lt;<span class=\"keyword\">String</span>&gt; list = <span class=\"keyword\">new</span> <span class=\"type\">ArrayList</span>&lt;&gt;();\nlist.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"string\">\"hello\"</span>);\nString s = list.get(0);  <span class=\"comment\">// 直接拿到String，无需转换！</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就像TypeScript的泛型——<code class='inline'>Array&lt;string&gt;</code>比<code class='inline'>any[]</code>安全得多。Java泛型和TS泛型的核心思想完全一样：在编译期检查类型，避免运行时ClassCastException。</div><h3>2. 泛型类：通用的API响应包装</h3><p>在实际工作中，后端接口通常返回统一的JSON结构。我们用泛型类来封装这个结构：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">泛型响应类</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ApiResponse&lt;T&gt; {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> code;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> message;\n    <span class=\"keyword\">private</span> T data;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">ApiResponse</span>(<span class=\"keyword\">int</span> code, <span class=\"keyword\">String</span> message, T data) {\n        <span class=\"keyword\">this</span>.code = code;\n        <span class=\"keyword\">this</span>.message = message;\n        <span class=\"keyword\">this</span>.data = data;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> &lt;T&gt; ApiResponse&lt;T&gt; <span class=\"func\">success</span>(T data) {\n        <span class=\"keyword\">return</span> <span class=\"keyword\">new</span> ApiResponse&lt;&gt;(<span <span class=\"keyword\">class</span>=\"number\">200</span>, <span <span class=\"keyword\">class</span>=\"string\">\"success\"</span>, data);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> &lt;T&gt; ApiResponse&lt;T&gt; <span class=\"func\">error</span>(<span class=\"keyword\">String</span> message) {\n        <span class=\"keyword\">return</span> <span class=\"keyword\">new</span> ApiResponse&lt;&gt;(<span <span class=\"keyword\">class</span>=\"number\">500</span>, message, <span class=\"keyword\">null</span>);\n    }\n    <span class=\"comment\">// getter...</span>\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">GenericDemo.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">class</span> ApiResponse&lt;T&gt; {\n    <span class=\"keyword\">int</span> code;\n    <span class=\"keyword\">String</span> message;\n    T data;\n    <span class=\"func\">ApiResponse</span>(<span class=\"keyword\">int</span> code, <span class=\"keyword\">St
