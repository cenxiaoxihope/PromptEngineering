    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解ACID四大特性</li><li>掌握JDBC事务的commit和rollback</li><li>理解事务隔离级别</li><li>能够实现转账等核心业务的事务控制</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 什么是事务？</h3><p>事务是一组SQL操作的集合，要么全部成功，要么全部失败。最典型的场景是银行转账：A扣款和B加款必须同时成功，不能只执行一半。</p><h3>2. ACID四大特性</h3><ul><li><strong>Atomicity（原子性）</strong>：要么全做，要么全不做</li><li><strong>Consistency（一致性）</strong>：数据始终处于合法状态</li><li><strong>Isolation（隔离性）</strong>：并发事务互不干扰</li><li><strong>Durability（持久性）</strong>：提交后数据永久保存</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>事务就像<strong>网购下单</strong>：扣款 + 生成订单 + 扣库存，这三个操作必须一起成功。如果扣了款但没库存了，必须退款（回滚）。</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">事务基本用法</span></div><code>conn.setAutoCommit(false);  <span class=\"comment\">// 关闭自动提交</span>\n<span class=\"keyword\">try</span> {\n    <span class=\"comment\">// 执行一系列SQL</span>\n    <span class=\"func\">deductFromA</span>(conn, <span <span class=\"keyword\">class</span>=\"number\">100</span>);\n    <span class=\"func\">addToB</span>(conn, <span <span class=\"keyword\">class</span>=\"number\">100</span>);\n    conn.commit();  <span class=\"comment\">// 全部成功，提交</span>\n} <span class=\"keyword\">catch</span> (<span class=\"type\">Exception</span> e) {\n    conn.rollback();  <span class=\"comment\">// 出错，回滚所有操作</span>\n    <span class=\"keyword\">throw</span> e;\n} <span class=\"keyword\">finally</span> {\n    conn.<span class=\"func\">setAutoCommit</span>(<span class=\"keyword\">true</span>);\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">TransferService.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.sql.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> TransferService {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">transfer</span>(<span class=\"type\">Connection</span> conn, <span class=\"keyword\">String</span> from, <span class=\"keyword\">String</span> to, <span class=\"keyword\">double</span> amount) <span class=\"keyword\">throws</span> SQLException {\n        conn.<span class=\"func\">setAutoCommit</span>(<span class=\"keyword\">false</span>);\n        <span class=\"keyword\">try</span> {\n            <span class=\"keyword\">String</span> deduct = <span <span class=\"keyword\">class</span>=\"string\">\"UPDATE accounts SET balance = balance - ? WHERE name = ?\"</span>;\n            <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(deduct)) {\n                ps.<span class=\"func\">setDouble</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, amount);\n                ps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, from);\n                <span class=\"keyword\">int</span> rows = ps.<span class=\"func\">executeUpdate</span>();\n                <span class=\"keyword\">if</span> (rows == <span <span class=\"keyword\">class</span>=\"number\">0</span>) <span class=\"keyword\">throw</span> <span class=\"keyword\">new</span> <span class=\"type\">RuntimeException</span>(<span <span class=\"keyword\">class</span>=\"string\">\"账户不存在\"</span>);\n            }\n            \n            <span class=\"keyword\">String</span> add = <span <span class=\"keyword\">class</span>=\"string\">\"UPDATE accounts SET balance = balance + ? WHERE name = ?\"</span>;\n            <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(add)) {\n                ps.<span class=\"func\">setDouble</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, amount);\n                ps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, to);\n                ps.<span class=\"func\">executeUpdate</span>();\n            }\n            \n            conn.<span class=\"func\">commit</span>();\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"转账成功\"</span>);\n        } <span class=\"keyword\">catch</span> (<span class=\"type\">Exception</span> e) {\n            conn.<span class=\"func\">rollback</span>();\n            <span class=\"type\">System</span>.err.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"转账失败，已回滚: \"</span> + e.<span class=\"func\">getMessage</span>());\n            <span class=\"keyword\">throw</span> e;\n        } <span class=\"keyword\">finally</span> {\n            conn.<span class=\"func\">setAutoCommit</span>(<span class=\"keyword\">true</span>);\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>实现一个完整的转账程序，包含余额校验（不能透支）</li><li>模拟转账过程中断，验证数据库是否正确回滚</li><li>查询不同隔离级别下的并发读取结果</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>忘记setAutoCommit(false)</strong></td><td>事务不生效</td><td>开启事务前必须关闭自动提交</td></tr><tr><td><strong>异常时没rollback</strong></td><td>数据处于不一致状态</td><td>catch块里一定要rollback</td></tr><tr><td><strong>事务范围过大</strong></td><td>持有锁时间过长</td><td>把与事务无关的代码移到外面</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第25课：周实战 —— 简易用户管理系统（JDBC版）。综合运用本周知识。</div>"
},
{
    id: 25,
    week: 5,
    title: "周实战：简易用户管理系统（JDBC版）",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>综合运用JDBC、连接池和事务</li><li>设计清晰的分层架构（DAO/Service）</li><li>完成用户的增删改查功能</li><li>编写可维护的数据库访问代码</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserDao.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.sql.*;\n<span class=\"keyword\">import</span> java.util.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserDao {\n    <span class=\"keyword\">private</span> <span class=\"type\">Connection</span> conn;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">UserDao</span>(<span class=\"type\">Connection</span> conn) { <span class=\"keyword\">this</span>.conn = conn; }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">addUser</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">int</span> age) <span class=\"keyword\">throws</span> SQLException {\n        <span class=\"keyword\">String</span> sql = <span <span class=\"keyword\">class</span>=\"string\">\"INSERT INTO <span class=\"func\">users</span>(name, age) <span class=\"func\">VALUES</span>(?, ?)\"</span>;\n        <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(sql)) {\n            ps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, name);\n            ps.<span class=\"func\">setInt</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, age);\n            ps.<span class=\"func\">executeUpdate</span>();\n        }\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"type\">List</span>&lt;User&gt; <span class=\"func\">getAllUsers</span>() <span class=\"keyword\">throws</span> SQLException {\n        <span class=\"type\">List</span>&lt;User&gt; list = <span class=\"keyword\">new</span> <span class=\"type\">ArrayList</span>&lt;&gt;();\n        <span class=\"keyword\">String</span> sql = <span <span class=\"keyword\">class</span>=\"string\">\"SELECT * FROM users\"</span>;\n        <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(sql);\n             <span class=\"type\">ResultSet</span> rs = ps.<span class=\"func\">executeQuery</span>()) {\n            <span class=\"keyword\">while</span> (rs.<span class=\"func\">next</span>()) {\n                list.<span class=\"func\">add</span>(<span class=\"keyword\">new</span> <span class=\"func\">User</span>(rs.<span class=\"func\">getInt</span>(<span <span class=\"keyword\">class</span>=\"string\">\"id\"</span>), rs.<span class=\"func\">getString</span>(<span <span class=\"keyword\">class</span>=\"string\">\"name\"</span>), rs.<span class=\"func\">getInt</span>(<span <span class=\"keyword\">class</span>=\"string\">\"age\"</span>)));\n            }\n        }\n        <span class=\"keyword\">return</span> list;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">deleteUser</span>(<span class=\"keyword\">int</span> id) <span class=\"keyword\">throws</span> SQLException {\n        <span class=\"keyword\">String</span> sql = <span <span class=\"keyword\">class</span>=\"string\">\"DELETE FROM users WHERE id = ?\"</span>;\n        <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(sql)) {\n            ps.<span class=\"func\">setInt</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, id);\n            ps.<span class=\"func\">executeUpdate</span>();\n        }\n    }\n}</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserService.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.sql.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserService {\n    <span class=\"keyword\">private</span> UserDao userDao;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">UserService</span>(<span class=\"type\">Connection</span> conn) {\n        <span class=\"keyword\">this</span>.userDao = <span class=\"keyword\">new</span> <span class=\"func\">UserDao</span>(conn);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">registerUser</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">int</span> age) <span class=\"keyword\">throws</span> SQLException {\n        <span class=\"comment\">// 业务校验</span>\n        <span class=\"keyword\">if</span> (name == <span class=\"keyword\">null</span> || name.<span class=\"func\">length</span>() &lt; <span <span class=\"keyword\">class</span>=\"number\">2</span>) {\n            <span class=\"keyword\">throw</span> <span class=\"keyword\">new</span> <span class=\"func\">IllegalArgumentException</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户名至少2个字符\"</span>);\n        }\n        userDao.<span class=\"func\">addUser</span>(name, age);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>给UserDao增加按ID查询和按姓名模糊查询功能</li><li>给UserService增加事务控制（注册时同时创建账户记录）</li><li>为所有方法添加详细的日志输出</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第6周：Maven与构建工具。我们将学习现代Java项目的构建方式。</div>"
},
{
    id: 26,
    week: 6,
    title: "Maven基础 —— 依赖管理与项目构建",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解Maven的作用和核心概念</li><li>掌握pom.xml的基本结构</li><li>学会添加和管理依赖</li><li>熟悉Maven的生命周期和常用命令</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 为什么需要Maven？</h3><p>在没有Maven的时代，Java项目需要手动下载jar包、处理依赖冲突、编译打包，非常痛苦。Maven就像前端里的<strong>npm/yarn/pnpm</strong>——自动管理依赖、标准化项目结构、一键构建打包。</p><h3>2. Maven坐标（GAV）</h3><p>每个Maven构件都有唯一的坐标：GroupId（组织名）、ArtifactId（项目名）、Version（版本号）。就像npm包的<code class='inline'>package-name@version</code>。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">依赖示例</span></div><code>&lt;dependency&gt;\n    &lt;groupId&gt;mysql&lt;/groupId&gt;\n    &lt;artifactId&gt;mysql-connector-java&lt;/artifactId&gt;\n    &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">8.0</span>.<span <span class=\"keyword\">class</span>=\"number\">33</span>&lt;/version&gt;\n&lt;/dependency&gt;</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>pom.xml就像前端的<strong>package.json</strong>，记录项目信息和依赖。Maven仓库就像<strong>npm registry</strong>，存放所有公共jar包。本地仓库就像<strong>node_modules</strong>，下载的依赖都放这里。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">pom.xml</span></div><code>&lt;project xmlns=\"http:<span class=\"comment\">//maven.apache.org/POM/4.0.0\"&gt;</span>\n    &lt;modelVersion&gt;<span <span class=\"keyword\">class</span>=\"number\">4.0</span>.<span <span class=\"keyword\">class</span>=\"number\">0</span>&lt;/modelVersion&gt;\n    &lt;groupId&gt;com.example&lt;/groupId&gt;\n    &lt;artifactId&gt;java-course-demo&lt;/artifactId&gt;\n    &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">1.0</span>-SNAPSHOT&lt;/version&gt;\n    &lt;packaging&gt;jar&lt;/packaging&gt;\n    \n    &lt;properties&gt;\n        &lt;maven.compiler.source&gt;<span <span class=\"keyword\">class</span>=\"number\">17</span>&lt;/maven.compiler.source&gt;\n        &lt;maven.compiler.target&gt;<span <span class=\"keyword\">class</span>=\"number\">17</span>&lt;/maven.compiler.target&gt;\n        &lt;project.build.sourceEncoding&gt;UTF-<span <span class=\"keyword\">class</span>=\"number\">8</span>&lt;/project.build.sourceEncoding&gt;\n    &lt;/properties&gt;\n    \n    &lt;dependencies&gt;\n        &lt;dependency&gt;\n            &lt;groupId&gt;mysql&lt;/groupId&gt;\n            &lt;artifactId&gt;mysql-connector-java&lt;/artifactId&gt;\n            &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">8.0</span>.<span <span class=\"keyword\">class</span>=\"number\">33</span>&lt;/version&gt;\n        &lt;/dependency&gt;\n        &lt;dependency&gt;\n            &lt;groupId&gt;com.zaxxer&lt;/groupId&gt;\n            &lt;artifactId&gt;HikariCP&lt;/artifactId&gt;\n            &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">5.0</span>.<span <span class=\"keyword\">class</span>=\"number\">1</span>&lt;/version&gt;\n        &lt;/dependency&gt;\n    &lt;/dependencies&gt;\n&lt;/project&gt;</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>创建一个Maven项目，添加MySQL和HikariCP依赖</li><li>运行mvn clean compile和mvn package命令</li><li>查看本地仓库中下载的jar包路径</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>依赖冲突</strong></td><td>同一个jar的不同版本共存</td><td>用mvn dependency:tree排查</td></tr><tr><td><strong>网络问题</strong></td><td>中央仓库下载慢</td><td>配置阿里云镜像</td></tr><tr><td><strong>JDK版本不匹配</strong></td><td>编译报错class version</td><td>确认pom.xml中source/target版本</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第27课：单元测试 —— JUnit 5。学习如何写出靠谱的测试代码。</div>"
},
{
    id: 27,
    week: 6,
    title: "单元测试 —— JUnit 5",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解单元测试的重要性</li><li>掌握JUnit 5的基本注解</li><li>学会编写断言</li><li>了解测试覆盖率和Mock的概念</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 为什么要写单元测试？</h3><p>单元测试是对代码中最小可测试单元（通常是方法）的验证。它就像前端开发中的<strong>组件测试</strong>——确保每个零件在组装前都是正常的。有了单元测试，重构代码时才有底气。</p><h3>2. JUnit 5 核心注解</h3><ul><li><strong>@Test</strong>：标记测试方法</li><li><strong>@BeforeEach</strong>：每个测试前执行（类似setup）</li><li><strong>@AfterEach</strong>：每个测试后执行（类似teardown）</li><li><strong>@BeforeAll/@AfterAll</strong>：类级别，只执行一次</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JUnit就像前端的<strong>Jest/Vitest</strong>。你在写业务代码的同时写测试代码，跑测试就像跑<code class='inline'>npm test</code>，绿色表示通过，红色表示失败。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">CalculatorTest.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> org.junit.jupiter.api.*;\n<span class=\"keyword\">import</span> <span class=\"keyword\">static</span> org.junit.jupiter.api.Assertions.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> CalculatorTest {\n    <span class=\"keyword\">private</span> Calculator calc;\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Before</span></span>Each\n    <span class=\"keyword\">void</span> <span class=\"func\">setUp</span>() {\n        calc = <span class=\"keyword\">new</span> <span class=\"func\">Calculator</span>();\n    }\n    \n    @Test\n    <span class=\"keyword\">void</span> <span class=\"func\">testAdd</span>() {\n        <span class=\"func\">assertEquals</span>(<span <span class=\"keyword\">class</span>=\"number\">5</span>, calc.<span class=\"func\">add</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, <span <span class=\"keyword\">class</span>=\"number\">3</span>));\n    }\n    \n    @Test\n    <span class=\"keyword\">void</span> <span class=\"func\">testDivideByZero</span>() {\n        <span class=\"type\">Exception</span> e = <span class=\"func\">assertThrows</span>(ArithmeticException.<span class=\"keyword\">class</span>, () -&gt; calc.<span class=\"func\">divide</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"number\">0</span>));\n        <span class=\"func\">assertEquals</span>(<span <span class=\"keyword\">class</span>=\"string\">\"/ by zero\"</span>, e.<span class=\"func\">getMessage</span>());\n    }\n    \n    @Test\n    <span class=\"keyword\">void</span> <span class=\"func\">testArray</span>() {\n        <span class=\"keyword\">int</span>[] expected = {<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"number\">2</span>, <span <span class=\"keyword\">class</span>=\"number\">3</span>};\n        <span class=\"func\">assertArrayEquals</span>(expected, calc.<span class=\"func\">toArray</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"number\">2</span>, <span <span class=\"keyword\">class</span>=\"number\">3</span>));\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>为购物车类ShoppingCart编写完整的JUnit测试</li><li>测试边界条件（空购物车、负数数量）</li><li>用Maven运行测试：mvn test</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>测试方法必须是public void</strong></td><td>JUnit 5要求更宽松</td><td>但方法仍不能是private/static</td></tr><tr><td><strong>测试之间不应有依赖</strong></td><td>测试A的结果影响测试B</td><td>每个测试独立，用@BeforeEach重置状态</td></tr><tr><td><strong>assertEquals参数顺序</strong></td><td>assertEquals(expected, actual)</td><td>第一个参数是期望值，第二个是实际值</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第28课：日志框架 —— SLF4J + Logback。学习专业的日志记录。</div>"
},
{
    id: 28,
    week: 6,
    title: "日志框架 —— SLF4J + Logback",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解为什么不用System.out.println</li><li>掌握SLF4J + Logback的使用</li><li>理解日志级别（DEBUG/INFO/WARN/ERROR）</li><li>能够配置日志输出格式和目的地</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 为什么不用System.out.println？</h3><ul><li>无法分级控制——要么全输出，要么全关掉</li><li>无法灵活配置输出位置（文件/控制台/远程）</li><li>格式固定，不方便分析</li><li>性能差——同步输出会阻塞程序</li></ul><h3>2. SLF4J + Logback 架构</h3><p>SLF4J是日志门面（接口），Logback是实现。就像前端里你写<code class='inline'>console.log</code>，但可以通过配置决定输出到哪里、什么级别。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">日志使用方式</span></div><code><span class=\"keyword\">import</span> org.slf4j.<span class=\"type\">Logger</span>;\n<span class=\"keyword\">import</span> org.slf4j.LoggerFactory;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserService {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">static</span> <span class=\"keyword\">final</span> <span class=\"type\">Logger</span> log = LoggerFactory.<span class=\"func\">getLogger</span>(UserService.<span class=\"keyword\">class</span>);\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">login</span>(<span class=\"keyword\">String</span> user) {\n        log.<span class=\"func\">debug</span>(<span <span class=\"keyword\">class</span>=\"string\">\"开始登录流程, user={}\"</span>, user);\n        log.<span class=\"func\">info</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户 {} 登录成功\"</span>, user);\n        log.<span class=\"func\">warn</span>(<span <span class=\"keyword\">class</span>=\"string\">\"密码即将过期, user={}\"</span>, user);\n        log.<span class=\"func\">error</span>(<span <span class=\"keyword\">class</span>=\"string\">\"登录异常\"</span>, exception);\n    }\n}</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>使用{}占位符而不是字符串拼接，日志框架会在真正需要输出时才拼接字符串，提升性能。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">logback.xml</span></div><code>&lt;configuration&gt;\n    &lt;appender name=<span <span class=\"keyword\">class</span>=\"string\">\"CONSOLE\"</span> <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"ch.qos.logback.core.ConsoleAppender\"</span>&gt;\n        &lt;encoder&gt;\n            &lt;pattern&gt;%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{<span <span class=\"keyword\">class</span>=\"number\">36</span>} - %msg%n&lt;/pattern&gt;\n        &lt;/encoder&gt;\n    &lt;/appender&gt;\n    \n    &lt;appender name=<span <span class=\"keyword\">class</span>=\"string\">\"FILE\"</span> <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"ch.qos.logback.core.FileAppender\"</span>&gt;\n        &lt;file&gt;app.log&lt;/file&gt;\n        &lt;encoder&gt;\n            &lt;pattern&gt;%d{yyyy-MM-dd HH:mm:ss} %-5level %msg%n&lt;/pattern&gt;\n        &lt;/encoder&gt;\n    &lt;/appender&gt;\n    \n    &lt;root level=<span <span class=\"keyword\">class</span>=\"string\">\"info\"</span>&gt;\n        &lt;appender-ref ref=<span <span class=\"keyword\">class</span>=\"string\">\"CONSOLE\"</span> /&gt;\n        &lt;appender-ref ref=<span <span class=\"keyword\">class</span>=\"string\">\"FILE\"</span> /&gt;\n    &lt;/root&gt;\n&lt;/configuration&gt;</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>将之前写的UserService改为使用日志输出</li><li>配置logback.xml，让DEBUG级别日志输出到debug.log</li><li>对比System.out.println和日志框架的性能差异</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>日志参数过多</strong></td><td>log.info(\"a={}, b={}, c={}\", a, b, c, d)</td><td>参数个数不匹配会报警告</td></tr><tr><td><strong>在生产环境开DEBUG</strong></td><td>日志量过大影响性能</td><td>生产环境建议INFO及以上</td></tr><tr><td><strong>记录敏感信息</strong></td><td>log.info(\"password={}\", pwd)</td><td>永远不要记录密码、token等敏感信息</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第29课：Lombok与常用工具库。学习简化代码的利器。</div>"
},
{
    id: 29,
    week: 6,
    title: "Lombok与常用工具库",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握Lombok的核心注解</li><li>理解Lombok的原理</li><li>了解Apache Commons Lang和Gson</li><li>能够简化日常Java开发</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Lombok是什么？</h3><p>Lombok是一个编译时注解处理器，通过注解自动生成getter、setter、构造器、toString等样板代码。原本50行的POJO，用了Lombok可能只需10行。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Lombok前后对比</span></div><code><span class=\"comment\">// 使用前：大量样板代码</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> age;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">getName</span>() { <span class=\"keyword\">return</span> name; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">setName</span>(<span class=\"keyword\">String</span> name) { <span class=\"keyword\">this</span>.name = name; }\n    <span class=\"comment\">// ... getter/setter/toString/equals/hashCode</span>\n}\n\n<span class=\"comment\">// 使用后：简洁优雅</span>\n<span class=\"keyword\">import</span> lombok.Data;\n@Data\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> age;\n}</code></div><h3>2. 常用注解</h3><ul><li><strong>@Data</strong>：生成getter/setter/toString/equals/hashCode</li><li><strong>@Getter/@Setter</strong>：单独生成</li><li><strong>@NoArgsConstructor/@AllArgsConstructor</strong>：生成构造器</li><li><strong>@Builder</strong>：建造者模式</li><li><strong>@Slf4j</strong>：自动创建日志对象</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Lombok就像前端里的<strong>ES6+语法糖</strong>——class属性自动有getter/setter（类似Vue的响应式），@Builder就像jQuery的链式调用<code class='inline'>$().addClass().show()</code>。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">LombokDemo.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> lombok.*;\n\n@Data\n@Builder\n@NoArgsConstructor\n@AllArgsConstructor\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> Product {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> id;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">double</span> price;\n}\n\n<span class=\"comment\">// 使用</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> LombokDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        Product p = Product.<span class=\"func\">builder</span>()\n            .<span class=\"func\">id</span>(<span <span class=\"keyword\">class</span>=\"string\">\"P001\"</span>)\n            .<span class=\"func\">name</span>(<span <span class=\"keyword\">class</span>=\"string\">\"iPhone\"</span>)\n            .<span class=\"func\">price</span>(<span <span class=\"keyword\">class</span>=\"number\">6999.0</span>)\n            .<span class=\"func\">build</span>();\n        System.out.println(p);  <span class=\"comment\">// 自动调用toString</span>\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(p.<span class=\"func\">getName</span>());\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>将之前写的User/Order类改造为使用Lombok</li><li>使用@Builder模式创建一个复杂对象</li><li>尝试@Slf4j注解，替换手动创建的Logger</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>IDE需要装插件</strong></td><td>没装Lombok插件代码会报错</td><td>IntelliJ IDEA装Lombok插件</td></tr><tr><td><strong>队友没装Lombok</strong></td><td>他pull代码后编译不过</td><td>确保团队统一使用，或不用Lombok</td></tr><tr><td><strong>过度使用@Data</strong></td><td>暴露不该暴露的setter</td><td>仔细考虑哪些字段需要setter</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第30课：周实战 —— 重构购物车项目。用Maven+JUnit+日志+Lombok全面升级。</div>"
},
{
    id: 30,
    week: 6,
    title: "周实战：重构购物车项目",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>将购物车项目改造为Maven项目</li><li>使用Lombok简化实体类</li><li>添加JUnit测试覆盖核心逻辑</li><li>使用SLF4J替换所有System.out.println</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">pom.xml（片段）</span></div><code>&lt;dependencies&gt;\n    &lt;dependency&gt;\n        &lt;groupId&gt;org.projectlombok&lt;/groupId&gt;\n        &lt;artifactId&gt;lombok&lt;/artifactId&gt;\n        &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">1.18</span>.<span <span class=\"keyword\">class</span>=\"number\">30</span>&lt;/version&gt;\n        &lt;scope&gt;provided&lt;/scope&gt;\n    &lt;/dependency&gt;\n    &lt;dependency&gt;\n        &lt;groupId&gt;org.junit.jupiter&lt;/groupId&gt;\n        &lt;artifactId&gt;junit-jupiter&lt;/artifactId&gt;\n        &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">5.10</span>.<span <span class=\"keyword\">class</span>=\"number\">0</span>&lt;/version&gt;\n        &lt;scope&gt;test&lt;/scope&gt;\n    &lt;/dependency&gt;\n    &lt;dependency&gt;\n        &lt;groupId&gt;org.slf4j&lt;/groupId&gt;\n        &lt;artifactId&gt;slf4j-api&lt;/artifactId&gt;\n        &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">2.0</span>.<span <span class=\"keyword\">class</span>=\"number\">9</span>&lt;/version&gt;\n    &lt;/dependency&gt;\n    &lt;dependency&gt;\n        &lt;groupId&gt;ch.qos.logback&lt;/groupId&gt;\n        &lt;artifactId&gt;logback-classic&lt;/artifactId&gt;\n        &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">1.4</span>.<span <span class=\"keyword\">class</span>=\"number\">11</span>&lt;/version&gt;\n    &lt;/dependency&gt;\n&lt;/dependencies&gt;</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">ShoppingCart.java（重构后）</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> lombok.extern.slf4j.Slf4j;\n<span class=\"keyword\">import</span> java.util.*;\n\n@Slf4j\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ShoppingCart {\n    <span class=\"keyword\">private</span> <span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, CartItem&gt; items = <span class=\"keyword\">new</span> <span class=\"type\">HashMap</span>&lt;&gt;();\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">addItem</span>(CartItem item) {\n        log.<span class=\"func\">info</span>(<span <span class=\"keyword\">class</span>=\"string\">\"添加商品: {}\"</span>, item.<span class=\"func\">getName</span>());\n        items.<span class=\"func\">merge</span>(item.<span class=\"func\">getProductId</span>(), item, (old, neu) -&gt; {\n            old.<span class=\"func\">setQuantity</span>(old.<span class=\"func\">getQuantity</span>() + neu.<span class=\"func\">getQuantity</span>());\n            <span class=\"keyword\">return</span> old;\n        });\n    }\n    <span class=\"comment\">// ...</span>\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>完成整个项目的Maven迁移</li><li>为所有Service类编写JUnit测试</li><li>配置logback，分别输出到控制台和文件</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第7周：Spring Boot入门。我们将进入企业级开发的核心框架。</div>"
},

    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解Spring Boot的核心价值</li><li>掌握Spring Initializr创建项目</li><li>理解自动配置原理</li><li>能够编写并运行第一个REST接口</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Spring Boot是什么？</h3><p>Spring Boot是Spring框架的扩展，它通过<strong>约定大于配置</strong>的理念，让开发者快速搭建生产级别的Spring应用。类比前端，它就像<strong>Create React App / Vite</strong>——帮你把webpack、babel、devServer都配好了，你只管写业务代码。</p><h3>2. 核心特性</h3><ul><li><strong>自动配置</strong>：根据classpath中的依赖自动配置Spring应用</li><li><strong>起步依赖</strong>：starter简化Maven配置</li><li><strong>内嵌服务器</strong>：内置Tomcat，直接运行jar包</li><li><strong>Actuator</strong>：生产级监控和管理端点</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Spring Boot就像前端的<strong>Next.js/Nuxt.js</strong>——在底层框架（React/Vue）之上做了大量最佳实践的封装，让你开箱即用。</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">第一个Controller</span></div><code><span class=\"keyword\">package</span> com.example.demo;\n\n<span class=\"keyword\">import</span> org.springframework.web.bind.annotation.*;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RestController</span></span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> HelloController {\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/hello\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">hello</span>() {\n        <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"Hello, Spring Boot!\"</span>;\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/hello/{name}\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">String</span> <span class=\"func\">helloName</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PathVariable</span></span> <span class=\"keyword\">String</span> name) {\n        <span class=\"keyword\">return</span> <span <span class=\"keyword\">class</span>=\"string\">\"Hello, \"</span> + name + <span <span class=\"keyword\">class</span>=\"string\">\"!\"</span>;\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 项目结构与启动</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">项目结构</span></div><code>src\n├── main\n│   ├── java\n│   │   └── com\n│   │       └── example\n│   │           └── demo\n│   │               ├── DemoApplication.java   <span class=\"comment\">// 启动类</span>\n│   │               └── controller\n│   │                   └── HelloController.java\n│   └── resources\n│       └── application.properties\n└── test\n    └── java\n        └── ...</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">DemoApplication.java</span></div><code><span class=\"keyword\">package</span> com.example.demo;\n\n<span class=\"keyword\">import</span> org.springframework.boot.<span class=\"type\">SpringApplication</span>;\n<span class=\"keyword\">import</span> org.springframework.boot.autoconfigure.SpringBootApplication;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@SpringBootApplication</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> DemoApplication {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"type\">SpringApplication</span>.<span class=\"func\">run</span>(DemoApplication.<span class=\"keyword\">class</span>, args);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>用Spring Initializr创建一个项目，添加Spring Web依赖</li><li>写一个GET接口返回当前时间</li><li>写一个POST接口接收JSON参数并原样返回</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>启动类位置不对</strong></td><td>@SpringBootApplication没在根包</td><td>启动类要放在com.example这种根包下</td></tr><tr><td><strong>端口冲突</strong></td><td>8080被占用</td><td>server.port=8081修改端口</td></tr><tr><td><strong>依赖没加</strong></td><td>缺少spring-boot-starter-web</td><td>确保pom.xml有web starter</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第32课：Spring Web —— Controller与请求处理。学习完整的请求响应流程。</div>"
},
{
    id: 32,

    title: "Spring Web —— Controller与请求处理",
    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握@RestController和@RequestMapping</li><li>熟练使用各种参数注解</li><li>理解请求和响应的流程</li><li>能够处理GET/POST/PUT/DELETE请求</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 常用注解速查</h3><table class=\"compare-table\"><tr><th>注解</th><th>作用</th><th>类比前端</th></tr><tr><td>@RestController</td><td>标记类为REST控制器，返回JSON</td><td>API路由处理器</td></tr><tr><td>@RequestMapping</td><td>通用路由映射</td><td>Express的app.get/post</td></tr><tr><td>@GetMapping</td><td>处理GET请求</td><td>fetch GET</td></tr><tr><td>@PostMapping</td><td>处理POST请求</td><td>fetch POST</td></tr><tr><td>@RequestParam</td><td>获取URL参数（?name=xx）</td><td>URLSearchParams</td></tr><tr><td>@PathVariable</td><td>获取路径参数（/user/{id}）</td><td>React Router params</td></tr><tr><td>@RequestBody</td><td>获取请求体JSON</td><td>req.body</td></tr></table><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Spring的Controller就像前端框架里的<strong>API路由文件</strong>（如Next.js的app/api/route.ts）。一个URL进来，路由匹配到方法，方法处理请求参数，返回响应数据。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserController.java</span></div><code><span class=\"keyword\">package</span> com.example.demo.controller;\n\n<span class=\"keyword\">import</span> org.springframework.web.bind.annotation.*;\n<span class=\"keyword\">import</span> java.util.*;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RestController</span></span>\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/users\"</span>)\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserController {\n    <span class=\"keyword\">private</span> <span class=\"type\">List</span>&lt;<span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Object</span>&gt;&gt; users = <span class=\"keyword\">new</span> <span class=\"type\">ArrayList</span>&lt;&gt;();\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> idCounter = <span <span class=\"keyword\">class</span>=\"number\">1</span>;\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"type\">List</span>&lt;<span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Object</span>&gt;&gt; <span class=\"func\">list</span>() {\n        <span class=\"keyword\">return</span> users;\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/{}\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Object</span>&gt; <span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PathVariable</span></span> <span class=\"keyword\">int</span> id) {\n        <span class=\"keyword\">return</span> users.<span class=\"func\">stream</span>()\n            .<span class=\"func\">filter</span>(u -&gt; (<span class=\"keyword\">int</span>)u.<span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=\"string\">\"id\"</span>) == id)\n            .<span class=\"func\">findFirst</span>()\n            .<span class=\"func\">orElse</span>(<span class=\"keyword\">null</span>);\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PostMapping</span></span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Object</span>&gt; <span class=\"func\">create</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestBody</span></span> <span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, <span class=\"type\">Object</span>&gt; user) {\n        user.<span class=\"func\">put</span>(<span <span class=\"keyword\">class</span>=\"string\">\"id\"</span>, idCounter++);\n        users.<span class=\"func\">add</span>(user);\n        <span class=\"keyword\">return</span> user;\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">DeleteMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/{}\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">delete</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PathVariable</span></span> <span class=\"keyword\">int</span> id) {\n        users.<span class=\"func\">removeIf</span>(u -&gt; (<span class=\"keyword\">int</span>)u.<span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=\"string\">\"id\"</span>) == id);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>为UserController添加@PutMapping更新接口</li><li>添加分页查询（@RequestParam int page, int size）</li><li>添加参数校验（name不能为空）</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>@RequestBody需要JSON</strong></td><td>发送form-data会报错</td><td>前端发送Content-Type: application/json</td></tr><tr><td><strong>@PathVariable类型不匹配</strong></td><td>/users/abc对应int id</td><td>确保URL参数类型和方法参数一致</td></tr><tr><td><strong>忘记加@RestController</strong></td><td>方法返回字符串而不是JSON</td><td>检查是否有@RestController注解</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第33课：Spring Data JPA —— 数据库操作简化。告别手写SQL。</div>"
},
{
    id: 33,
    week: 7,
    title: "Spring Data JPA —— 数据库操作简化",
    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解ORM和JPA的概念</li><li>掌握实体类注解（@Entity, @Id等）</li><li>学会使用Repository接口</li><li>能够实现自动CRUD操作</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 什么是ORM？</h3><p>ORM（Object-Relational Mapping）对象关系映射，让你用操作对象的方式操作数据库，不用手写SQL。就像前端里用<strong>ORM库（如Prisma）</strong>代替直接写SQL。</p><h3>2. JPA核心注解</h3><ul><li><strong>@Entity</strong>：标记为实体类，对应数据库表</li><li><strong>@Id</strong>：主键</li><li><strong>@GeneratedValue</strong>：主键生成策略</li><li><strong>@Column</strong>：字段映射</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JPA就像前端的<strong>ORM/Prisma</strong>——你定义一个模型（User），ORM自动帮你生成数据库表、自动帮你写查询语句。你只需要操作Java对象，不用关心底层SQL。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">User.java（实体类）</span></div><code><span class=\"keyword\">package</span> com.example.demo.entity;\n\n<span class=\"keyword\">import</span> jakarta.persistence.*;\n<span class=\"keyword\">import</span> lombok.Data;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Entity</span></span>\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Table</span></span>(name = <span <span class=\"keyword\">class</span>=\"string\">\"users\"</span>)\n@Data\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> User {\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Id</span></span>\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GeneratedValue</span></span>(strategy = GenerationType.IDENTITY)\n    <span class=\"keyword\">private</span> Long id;\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Column</span></span>(nullable = <span class=\"keyword\">false</span>)\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> name;\n    \n    <span class=\"keyword\">private</span> <span class=\"type\">Integer</span> age;\n}</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserRepository.java</span></div><code><span class=\"keyword\">package</span> com.example.demo.repository;\n\n<span class=\"keyword\">import</span> com.example.demo.entity.User;\n<span class=\"keyword\">import</span> org.springframework.data.jpa.repository.JpaRepository;\n<span class=\"keyword\">import</span> org.springframework.stereotype.<span class=\"type\">Repository</span>;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Repository</span></span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">interface</span> UserRepository <span class=\"keyword\">extends</span> JpaRepository&lt;User, Long&gt; {\n    <span class=\"comment\">// 自动获得：save/findAll/findById/deleteById</span>\n    <span class=\"comment\">// 自定义查询方法（按约定命名）</span>\n    <span class=\"type\">List</span>&lt;User&gt; <span class=\"func\">findByNameContaining</span>(<span class=\"keyword\">String</span> name);\n    <span class=\"type\">List</span>&lt;User&gt; <span class=\"func\">findByAgeGreaterThan</span>(<span class=\"keyword\">int</span> age);\n}</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserService.java</span></div><code><span class=\"keyword\">package</span> com.example.demo.service;\n\n<span class=\"keyword\">import</span> com.example.demo.entity.User;\n<span class=\"keyword\">import</span> com.example.demo.repository.UserRepository;\n<span class=\"keyword\">import</span> org.springframework.beans.factory.annotation.<span class=\"type\">Autowired</span>;\n<span class=\"keyword\">import</span> org.springframework.stereotype.<span class=\"type\">Service</span>;\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">List</span>;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Service</span></span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserService {\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Autowired</span></span>\n    <span class=\"keyword\">private</span> UserRepository userRepository;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> User <span class=\"func\">createUser</span>(<span class=\"keyword\">String</span> name, <span class=\"keyword\">int</span> age) {\n        User user = <span class=\"keyword\">new</span> <span class=\"func\">User</span>();\n        user.<span class=\"func\">setName</span>(name);\n        user.<span class=\"func\">setAge</span>(age);\n        <span class=\"keyword\">return</span> userRepository.<span class=\"func\">save</span>(user);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"type\">List</span>&lt;User&gt; <span class=\"func\">findAll</span>() {\n        <span class=\"keyword\">return</span> userRepository.<span class=\"func\">findAll</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>为User实体添加email字段，并设置为唯一</li><li>在Repository中添加按年龄区间查询的方法</li><li>实现分页查询（使用Pageable）</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>Entity没无参构造</strong></td><td>JPA需要无参构造</td><td>添加@NoArgsConstructor或用默认构造</td></tr><tr><td><strong>表名冲突</strong></td><td>类名是数据库关键字</td><td>用@Table(name=\"...\")指定表名</td></tr><tr><td><strong>LazyInitializationException</strong></td><td>在Session外访问关联对象</td><td>用EAGER fetch或在事务内访问</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第34课：全局异常处理与统一响应。让接口更加专业规范。</div>"
},

    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握@ControllerAdvice全局异常处理</li><li>学会封装统一的API响应结构</li><li>能够进行基本的参数校验</li><li>让接口返回格式更加规范</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 为什么需要统一异常处理？</h3><p>如果没有统一异常处理，每个Controller都要try-catch，代码重复且容易遗漏。统一的异常处理器可以集中处理所有异常，返回规范的JSON错误信息。</p><h3>2. @ControllerAdvice + @ExceptionHandler</h3><p>@ControllerAdvice标记的类可以全局拦截Controller的异常。@ExceptionHandler指定处理哪种类型的异常。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">全局异常处理</span></div><code><span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RestController</span></span>Advice\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> GlobalExceptionHandler {\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">ExceptionHandler</span></span>(<span class=\"type\">RuntimeException</span>.<span class=\"keyword\">class</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;?&gt; <span class=\"func\">handleRuntime</span>(<span class=\"type\">RuntimeException</span> e) {\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">error</span>(<span <span class=\"keyword\">class</span>=\"number\">500</span>, e.<span class=\"func\">getMessage</span>());\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">ExceptionHandler</span></span>(MethodArgumentNotValidException.<span class=\"keyword\">class</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;?&gt; <span class=\"func\">handleValidation</span>(MethodArgumentNotValidException e) {\n        <span class=\"keyword\">String</span> msg = e.<span class=\"func\">getBindingResult</span>().<span class=\"func\">getFieldErrors</span>().<span class=\"func\">stream</span>()\n            .<span class=\"func\">map</span>(err -&gt; err.<span class=\"func\">getField</span>() + <span <span class=\"keyword\">class</span>=\"string\">\": \"</span> + err.<span class=\"func\">getDefaultMessage</span>())\n            .<span class=\"func\">collect</span>(Collectors.<span class=\"func\">joining</span>(<span <span class=\"keyword\">class</span>=\"string\">\", \"</span>));\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">error</span>(<span <span class=\"keyword\">class</span>=\"number\">400</span>, msg);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">统一响应类 + 异常处理</span></div><code><span class=\"keyword\">package</span> com.example.demo.common;\n\n<span class=\"keyword\">import</span> lombok.Data;\n\n@Data\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ApiResponse&lt;T&gt; {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> code;\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> message;\n    <span class=\"keyword\">private</span> T data;\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> &lt;T&gt; ApiResponse&lt;T&gt; <span class=\"func\">ok</span>(T data) {\n        ApiResponse&lt;T&gt; r = <span class=\"keyword\">new</span> ApiResponse&lt;&gt;();\n        r.<span class=\"func\">setCode</span>(<span <span class=\"keyword\">class</span>=\"number\">200</span>);\n        r.<span class=\"func\">setMessage</span>(<span <span class=\"keyword\">class</span>=\"string\">\"success\"</span>);\n        r.<span class=\"func\">setData</span>(data);\n        <span class=\"keyword\">return</span> r;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> &lt;T&gt; ApiResponse&lt;T&gt; <span class=\"func\">error</span>(<span class=\"keyword\">int</span> code, <span class=\"keyword\">String</span> msg) {\n        ApiResponse&lt;T&gt; r = <span class=\"keyword\">new</span> ApiResponse&lt;&gt;();\n        r.<span class=\"func\">setCode</span>(code);\n        r.<span class=\"func\">setMessage</span>(msg);\n        <span class=\"keyword\">return</span> r;\n    }\n}</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">参数校验</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserDTO {\n    @<span class=\"func\">NotBlank</span>(message = <span <span class=\"keyword\">class</span>=\"string\">\"姓名不能为空\"</span>)\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> name;\n    \n    @<span class=\"func\">Min</span>(value = <span <span class=\"keyword\">class</span>=\"number\">1</span>, message = <span <span class=\"keyword\">class</span>=\"string\">\"年龄必须大于0\"</span>)\n    @<span class=\"func\">Max</span>(value = <span <span class=\"keyword\">class</span>=\"number\">150</span>, message = <span <span class=\"keyword\">class</span>=\"string\">\"年龄不合法\"</span>)\n    <span class=\"keyword\">private</span> <span class=\"keyword\">int</span> age;\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>为所有Controller添加统一响应包装</li><li>添加自定义业务异常BusinessException及处理</li><li>为UserDTO添加邮箱格式校验</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>@Valid没加</strong></td><td>校验注解不生效</td><td>方法参数前加@Valid</td></tr><tr><td><strong>异常被吞掉</strong></td><td>异常处理器没记录日志</td><td>异常处理时打印完整堆栈</td></tr><tr><td><strong>返回String报错</strong></td><td>包装后类型不一致</td><td>统一返回对象，不要直接返回String</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第35课：周实战 —— RESTful商品管理API。综合运用Spring Boot知识。</div>"
},
{
    id: 35,
    week: 7,
    title: "周实战：RESTful商品管理API",
    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>综合运用Spring Boot + JPA</li><li>设计RESTful风格的商品CRUD接口</li><li>实现统一异常处理和响应</li><li>完成一个接近真实场景的API模块</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">ProductController.java</span></div><code><span class=\"keyword\">package</span> com.example.demo.controller;\n\n<span class=\"keyword\">import</span> com.example.demo.common.ApiResponse;\n<span class=\"keyword\">import</span> com.example.demo.entity.Product;\n<span class=\"keyword\">import</span> com.example.demo.service.ProductService;\n<span class=\"keyword\">import</span> org.springframework.beans.factory.annotation.<span class=\"type\">Autowired</span>;\n<span class=\"keyword\">import</span> org.springframework.web.bind.annotation.*;\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">List</span>;\n\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RestController</span></span>\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/api/products\"</span>)\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ProductController {\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Autowired</span></span>\n    <span class=\"keyword\">private</span> ProductService productService;\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;<span class=\"type\">List</span>&lt;Product&gt;&gt; <span class=\"func\">list</span>() {\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">ok</span>(productService.<span class=\"func\">findAll</span>());\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/{}\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;Product&gt; <span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PathVariable</span></span> Long id) {\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">ok</span>(productService.<span class=\"func\">findById</span>(id));\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PostMapping</span></span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;Product&gt; <span class=\"func\">create</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestBody</span></span> Product product) {\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">ok</span>(productService.<span class=\"func\">save</span>(product));\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PutMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/{}\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;Product&gt; <span class=\"func\">update</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PathVariable</span></span> Long id, <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestBody</span></span> Product product) {\n        product.<span class=\"func\">setId</span>(id);\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">ok</span>(productService.<span class=\"func\">save</span>(product));\n    }\n    \n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">DeleteMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/{}\"</span>)\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;Void&gt; <span class=\"func\">delete</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PathVariable</span></span> Long id) {\n        productService.<span class=\"func\">delete</span>(id);\n        <span class=\"keyword\">return</span> ApiResponse.<span class=\"func\">ok</span>(<span class=\"keyword\">null</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>添加按分类筛选和按价格排序功能</li><li>实现商品库存扣减接口（考虑并发）</li><li>用Postman测试所有接口</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第8周：综合实战与部署。我们将学习MyBatis-Plus和项目部署。</div>"
},
{
    id: 36,
    week: 8,
    title: "MyBatis-Plus快速入门",
    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解MyBatis-Plus的优势</li><li>掌握BaseMapper的CRUD操作</li><li>学会使用条件构造器Wrapper</li><li>了解代码生成器的使用</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. MyBatis-Plus是什么？</h3><p>MyBatis-Plus是MyBatis的增强工具，在MyBatis的基础上只做增强不做改变。它提供了BaseMapper，让你无需写任何SQL就能完成CRUD。对于复杂查询，仍然可以用原生MyBatis的XML或注解。</p><p>相比JPA，MyBatis-Plus在国内更流行，因为：</p><ul><li>对复杂SQL支持更好（原生SQL/XML）</li><li>学习曲线更平缓</li><li>国内社区活跃，文档完善</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JPA就像<strong>GraphQL/Prisma</strong>——高度封装，简单但不够灵活。MyBatis-Plus就像<strong>SQL模板引擎</strong>——基础操作自动生成，复杂需求手写SQL，灵活可控。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserMapper.java</span></div><code><span class=\"keyword\">package</span> com.example.demo.mapper;\n\n<span class=\"keyword\">import</span> com.baomidou.mybatisplus.core.mapper.BaseMapper;\n<span class=\"keyword\">import</span> com.example.demo.entity.User;\n<span class=\"keyword\">import</span> org.apache.ibatis.annotations.Mapper;\n\n@Mapper\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">interface</span> UserMapper <span class=\"keyword\">extends</span> BaseMapper&lt;User&gt; {\n    <span class=\"comment\">// 无需任何代码，自动获得CRUD</span>\n    <span class=\"comment\">// 自定义SQL在这里写</span>\n}</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">使用Wrapper查询</span></div><code><span class=\"keyword\">import</span> com.baomidou.mybatisplus.core.conditions.query.QueryWrapper;\n\n<span class=\"comment\">// 查询年龄大于18且名字包含'张'的用户</span>\nQueryWrapper&lt;User&gt; wrapper = <span class=\"keyword\">new</span> QueryWrapper&lt;&gt;();\nwrapper.<span class=\"func\">gt</span>(<span <span class=\"keyword\">class</span>=\"string\">\"age\"</span>, <span <span class=\"keyword\">class</span>=\"number\">18</span>).<span class=\"func\">like</span>(<span <span class=\"keyword\">class</span>=\"string\">\"name\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"张\"</span>);\n<span class=\"type\">List</span>&lt;User&gt; list = userMapper.<span class=\"func\">selectList</span>(wrapper);\n\n<span class=\"comment\">// Lambda方式（类型安全）</span>\nLambdaQueryWrapper&lt;User&gt; lambda = <span class=\"keyword\">new</span> LambdaQueryWrapper&lt;&gt;();\nlambda.<span class=\"func\">gt</span>(User::getAge, <span <span class=\"keyword\">class</span>=\"number\">18</span>).<span class=\"func\">like</span>(User::getName, <span <span class=\"keyword\">class</span>=\"string\">\"张\"</span>);\n<span class=\"type\">List</span>&lt;User&gt; list2 = userMapper.<span class=\"func\">selectList</span>(lambda;</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>用MyBatis-Plus改写之前的商品管理模块</li><li>实现分页查询（selectPage）</li><li>实现多条件动态查询（根据传入参数动态组装条件）</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>Mapper没加@Mapper</strong></td><td>报No qualifying bean</td><td>加@Mapper或在启动类加@MapperScan</td></tr><tr><td><strong>字段名不匹配</strong></td><td>下划线转驼峰问题</td><td>配置mybatis-plus.configuration.map-underscore-to-camel-case=true</td></tr><tr><td><strong>主键策略</strong></td><td>insert后主键为null</td><td>确认@TableId(type = IdType.AUTO)</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第37课：接口文档 —— Knife4j。自动生成美观的API文档。</div>"
},
{
    id: 37,
    week: 8,
    title: "接口文档 —— Knife4j",
    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解为什么需要接口文档</li><li>掌握Knife4j（Swagger增强）的集成</li><li>学会用注解描述API</li><li>能够在线调试接口</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Swagger和Knife4j</h3><p>Swagger是API文档规范，Knife4j是国人基于Swagger开发的增强UI，界面更美观、功能更强大。集成了Knife4j后，启动项目访问/doc.html就能看到所有接口文档，还能直接在线调试。</p><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Knife4j就像前端的<strong>Storybook</strong>——不仅展示有哪些组件（接口），还能直接交互测试。前后端协作时，后端提供Knife4j地址，前端按文档对接，效率极高。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">添加依赖</span></div><code>&lt;dependency&gt;\n    &lt;groupId&gt;com.github.xiaoymin&lt;/groupId&gt;\n    &lt;artifactId&gt;knife4j-openapi3-jakarta-spring-boot-starter&lt;/artifactId&gt;\n    &lt;version&gt;<span <span class=\"keyword\">class</span>=\"number\">4.4</span>.<span <span class=\"keyword\">class</span>=\"number\">0</span>&lt;/version&gt;\n&lt;/dependency&gt;</code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Controller注解</span></div><code>@<span class=\"func\">Tag</span>(name = <span <span class=\"keyword\">class</span>=\"string\">\"商品管理\"</span>, description = <span <span class=\"keyword\">class</span>=\"string\">\"商品的增删改查\"</span>)\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RestController</span></span>\n<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestMapping</span></span>(<span <span class=\"keyword\">class</span>=\"string\">\"/api/products\"</span>)\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ProductController {\n    \n    @<span class=\"func\">Operation</span>(summary = <span <span class=\"keyword\">class</span>=\"string\">\"获取商品列表\"</span>, description = <span <span class=\"keyword\">class</span>=\"string\">\"返回所有商品\"</span>)\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">GetMapping</span></span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;<span class=\"type\">List</span>&lt;Product&gt;&gt; <span class=\"func\">list</span>() { ... }\n    \n    @<span class=\"func\">Operation</span>(summary = <span <span class=\"keyword\">class</span>=\"string\">\"创建商品\"</span>)\n    @<span class=\"func\">Parameter</span>(name = <span <span class=\"keyword\">class</span>=\"string\">\"product\"</span>, description = <span <span class=\"keyword\">class</span>=\"string\">\"商品信息\"</span>, required = <span class=\"keyword\">true</span>)\n    <span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">PostMapping</span></span>\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> ApiResponse&lt;Product&gt; <span class=\"func\">create</span>(<span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">RequestBody</span></span> Product product) { ... }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>为所有Controller添加Swagger注解</li><li>自定义文档信息（标题、版本、作者）</li><li>用Knife4j在线测试所有接口</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第38课：跨域、拦截器与JWT认证基础。学习安全防护。</div>"
},

    duration: "2小时",
    difficulty: "进阶级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解CORS跨域原理</li><li>掌握Spring Boot跨域配置</li><li>学会使用HandlerInterceptor</li><li>了解JWT的基本概念和使用场景</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. CORS跨域</h3><p>浏览器的同源策略（Same-Origin Policy）限制了前端页面只能请求同源（协议+域名+端口相同）的接口。当前端和后端分离部署时，必须配置CORS。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">全局跨域配置</span></div><code><span <span class=\"keyword\">class</span>=<span <span class=\"keyword\">class</span>=\"string\">\"annotation\"</span>>@<span class=\"type\">Configuration</span></span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> CorsConfig <span class=\"keyword\">implements</span> WebMvcConfigurer {\n    @Override\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">addCorsMappings</span>(CorsRegistry registry) {\n        registry.<span class=\"func\">addMapping</span>(<span <span class=\"keyword\">class</span>=\"string\">\"/api/**\"</span>)\n            .<span class=\"func\">allowedOrigins</span>(<span <span class=\"keyword\">class</span>=\"string\">\"*\"</span>)\n            .<span class=\"func\">allowedMethods</span>(<span <span class=\"keyword\">class</span>=\"string\">\"GET\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"POST\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"PUT\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"DELETE\"</span>)\n            .<span class=\"func\">allowedHeaders</span>(<span <span class=\"keyword\">class</span>=\"string\">\"*\"</span>);\n    }\n}</code></div><h3>2. 拦截器（Interceptor）</h3><p>拦截器可以在请求到达Controller之前进行处理，常用于登录校验、日志记录、权限检查等。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">登录拦截器</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> AuthInterceptor <span class=\"keyword\">implements</span> HandlerInterceptor {\n    @Override\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">boolean</span> <span class=\"func\">preHandle</span>(HttpServletRequest req, HttpServletResponse res, <span class=\"type\">Object</span> handler) {\n        <span class=\"keyword\">String</span> token = req.<span class=\"func\">getHeader</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Authorization\"</span>);\n        <span class=\"keyword\">if</span> (token == <span class=\"keyword\">null</span> || !<span class=\"func\">validateToken</span>(token)) {\n            res.<span class=\"func\">setStatus</span>(<span <span class=\"keyword\">class</span>=\"number\">401</span>);\n            return false;  <span class=\"comment\">// 拦截</span>\n        }\n        return true;  <span class=\"comment\">// 放行</span>\n    }\n}</code></div><h3>3. JWT简介</h3><p>JWT（JSON Web Token）是一种紧凑、自包含的方式，用于在各方之间传输信息。用户登录成功后，服务端签发JWT，客户端后续请求带上JWT，服务端验证即可。</p></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>配置CORS，只允许特定域名访问</li><li>实现一个记录请求耗时的拦截器</li><li>生成和解析一个简单的JWT token</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>CORS配置不生效</strong></td><td>被其他配置覆盖</td><td>确保配置类被Spring扫描到</td></tr><tr><td><strong>拦截器拦截了所有请求</strong></td><td>包括静态资源和Swagger</td><td>排除特定路径：excludePathPatterns</td></tr><tr><td><strong>JWT密钥泄露</strong></td><td>用硬编码密钥</td><td>密钥放配置文件，生产环境定期轮换</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第39课：项目打包与部署。学习如何让项目上线运行。</div>"
},

tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第40课：大实战 —— 全栈电商后端API。综合运用全部知识，完成毕业项目。</div>"
},

li>打包部署到服务器</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎉</span>🎉 课程总结</div><p>恭喜你完成了8周Java全栈后端课程的学习！回顾这段旅程：</p><ul><li>第1-2周：你学会了Java基础语法和面向对象编程</li><li>第3周：你掌握了List、Set、Map和泛型</li><li>第4周：你理解了异常处理、IO和多线程</li><li>第5周：你能够用JDBC操作数据库</li><li>第6周：你学会了Maven、JUnit、日志和Lombok</li><li>第7周：你入门了Spring Boot和JPA</li><li>第8周：你掌握了MyBatis-Plus、文档、安全和部署</li></ul><p>你现在具备了独立开发Java后端API的能力。建议接下来的学习路线：</p><ol><li>Redis缓存和性能优化</li><li>消息队列（RabbitMQ/RocketMQ）</li><li>Spring Cloud微服务</li><li>Docker和K8s容器化部署</li><li>分布式事务和一致性</li></ol><p>祝你在Java后端开发的路上越走越远！🚀</p></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>课程结束。恭喜你完成了全部40课的学习！</div>"

let currentLesson = 0;
let completedLessons = new Set();

function renderNav() {
    const nav = document.getElementById('nav-list');
    let html = '';
    let currentWeek = 0;
    courses.forEach(c => {
        if (c.week !== currentWeek) {
            currentWeek = c.week;
            html += `<div class="week-label">第 ${c.week} 周</div>`;
        }
        const active = c.id - 1 === currentLesson ? 'active' : '';
        const done = completedLessons.has(c.id) ? 'done' : '';
        html += `<div class="nav-item ${active}" onclick="goToLesson(${c.id - 1})">
            <span class="num">${c.id}</span>
            <div class="info"><div class="title">${c.title.split(' —— ')[0]}</div><div class="meta">${c.duration} · ${c.difficulty}</div></div>
            <span class="status ${done}"></span>
        </div>`;
    });
    nav.innerHTML = html;
}

function renderContent() {
    const c = courses[currentLesson];
    document.getElementById('breadcrumb').innerHTML = `第 ${c.week} 周 &gt; <span>第 ${c.id} 课</span>`;
    document.getElementById('content').innerHTML = `<div class="fade-in">
        <div class="lesson-header">
            <div class="badge-row">
                <span class="badge badge-week">第 ${c.week} 周</span>
                <span class="badge badge-time">⏱ ${c.duration}</span>
                <span class="badge badge-level">${c.difficulty}</span>
            </div>
            <h2>${c.title}</h2>
        </div>
        ${c.content}
    </div>`;
    updateButtons();
    updateProgress();
}

function goToLesson(index) {
    if (index < 0 || index >= courses.length) return;
    currentLesson = index;
    renderNav();
    renderContent();
    window.scrollTo({top: 0, behavior: 'smooth'});
    if (window.innerWidth < 900) toggleSidebar();
}

function prevLesson() {
    goToLesson(currentLesson - 1);
}

function nextLesson() {
    goToLesson(currentLesson + 1);
}

function markDone() {
    const c = courses[currentLesson];
    completedLessons.add(c.id);
    renderNav();
    updateProgress();
    const btn = document.getElementById('btn-done');
    btn.textContent = '✓ 已完成';
    btn.disabled = true;
    setTimeout(() => {
        btn.textContent = '标记完成';
        btn.disabled = false;
    }, 2000);
}

function updateButtons() {
    document.getElementById('btn-prev').disabled = currentLesson === 0;
    document.getElementById('btn-next').disabled = currentLesson === courses.length - 1;
    const c = courses[currentLesson];
    const btn = document.getElementById('btn-done');
    if (completedLessons.has(c.id)) {
        btn.textContent = '✓ 已完成';
    } else {
        btn.textContent = '标记完成';
    }
}

function updateProgress() {
    const total = courses.length;
    const done = completedLessons.size;
    document.getElementById('progress-text').textContent = `${done}/${total}`;
    document.getElementById('progress-fill').style.width = `${(done / total) * 100}%`;
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.querySelector('.overlay').classList.toggle('show');
}

// Initialize
renderNav();
renderContent();
</script>
