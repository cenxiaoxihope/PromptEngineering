<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前端开发者学Java · 从语法到Spring Boot实战</title>
<style>
  :root {
    --kd-blue: #2563eb;
    --kd-purple: #7c3aed;
    --kd-blue-light: #3b82f6;
    --kd-purple-light: #8b5cf6;
    --gradient-primary: linear-gradient(135deg, #2563eb 0%, #7c3aed 50%, #a855f7 100%);
    --gradient-subtle: linear-gradient(135deg, rgba(37,99,235,0.08) 0%, rgba(124,58,237,0.08) 100%);
    --bg-body: #f0f4ff;
    --bg-sidebar: #0f172a;
    --bg-card: #ffffff;
    --bg-code: #1e293b;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --border-color: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Layout */
  .app {
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 300px;
    background: var(--bg-sidebar);
    color: #fff;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 24px 20px;
    background: linear-gradient(135deg, rgba(37,99,235,0.2) 0%, rgba(124,58,237,0.2) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.4;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .progress-bar-container {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .progress-bar-container .label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gradient-primary);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .nav-list {
    flex: 1;
    padding: 8px 0;
  }

  .week-group {
    margin-bottom: 4px;
  }

  .week-label {
    padding: 10px 20px 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    gap: 10px;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.04);
  }

  .nav-item.active {
    background: rgba(37,99,235,0.12);
    border-left-color: var(--kd-blue-light);
  }

  .nav-item .num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .nav-item.active .num {
    background: var(--gradient-primary);
    color: #fff;
  }

  .nav-item .info {
    flex: 1;
    min-width: 0;
  }

  .nav-item .title {
    font-size: 13px;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .nav-item.active .title {
    color: #fff;
    font-weight: 600;
  }

  .nav-item .meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .nav-item .status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: rgba(255,255,255,0.15);
  }

  .nav-item .status.done {
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.4);
  }

  /* Main Content */
  .main {
    margin-left: 300px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(240,244,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar .breadcrumb {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .topbar .breadcrumb span {
    color: var(--kd-blue);
    font-weight: 700;
  }

  .topbar-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
  }

  .btn-primary {
    background: var(--gradient-primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37,99,235,0.35);
  }

  .btn-secondary {
    background: #fff;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
  }

  .btn-secondary:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }

  /* Content */
  .content {
    padding: 32px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
  }

  .lesson-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-color);
  }

  .lesson-header .badge-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-week {
    background: var(--gradient-primary);
    color: #fff;
  }

  .badge-time {
    background: #e0e7ff;
    color: var(--kd-blue);
  }

  .badge-level {
    background: #f3e8ff;
    color: var(--kd-purple);
  }

  .lesson-header h2 {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.3;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .lesson-header .desc {
    font-size: 15px;
    color: var(--text-secondary);
  }

  /* Sections */
  .section {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-color);
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-primary);
  }

  .section-title .icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-md);
    background: var(--gradient-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .section p {
    color: var(--text-secondary);
    margin-bottom: 12px;
    font-size: 15px;
  }

  .section ul, .section ol {
    margin-left: 20px;
    margin-bottom: 16px;
    color: var(--text-secondary);
  }

  .section li {
    margin-bottom: 8px;
    font-size: 15px;
  }

  .section strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .section h3 {
    font-size: 16px;
    font-weight: 700;
    margin: 20px 0 10px;
    color: var(--text-primary);
  }

  .section h4 {
    font-size: 14px;
    font-weight: 700;
    margin: 16px 0 8px;
    color: var(--kd-purple);
  }

  /* Analogy box */
  .analogy-box {
    background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%);
    border-left: 4px solid var(--kd-blue);
    padding: 16px 20px;
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    margin: 16px 0;
    font-size: 14px;
  }

  .analogy-box .label {
    font-weight: 700;
    color: var(--kd-blue);
    font-size: 12px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Compare table */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  .compare-table th {
    background: var(--gradient-primary);
    color: #fff;
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
  }

  .compare-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
  .compare-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }

  .compare-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-secondary);
  }

  .compare-table tr:nth-child(even) td {
    background: #f8fafc;
  }

  /* Code */
  .code-block {
    background: var(--bg-code);
    color: #e2e8f0;
    padding: 20px;
    border-radius: var(--radius-md);
    overflow-x: auto;
    font-family: "JetBrains Mono", "Fira Code", Consolas, Monaco, monospace;
    font-size: 13.5px;
    line-height: 1.7;
    margin: 16px 0;
    position: relative;
  }

  .code-block .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .code-block .code-title {
    font-size: 12px;
    color: #94a3b8;
    font-weight: 600;
  }

  .code-block code {
    font-family: inherit;
    color: inherit;
  }

  .code-block .comment { color: #6b7280; font-style: italic; }
  .code-block .keyword { color: #c084fc; }
  .code-block .string { color: #86efac; }
  .code-block .type { color: #60a5fa; }
  .code-block .func { color: #fcd34d; }
  .code-block .number { color: #fca5a5; }
  .code-block .annotation { color: #fbbf24; }

  /* Inline code */
  code.inline {
    background: #f1f5f9;
    color: var(--kd-purple);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "JetBrains Mono", "Fira Code", Consolas, Monaco, monospace;
    font-size: 0.9em;
  }

  /* Pitfalls table */
  .pitfalls-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }

  .pitfalls-table th {
    background: #fef2f2;
    color: #dc2626;
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
  }

  .pitfalls-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-secondary);
  }

  .pitfalls-table tr:nth-child(even) td { background: #fafafa; }

  /* Practice box */
  .practice-box {
    background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
    border: 1px solid #bbf7d0;
    border-radius: var(--radius-md);
    padding: 20px;
    margin: 16px 0;
  }

  .practice-box .label {
    font-weight: 700;
    color: #16a34a;
    font-size: 12px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Homework box */
  .homework-box {
    background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
    border: 1px solid #fde68a;
    border-radius: var(--radius-md);
    padding: 20px;
    margin: 16px 0;
  }

  .homework-box .label {
    font-weight: 700;
    color: #d97706;
    font-size: 12px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Step list */
  .step-list {
    counter-reset: step;
    list-style: none;
    margin-left: 0 !important;
  }

  .step-list li {
    position: relative;
    padding-left: 44px;
    margin-bottom: 16px;
  }

  .step-list li::before {
    counter-increment: step;
    content: counter(step);
    position: absolute;
    left: 0;
    top: 0;
    width: 28px;
    height: 28px;
    background: var(--gradient-primary);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  /* Footer nav */
  .footer-nav {
    padding: 20px 32px;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
  }

  .footer-nav .btn { padding: 10px 20px; }

  /* Mobile toggle */
  .menu-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 200;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gradient-primary);
    color: #fff;
    border: none;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: var(--shadow-lg);
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
  }

  @media (max-width: 900px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .menu-toggle { display: flex; }
    .overlay.show { display: block; }
    .content { padding: 20px; }
    .topbar { padding: 12px 20px; }
    .lesson-header h2 { font-size: 22px; }
  }

  /* Animation */
  .fade-in {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tip box */
  .tip-box {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin: 14px 0;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .tip-box strong { color: var(--kd-blue); }
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" onclick="toggleSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>前端开发者学Java</h1>
      <div class="subtitle">从语法到Spring Boot实战</div>
    </div>
    <div class="progress-bar-container">
      <div class="label"><span>学习进度</span><span id="progress-text">0/40</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <nav class="nav-list" id="nav-list"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="breadcrumb" id="breadcrumb">第 1 周 &gt; <span>第 1 课</span></div>
      <div class="topbar-actions">
        <button class="btn btn-secondary" onclick="prevLesson()" id="btn-prev">上一课</button>
        <button class="btn btn-primary" onclick="markDone()" id="btn-done">标记完成</button>
        <button class="btn btn-secondary" onclick="nextLesson()" id="btn-next">下一课</button>
      </div>
    </div>

    <div class="content" id="content"></div>

    <div class="footer-nav">
      <button class="btn btn-secondary" onclick="prevLesson()">上一课</button>
      <span style="color:var(--text-muted);font-size:13px;">前端开发者学Java · 全栈转型课程</span>
      <button class="btn btn-primary" onclick="nextLesson()">下一课</button>
    </div>
  </main>
</div>

<script>
const courses = [
{
    id: 1,
    week: 1,
    title: "Java世界地图导览",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>搞清楚Java在技术栈中的位置，以及它和JavaScript到底是什么关系</li><li>理解JDK、JRE、JVM三兄弟的关系，不再傻傻分不清</li><li>独立完成Java开发环境搭建（IDEA社区版 + JDK 17）</li><li>运行你的第一个Java程序，理解\"先编译、后运行\"的完整流程</li><li>建立Java与JavaScript的核心差异认知框架，为后续学习打下基础</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><p>好消息是，你不需要任何Java基础。你已有的这些知识就是最大的加速器：</p><ul><li><strong>JavaScript/TypeScript编程经验</strong>：你熟悉变量、函数、条件判断、循环，这些概念在Java里都有，只是\"语法皮肤\"不同</li><li><strong>Node.js/npm使用经验</strong>：这会让你对Java的Maven依赖管理有天然的亲切感</li><li><strong>HTTP协议和前后端联调经验</strong>：你知道后端是干什么的，这让你学Java时有明确的目标感</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Java和JavaScript：就像\"雷锋\"和\"雷峰塔\"</h3><p>这大概是IT史上最成功的命名误会。Java和JavaScript的关系，就像雷锋和雷峰塔——名字很像，但完全是两码事。当年网景公司搞浏览器脚本语言，想蹭Java的热度，就取了这么个名字。但它们的基因完全不同。</p><table class=\"compare-table\"><tr><th>维度</th><th>JavaScript</th><th>Java</th></tr><tr><td>类型系统</td><td>动态类型（运行时才确定类型）</td><td>静态类型（写代码时就必须声明类型）</td></tr><tr><td>运行方式</td><td>解释执行（V8引擎边读边跑）</td><td>先编译成字节码，再交给JVM运行</td></tr><tr><td>语法风格</td><td>函数是第一公民，非常灵活</td><td>类是核心，结构相对严谨</td></tr><tr><td>典型场景</td><td>前端交互、Node.js服务端</td><td>企业后端、大数据、Android</td></tr></table><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>如果把写代码比作做演讲，JavaScript像是<strong>即兴演讲</strong>——你可以随时改变话题、临场发挥，很自由但也容易说错话。Java像是<strong>提前写好完整演讲稿</strong>，先给编辑审核一遍（编译），确认没问题了再上台讲。这个\"编辑审核\"的过程，就是Java帮你提前发现错误的方式。</div><h3>2. 为什么前端要学Java？</h3><p>原因很简单——<strong>生态和机会</strong>。在国内的企业级开发中，Java ecosystem（Spring Boot全家桶）仍然是绝对的主流。有前端基础的人学Java其实有隐藏优势——你已经理解了异步、事件循环、HTTP请求这些概念，只需要把它们\"翻译\"成Java的表达方式。</p><h3>3. JDK、JRE、JVM：三兄弟的关系</h3><p>我用一个\"剧场演出\"的类比来帮你记住：</p><ul><li><strong>JVM（Java Virtual Machine）</strong>：<strong>舞台</strong>。它是演出的场地，负责真正运行Java程序。JVM是跨平台的核心，你的Java代码能在Windows跑，也能在Linux跑，就是因为每个系统上都有对应的JVM舞台。</li><li><strong>JRE（Java Runtime Environment）</strong>：<strong>舞台 + 基础道具</strong>。它包含JVM，再加上运行Java程序必需的核心类库。如果你只是要\"看演出\"（运行别人写好的Java程序），有JRE就够了。</li><li><strong>JDK（Java Development Kit）</strong>：<strong>舞台 + 道具 + 导演工具</strong>。它包含JRE，再加上开发工具——最重要的是<code class='inline'>javac</code>编译器（把.java文件编译成.class文件），还有调试器、文档生成工具等。因为我们要\"写戏\"（写Java代码），所以必须装JDK。</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JVM像<strong>浏览器引擎（V8）</strong>，JRE像<strong>浏览器</strong>（能跑JS），JDK像<strong>Node.js + VS Code</strong>（能写能跑能调试）。我们开发者装JDK就对了。</div><h3>4. Java的编译-运行流程：和TypeScript编译如出一辙</h3><p>如果你用过TypeScript，对这个流程会非常熟悉：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">TypeScript vs Java 编译流程</span></div><code><span class=\"comment\">// TypeScript</span>\n.ts文件 --tsc编译--&gt; .js文件 --Node运行--&gt; 输出结果\n\n<span class=\"comment\">// Java</span>\n.java文件 --javac编译--&gt; .class字节码 --JVM运行--&gt; 输出结果</code></div><p>几乎一模一样！Java的编译器叫<code class='inline'>javac</code>，它把你的.java源代码编译成<code class='inline'>.class</code>字节码文件（不是机器码，是一种中间格式）。然后JVM加载这些.class文件，解释执行。</p><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就是Java\"一次编写，到处运行\"的秘诀。字节码是跨平台的，Windows的JVM能读，Mac的JVM也能读。就像你写的TypeScript编译成JS后，可以在任何浏览器里跑。</div><h3>5. 静态类型 vs 动态类型：从\"自由发挥\"到\"明码标价\"</h3><p>在JavaScript里，你可以这样写：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">JavaScript - 动态类型</span></div><code>let user = \"Alice\";     <span class=\"comment\">// 字符串</span>\nuser = 25;              <span class=\"comment\">// 突然变成数字，完全没问题</span>\nuser = { name: \"Bob\" }; <span class=\"comment\">// 又变成对象，JS完全不拦你</span></code></div><p>在Java里，这样写会直接<strong>编译报错</strong>：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Java - 静态类型</span></div><code><span class=\"keyword\">String</span> user = <span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>;\nuser = 25;  <span class=\"comment\">// 编译错误：类型不匹配</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JavaScript的变量像是一个<strong>\"万能收纳箱\"</strong>，今天装衣服，明天装书，后天装零食，都可以。Java的变量像是一个<strong>\"贴好标签的专用储物柜\"</strong>——贴了\"衣服\"标签的柜子，你就不能往里面塞书。这样做的好处是，你在整理（编译）阶段就能发现\"放错东西\"的问题，而不是等到使用（运行）时才发现。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><h4>步骤1：安装JDK</h4><p>推荐使用<strong>JDK 17</strong>（LTS长期支持版，稳定且现代）。不要选JDK 8，虽然很多企业还在用，但学习用新版更划算。</p><div class=\"tip-box\">💡 <strong>提示：</strong>下载地址：Oracle JDK 17 或 Eclipse Temurin（Adoptium）https://adoptium.net/</div><p>安装完成后，在终端验证：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Terminal</span></div><code>java -version\njavac -version</code></div><p>两个命令都应该显示 <code class='inline'>17</code> 开头的版本号。</p><h4>步骤2：安装IDEA社区版</h4><p>Java世界最好的IDE是IntelliJ IDEA。社区版（Community）完全免费，功能足够学习使用。下载地址：https://www.jetbrains.com/idea/download/</p><h4>步骤3：编写第一个Java程序</h4><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">HelloWorld.java</span></div><code>package com.example;  <span class=\"comment\">// 包声明，类比npm包的命名空间</span>\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> HelloWorld {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Hello, Java World!\"</span>);\n        \n        <span class=\"keyword\">String</span> name = <span <span class=\"keyword\">class</span>=\"string\">\"前端开发者\"</span>;\n        <span class=\"keyword\">int</span> experienceYears = <span <span class=\"keyword\">class</span>=\"number\">5</span>;\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"我是：\"</span> + name);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"工作经验：\"</span> + experienceYears + <span <span class=\"keyword\">class</span>=\"string\">\"年\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"学习目标：掌握Java，成为全栈工程师\"</span>);\n        \n        <span class=\"keyword\">int</span> studyWeeks = <span <span class=\"keyword\">class</span>=\"number\">8</span>;\n        <span class=\"keyword\">int</span> hoursPerWeek = <span <span class=\"keyword\">class</span>=\"number\">10</span>;\n        <span class=\"keyword\">int</span> totalHours = studyWeeks * hoursPerWeek;\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"预计学习时长：\"</span> + totalHours + <span <span class=\"keyword\">class</span>=\"string\">\"小时\"</span>);\n    }\n}</code></div><p>在IDEA中，点击<code class='inline'>main</code>方法左侧的绿色小箭头 → Run 'HelloWorld.main()'。</p></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：修改上面的<code class='inline'>HelloWorld.java</code>，让它输出你的\"Java学习名片\"。</p><h4>要求：</h4><ol><li>定义以下变量并输出：你的名字（String类型）、前端工作年限（int类型）、是否打算转全栈（boolean类型）、期望薪资涨幅百分比（double类型，比如25.5）</li><li>输出格式参考：带边框的名片样式</li><li>挑战项：计算月薪20,000元涨薪25.5%之后的金额</li></ol><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">参考答案 - JavaLearningCard.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> JavaLearningCard {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">String</span> name = <span <span class=\"keyword\">class</span>=\"string\">\"张三\"</span>;\n        <span class=\"keyword\">int</span> experience = <span <span class=\"keyword\">class</span>=\"number\">5</span>;\n        <span class=\"keyword\">boolean</span> planFullStack = <span class=\"keyword\">true</span>;\n        <span class=\"keyword\">double</span> expectedRaise = <span <span class=\"keyword\">class</span>=\"number\">25.5</span>;\n        <span class=\"keyword\">int</span> currentSalary = <span <span class=\"keyword\">class</span>=\"number\">20000</span>;\n        \n        <span class=\"keyword\">double</span> newSalary = currentSalary * (<span <span class=\"keyword\">class</span>=\"number\">1</span> + expectedRaise / <span <span class=\"keyword\">class</span>=\"number\">100</span>);\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"==========================\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Java学习名片\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"==========================\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"姓名：\"</span> + name);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"前端经验：\"</span> + experience + <span <span class=\"keyword\">class</span>=\"string\">\"年\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"转全栈计划：\"</span> + (planFullStack ? <span <span class=\"keyword\">class</span>=\"string\">\"是\"</span> : <span <span class=\"keyword\">class</span>=\"string\">\"否\"</span>));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"期望涨薪：\"</span> + expectedRaise + <span <span class=\"keyword\">class</span>=\"string\">\"%\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"涨薪后月薪：\"</span> + newSalary + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"==========================\"</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>JDK版本选错</strong></td><td>有些教程让你装JDK 8，但JDK 8太老了，语法和新版有差异</td><td>学习阶段用JDK 17或21（LTS版），企业迁移时再了解版本差异</td></tr><tr><td><strong>文件名与类名不一致</strong></td><td>Java强制要求：如果一个类是public的，文件名必须和这个类名完全一致（包括大小写）</td><td>public class HelloWorld 必须保存在 HelloWorld.java 中</td></tr><tr><td><strong>漏写分号</strong></td><td>Java每句结尾必须有分号;，JS可以省略</td><td>养成随手加分号的习惯，编译报错时先看是不是漏了分号</td></tr><tr><td><strong>main方法写错</strong></td><td>public static void main(String[] args) 这一行必须一字不差</td><td>让IDEA自动生成（输入psvm然后按Tab），不要手敲</td></tr><tr><td><strong>中文乱码</strong></td><td>控制台输出中文可能乱码</td><td>IDEA设置：File → Settings → Editor → File Encodings，全部改成UTF-8</td></tr><tr><td><strong>环境变量配错</strong></td><td>命令行输入java或javac提示找不到命令</td><td>检查PATH里是否包含了JDK的bin目录路径</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>独立完成环境搭建，运行通上面的\"Java学习名片\"程序（预计20分钟）</li><li>尝试故意犯几个错，看看编译器会报什么错（比如漏掉分号、类型不匹配、类名和文件名不一致），熟悉Java的错误提示风格（预计15分钟）</li><li>思考题：Java的\"先编译后运行\"和JavaScript的\"直接运行\"，各有什么优缺点？写3-5句话总结</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第2课：变量与数据类型 —— Java的\"储物柜系统\"。我们将深入学习Java的类型系统，包括8种基本类型和引用类型，用一个\"用户信息表单\"的真实场景来练习。</div>"
},

    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握Java的8种基本数据类型，理解它们和JS类型的对应关系</li><li>理解变量声明、初始化、赋值的完整流程</li><li>掌握类型转换（自动转换和强制转换）的规则和坑点</li><li>理解常量的定义和使用场景</li><li>能够设计一个用户信息表单的数据类型方案</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第1课，搭建好了Java开发环境</li><li>熟悉JavaScript的变量声明（let/const）和基本类型</li><li>理解TypeScript的类型注解（会有很大帮助）</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Java的类型系统概览</h3><p>在JavaScript里，类型很简单：Number、String、Boolean、Object、Undefined、Null、Symbol、BigInt。但在Java里，类型系统要丰富得多，主要分为两大类：</p><ul><li><strong>基本类型（Primitive Types）</strong>：8种，存的是\"值\"本身，类比JS里的原始值</li><li><strong>引用类型（Reference Types）</strong>：类、接口、数组等，存的是\"地址\"，类比JS里的对象</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>你可以把内存想象成一个大型仓库。基本类型就像是仓库里的<strong>独立储物格</strong>，每个格子里直接放着东西（值）。引用类型就像是仓库里的<strong>指示牌</strong>，牌子上写着\"你要的东西在第A区第3排\"（地址），真正的东西在另一个地方。</div><h3>2. 8种基本类型详解</h3><table class=\"compare-table\"><tr><th>Java类型</th><th>占用空间</th><th>取值范围</th><th>类比JS</th><th>典型场景</th></tr><tr><td>byte</td><td>1字节</td><td>-128 ~ 127</td><td>无直接对应</td><td>文件流、网络传输</td></tr><tr><td>short</td><td>2字节</td><td>-32768 ~ 32767</td><td>无直接对应</td><td>兼容旧系统</td></tr><tr><td>int</td><td>4字节</td><td>约±21亿</td><td>number（整数部分）</td><td>计数器、年龄、ID</td></tr><tr><td>long</td><td>8字节</td><td>约±922京</td><td>BigInt</td><td>时间戳、大数据计算</td></tr><tr><td>float</td><td>4字节</td><td>约±3.4E38</td><td>number（浮点）</td><td>科学计算、3D图形</td></tr><tr><td>double</td><td>8字节</td><td>约±1.7E308</td><td>number（浮点）</td><td>金额计算（不推荐！）</td></tr><tr><td>char</td><td>2字节</td><td>一个Unicode字符</td><td>string（单个字符）</td><td>性别标记 M/F</td></tr><tr><td>boolean</td><td>1位</td><td>true / false</td><td>boolean</td><td>开关、标志位</td></tr></table><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Java的<code class='inline'>int</code>和<code class='inline'>long</code>就像前端里的<code class='inline'>number</code>和<code class='inline'>BigInt</code>——前者够用但可能溢出，后者超大但占内存。如果你在用TypeScript，这就好比<code class='inline'>number</code>和<code class='inline'>bigint</code>的区别。</div><h3>3. 变量声明：从JS的松散到Java的严谨</h3><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">变量声明对比</span></div><code><span class=\"comment\">// JavaScript - 松散随意</span>\nlet userName = <span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>;\nlet age = <span <span class=\"keyword\">class</span>=\"number\">25</span>;\nlet isVip = <span class=\"keyword\">true</span>;\nlet price = <span <span class=\"keyword\">class</span>=\"number\">19.99</span>;\n\n<span class=\"comment\">// Java - 严谨明确</span>\nString userName = \"Alice\";  <span class=\"comment\">// 必须声明类型！</span>\n<span class=\"keyword\">int</span> age = <span <span class=\"keyword\">class</span>=\"number\">25</span>;\n<span class=\"keyword\">boolean</span> isVip = <span class=\"keyword\">true</span>;\n<span class=\"keyword\">double</span> price = <span <span class=\"keyword\">class</span>=\"number\">19.99</span>;</code></div><p>Java的变量声明格式是：<code class='inline'>类型 变量名 = 初始值;</code>。这个类型一旦确定，就不能改变。</p><h3>4. 类型转换：自动升级 vs 强制降级</h3><p>Java的类型转换有一条铁律：<strong>小容量类型可以自动转成大容量类型</strong>（就像小杯子倒进大杯子，不会洒），但<strong>大容量转小容量必须强制转换</strong>（就像大杯子倒进小杯子，可能溢出，需要你签字确认）。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">类型转换示例</span></div><code><span class=\"comment\">// 自动转换（隐式）- 安全</span>\n<span class=\"keyword\">int</span> small = <span <span class=\"keyword\">class</span>=\"number\">100</span>;\nlong big = small;  <span class=\"comment\">// int自动升为long</span>\n\n<span class=\"comment\">// 强制转换（显式）- 可能丢失数据</span>\n<span class=\"keyword\">double</span> pi = <span <span class=\"keyword\">class</span>=\"number\">3.14159</span>;\nint roughPi = (int) pi;  <span class=\"comment\">// 必须写(int)，结果变成3，小数部分被截断！</span>\n\n<span class=\"comment\">// 严重溢出示例</span>\n<span class=\"keyword\">int</span> bigNumber = <span <span class=\"keyword\">class</span>=\"number\">150</span>;\nbyte tiny = (byte) bigNumber;  <span class=\"comment\">// 结果是 -106！因为byte存不下150，发生了溢出</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就好比前端里把一个大数组强制转换成固定长度——<code class='inline'>const arr = [1,2,3,4,5]; const firstThree = arr.slice(0,3);</code>你必须显式告诉程序\"我只要前三个\"，否则它不知道该怎么取舍。Java的强制转换也是同样的道理。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><p>我们来设计一个电商用户信息表单的数据类型方案：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserForm.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserForm {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">int</span> userId = <span <span class=\"keyword\">class</span>=\"number\">10086</span>;\n        <span class=\"keyword\">String</span> userName = <span <span class=\"keyword\">class</span>=\"string\">\"前端小王\"</span>;\n        <span class=\"keyword\">byte</span> age = <span <span class=\"keyword\">class</span>=\"number\">28</span>;\n        <span class=\"keyword\">char</span> gender = <span <span class=\"keyword\">class</span>='string'>\\'M\\'</span>;\n        <span class=\"keyword\">boolean</span> isVerified = <span class=\"keyword\">true</span>;\n        <span class=\"keyword\">long</span> balanceInCents = <span <span class=\"keyword\">class</span>=\"number\">199999</span>;\n        <span class=\"keyword\">long</span> registerTime = <span class=\"type\">System</span>.<span class=\"func\">currentTimeMillis</span>();\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"===== 用户信息 =====\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户ID: \"</span> + userId);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"昵称: \"</span> + userName);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"年龄: \"</span> + age);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"性别: \"</span> + gender);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"实名认证: \"</span> + isVerified);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"余额: \"</span> + (balanceInCents / <span <span class=\"keyword\">class</span>=\"number\">100.0</span>) + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"注册时间戳: \"</span> + registerTime);\n    }\n}</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>注意余额的处理方式！这是企业开发的黄金法则：<strong>永远不要用float或double存储金额</strong>，因为浮点数有精度误差。正确做法是用long存\"分\"，或者用BigDecimal类。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：设计一个商品信息的数据类型方案。</p><h4>商品信息包含：</h4><ul><li>商品ID（编号可能很大）</li><li>商品名称</li><li>库存数量（不会为负，最大10万）</li><li>原价（精确到分）</li><li>折扣价（精确到分）</li><li>是否上架</li><li>商品类别代号（单个字母：A=电子，B=服装，C=食品）</li></ul><h4>要求：</h4><ol><li>为每个字段选择最合适的Java类型</li><li>计算折扣率（百分比，保留一位小数）</li><li>输出完整的商品信息报表</li></ol><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">参考答案</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> ProductInfo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">long</span> productId = 88888888L;\n        <span class=\"keyword\">String</span> productName = <span <span class=\"keyword\">class</span>=\"string\">\"无线机械键盘\"</span>;\n        <span class=\"keyword\">int</span> stock = <span <span class=\"keyword\">class</span>=\"number\">1500</span>;\n        <span class=\"keyword\">long</span> originalPrice = <span <span class=\"keyword\">class</span>=\"number\">29900</span>;\n        <span class=\"keyword\">long</span> discountPrice = <span <span class=\"keyword\">class</span>=\"number\">19900</span>;\n        <span class=\"keyword\">boolean</span> isOnSale = <span class=\"keyword\">true</span>;\n        <span class=\"keyword\">char</span> category = <span <span class=\"keyword\">class</span>='string'>\\'A\\'</span>;\n        \n        <span class=\"keyword\">double</span> discountRate = (<span <span class=\"keyword\">class</span>=\"number\">1</span> - (<span class=\"keyword\">double</span>)discountPrice / originalPrice) * <span <span class=\"keyword\">class</span>=\"number\">100</span>;\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"===== 商品信息 =====\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"ID: \"</span> + productId);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"名称: \"</span> + productName);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"库存: \"</span> + stock + <span <span class=\"keyword\">class</span>=\"string\">\"件\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"原价: \"</span> + (originalPrice/<span <span class=\"keyword\">class</span>=\"number\">100.0</span>) + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"折后价: \"</span> + (discountPrice/<span <span class=\"keyword\">class</span>=\"number\">100.0</span>) + <span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"折扣率: \"</span> + <span class=\"keyword\">String</span>.<span class=\"func\">format</span>(<span <span class=\"keyword\">class</span>=\"string\">\"%.1f\"</span>, discountRate) + <span <span class=\"keyword\">class</span>=\"string\">\"%\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"状态: \"</span> + (isOnSale ? <span <span class=\"keyword\">class</span>=\"string\">\"上架中\"</span> : <span <span class=\"keyword\">class</span>=\"string\">\"已下架\"</span>));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"类别: \"</span> + category);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>long类型忘加L</strong></td><td>编译器默认把整数当int处理，超过int范围会报错</td><td>赋值时加后缀：long big = 9999999999L;</td></tr><tr><td><strong>用double存金额</strong></td><td>浮点数精度问题会导致金额计算错误</td><td>用long存\"分\"，或用BigDecimal类</td></tr><tr><td><strong>强制转换溢出</strong></td><td>大类型转小类型时，超范围的数据会\"回绕\"成奇怪的数字</td><td>强制转换前先判断数值范围</td></tr><tr><td><strong>char和String混淆</strong></td><td>char用单引号存一个字符，String用双引号存字符串</td><td>char c = 'A'; String s = \"A\"; 两者完全不同！</td></tr><tr><td><strong>变量未初始化</strong></td><td>Java局部变量必须先赋值才能使用</td><td>声明时立即初始化：int count = 0;</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>定义一组变量表示你自己的电脑配置信息（品牌String、内存int GB、是否有独显boolean、CPU主频double GHz等），并格式化输出</li><li>思考题：为什么Java要设计8种基本类型，而不像JavaScript一样统一用number？有什么好处和代价？</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第3课：运算符与控制流 —— 订单优惠规则计算。我们将学习Java的各种运算符和条件循环结构，用\"电商订单优惠计算\"的真实场景来练习。</div>"
},

    id: 3,

    title: "运算符与控制流 —— 订单优惠规则计算",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握Java的算术、比较、逻辑运算符，理解运算符优先级</li><li>熟练使用if/else if/else进行多条件判断</li><li>掌握switch表达式的用法（Java 14+新特性）</li><li>熟练使用for、while、do-while循环</li><li>能够独立完成电商订单优惠规则的计算逻辑</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第2课，理解Java的基本数据类型</li><li>熟悉JavaScript的运算符和控制流语句</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 运算符：JavaScript的老朋友</h3><p>好消息是，Java的运算符和JavaScript几乎一模一样！加减乘除、取模、自增自减、比较运算符、逻辑运算符……概念完全相通，只是有几个小差别。</p><h4>关键差异：== vs equals()</h4><p>在JavaScript里，<code class='inline'>==</code> 会做类型转换后比较，<code class='inline'>===</code> 严格比较。在Java里：</p><ul><li><code class='inline'>==</code> 比较的是<strong>地址/值</strong>（基本类型比的是值，引用类型比的是地址）</li><li><code class='inline'>equals()</code> 比较的是<strong>内容</strong>（只适用于引用类型）</li></ul><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">== 与 equals 的区别</span></div><code><span class=\"comment\">// 基本类型 - == 比较值</span>\n<span class=\"keyword\">int</span> a = <span <span class=\"keyword\">class</span>=\"number\">10</span>, b = <span <span class=\"keyword\">class</span>=\"number\">10</span>;\nSystem.out.println(a == b);  <span class=\"comment\">// true</span>\n\n<span class=\"comment\">// 引用类型 - == 比较地址！</span>\n<span class=\"keyword\">String</span> s1 = <span class=\"keyword\">new</span> <span class=\"keyword\">String</span>(<span <span class=\"keyword\">class</span>=\"string\">\"hello\"</span>);\n<span class=\"keyword\">String</span> s2 = <span class=\"keyword\">new</span> <span class=\"keyword\">String</span>(<span <span class=\"keyword\">class</span>=\"string\">\"hello\"</span>);\nSystem.out.println(s1 == s2);     <span class=\"comment\">// false！地址不同</span>\nSystem.out.println(s1.equals(s2)); <span class=\"comment\">// true！内容相同</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就好比前端里 <code class='inline'>===</code> 比较的是\"引用地址\"（对于对象），而Java的 <code class='inline'>equals()</code> 就像你自定义的深比较函数。比较字符串内容时，<strong>永远用equals()</strong>，这是Java新手最容易踩的坑。</div><h3>2. switch：从JavaScript到Java的进化</h3><p>Java的switch比JavaScript的更强大，尤其是Java 14引入的switch表达式：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Switch 表达式（Java 14+）</span></div><code><span class=\"comment\">// 老写法</span>\n<span class=\"keyword\">int</span> day = <span <span class=\"keyword\">class</span>=\"number\">3</span>;\n<span class=\"keyword\">String</span> dayName;\n<span class=\"keyword\">switch</span> (day) {\n    <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">1</span>: dayName = <span <span class=\"keyword\">class</span>=\"string\">\"周一\"</span>; <span class=\"keyword\">break</span>;\n    <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">2</span>: dayName = <span <span class=\"keyword\">class</span>=\"string\">\"周二\"</span>; <span class=\"keyword\">break</span>;\n    <span class=\"keyword\">default</span>: dayName = <span <span class=\"keyword\">class</span>=\"string\">\"周末\"</span>;\n}\n\n<span class=\"comment\">// 新写法 - 箭头语法，更简洁！</span>\n<span class=\"keyword\">String</span> dayName = <span class=\"keyword\">switch</span> (day) {\n    <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">1</span> -&gt; <span <span class=\"keyword\">class</span>=\"string\">\"周一\"</span>;\n    <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">2</span> -&gt; <span <span class=\"keyword\">class</span>=\"string\">\"周二\"</span>;\n    case 3, 4, 5 -&gt; \"工作日\";  <span class=\"comment\">// 多个值合并</span>\n    <span class=\"keyword\">default</span> -&gt; <span <span class=\"keyword\">class</span>=\"string\">\"周末\"</span>;\n};</code></div><h3>3. 循环结构</h3><p>for、while、do-while的语法和JS基本一致，只是类型声明不同：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">循环示例</span></div><code><span class=\"comment\">// for循环</span>\n<span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; <span <span class=\"keyword\">class</span>=\"number\">5</span>; i++) {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"第\"</span> + (i+<span <span class=\"keyword\">class</span>=\"number\">1</span>) + <span <span class=\"keyword\">class</span>=\"string\">\"次\"</span>);\n}\n\n<span class=\"comment\">// while循环</span>\n<span class=\"keyword\">int</span> count = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n<span class=\"keyword\">while</span> (count &lt; <span <span class=\"keyword\">class</span>=\"number\">3</span>) {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"count=\"</span> + count);\n    count++;\n}\n\n<span class=\"comment\">// 增强for循环（类比JS的for...of）</span>\n<span class=\"keyword\">String</span>[] names = {<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Charlie\"</span>};\n<span class=\"keyword\">for</span> (<span class=\"keyword\">String</span> name : names) {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(name);\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><p>我们来实现一个电商订单优惠计算系统：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">OrderDiscount.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> OrderDiscount {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">double</span> originalAmount = <span <span class=\"keyword\">class</span>=\"number\">580.0</span>;\n        <span class=\"keyword\">int</span> userLevel = <span <span class=\"keyword\">class</span>=\"number\">2</span>;\n        <span class=\"keyword\">boolean</span> hasCoupon = <span class=\"keyword\">true</span>;\n        <span class=\"keyword\">int</span> couponType = <span <span class=\"keyword\">class</span>=\"number\">1</span>;\n        <span class=\"keyword\">boolean</span> isFirstOrder = <span class=\"keyword\">false</span>;\n        \n        <span class=\"keyword\">double</span> finalAmount = originalAmount;\n        <span class=\"type\">StringBuilder</span> log = <span class=\"keyword\">new</span> <span class=\"type\">StringBuilder</span>();\n        log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"===== 订单优惠明细 =====\\n\"</span>);\n        log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"原价: \"</span>).<span class=\"func\">append</span>(originalAmount).<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"元\\n\"</span>);\n        \n        <span class=\"keyword\">double</span> memberDiscount = <span class=\"keyword\">switch</span> (userLevel) {\n            <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">1</span> -&gt; <span <span class=\"keyword\">class</span>=\"number\">0.95</span>;\n            <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">2</span> -&gt; <span <span class=\"keyword\">class</span>=\"number\">0.88</span>;\n            <span class=\"keyword\">case</span> <span <span class=\"keyword\">class</span>=\"number\">3</span> -&gt; <span <span class=\"keyword\">class</span>=\"number\">0.80</span>;\n            <span class=\"keyword\">default</span> -&gt; <span <span class=\"keyword\">class</span>=\"number\">1.0</span>;\n        };\n        \n        <span class=\"keyword\">if</span> (memberDiscount &lt; <span <span class=\"keyword\">class</span>=\"number\">1.0</span>) {\n            finalAmount *= memberDiscount;\n            log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"会员折扣: \"</span>).<span class=\"func\">append</span>((<span class=\"keyword\">int</span>)((<span <span class=\"keyword\">class</span>=\"number\">1</span>-memberDiscount)*<span <span class=\"keyword\">class</span>=\"number\">100</span>)).<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"% off\\n\"</span>);\n        }\n        \n        <span class=\"keyword\">if</span> (hasCoupon) {\n            <span class=\"keyword\">if</span> (couponType == <span <span class=\"keyword\">class</span>=\"number\">1</span> &amp;&amp; originalAmount &gt;= <span <span class=\"keyword\">class</span>=\"number\">300</span>) {\n                finalAmount -= <span <span class=\"keyword\">class</span>=\"number\">50</span>;\n                log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"优惠券: 满300减50\\n\"</span>);\n            } <span class=\"keyword\">else</span> <span class=\"keyword\">if</span> (couponType == <span <span class=\"keyword\">class</span>=\"number\">2</span>) {\n                finalAmount *= <span <span class=\"keyword\">class</span>=\"number\">0.9</span>;\n                log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"优惠券: 9折\\n\"</span>);\n            }\n        }\n        \n        <span class=\"keyword\">if</span> (isFirstOrder &amp;&amp; finalAmount &gt; <span <span class=\"keyword\">class</span>=\"number\">0</span>) {\n            finalAmount -= <span <span class=\"keyword\">class</span>=\"number\">20</span>;\n            log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"首单优惠: 减20元\\n\"</span>);\n        }\n        \n        <span class=\"keyword\">if</span> (finalAmount &lt; <span <span class=\"keyword\">class</span>=\"number\">0</span>) finalAmount = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n        log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"--------------------\\n\"</span>);\n        log.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"实付金额: \"</span>).<span class=\"func\">append</span>(<span class=\"keyword\">String</span>.<span class=\"func\">format</span>(<span <span class=\"keyword\">class</span>=\"string\">\"%.2f\"</span>, finalAmount)).<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"元\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(log.<span class=\"func\">toString</span>());\n    }\n}</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>注意优惠计算的顺序！实际业务中，通常是\"先打折后减券\"还是\"先减券后打折\"，需要和产品经理确认清楚。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：实现一个成绩等级评定系统。</p><ol><li>输入一个0-100的分数（int类型）</li><li>用switch或if判断等级：A(90-100)、B(80-89)、C(70-79)、D(60-69)、F(0-59)</li><li>输入无效分数时给出错误提示</li><li>额外：如果是A等级且是满分，额外输出\"完美！\"</li></ol><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">参考答案</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> GradeEvaluator {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">int</span> score = <span <span class=\"keyword\">class</span>=\"number\">95</span>;\n        <span class=\"keyword\">if</span> (score &lt; <span <span class=\"keyword\">class</span>=\"number\">0</span> || score &gt; <span <span class=\"keyword\">class</span>=\"number\">100</span>) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"分数无效！\"</span>);\n        } <span class=\"keyword\">else</span> {\n            <span class=\"keyword\">char</span> grade;\n            <span class=\"keyword\">if</span> (score &gt;= <span <span class=\"keyword\">class</span>=\"number\">90</span>) grade = <span <span class=\"keyword\">class</span>='string'>\\'A\\'</span>;\n            <span class=\"keyword\">else</span> <span class=\"keyword\">if</span> (score &gt;= <span <span class=\"keyword\">class</span>=\"number\">80</span>) grade = <span <span class=\"keyword\">class</span>='string'>\\'B\\'</span>;\n            <span class=\"keyword\">else</span> <span class=\"keyword\">if</span> (score &gt;= <span <span class=\"keyword\">class</span>=\"number\">70</span>) grade = <span <span class=\"keyword\">class</span>='string'>\\'C\\'</span>;\n            <span class=\"keyword\">else</span> <span class=\"keyword\">if</span> (score &gt;= <span <span class=\"keyword\">class</span>=\"number\">60</span>) grade = <span <span class=\"keyword\">class</span>='string'>\\'D\\'</span>;\n            <span class=\"keyword\">else</span> grade = <span <span class=\"keyword\">class</span>='string'>\\'F\\'</span>;\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"分数: \"</span> + score);\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"等级: \"</span> + grade);\n            <span class=\"keyword\">if</span> (score == <span <span class=\"keyword\">class</span>=\"number\">100</span>) <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"完美！\"</span>);\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>== 比较字符串</strong></td><td>用==比较String会得到false，因为比较的是地址</td><td>比较字符串内容永远用equals()</td></tr><tr><td><strong>switch忘写break</strong></td><td>老版switch里忘写break会导致\"穿透\"到下一个case</td><td>要么写break，要么用Java 14+的箭头语法</td></tr><tr><td><strong>浮点数比较</strong></td><td>直接用==比较double可能永远不相等</td><td>用Math.abs(a - b) < 0.0001判断</td></tr><tr><td><strong>自增运算符位置</strong></td><td>i++和++i在赋值时结果不同</td><td>单独使用时一样，赋值时注意：int a = i++; // a先取旧值</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>实现一个\"猜数字\"小游戏：随机生成1-100的数字，玩家猜测后提示\"太大了\"或\"太小了\"，直到猜中，输出猜测次数</li><li>用循环打印九九乘法表（格式要整齐）</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第4课：数组与方法 —— 批量用户积分计算。我们将学习Java数组的声明遍历和方法的定义重载。</div>"
},
{
    id: 4,
    week: 1,
    title: "数组与方法 —— 批量用户积分计算",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握Java数组的声明、初始化、遍历方式</li><li>理解方法（函数）的定义、调用和返回值</li><li>掌握方法重载的概念和使用场景</li><li>理解值传递 vs 引用传递的区别</li><li>能够编写批量处理数据的工具方法</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第3课，掌握运算符和控制流</li><li>熟悉JavaScript的数组和函数定义</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Java数组：比JS数组更\"纯粹\"</h3><p>JavaScript的数组是个万能容器：长度可变、类型混杂、自带一堆方法（push、pop、map、filter）。Java的数组则规矩得多：</p><ul><li>声明时必须指定长度（且长度固定不变）</li><li>所有元素必须是同一类型</li><li>没有内置的push/pop等方法</li></ul><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">数组声明与使用</span></div><code><span class=\"comment\">// JavaScript</span>\nlet scores = [<span <span class=\"keyword\">class</span>=\"number\">85</span>, <span <span class=\"keyword\">class</span>=\"number\">90</span>, <span <span class=\"keyword\">class</span>=\"number\">78</span>];\nscores.push(95);  <span class=\"comment\">// 随意添加</span>\n\n<span class=\"comment\">// Java</span>\nint[] scores = new int[3];  <span class=\"comment\">// 必须先指定长度！</span>\nscores[<span <span class=\"keyword\">class</span>=\"number\">0</span>] = <span <span class=\"keyword\">class</span>=\"number\">85</span>;\nscores[<span <span class=\"keyword\">class</span>=\"number\">1</span>] = <span <span class=\"keyword\">class</span>=\"number\">90</span>;\nscores[<span <span class=\"keyword\">class</span>=\"number\">2</span>] = <span <span class=\"keyword\">class</span>=\"number\">78</span>;\n<span class=\"comment\">// scores[3] = 95; // 报错！数组越界</span>\n\nint[] scores2 = {85, 90, 78};  <span class=\"comment\">// 简洁初始化</span>\nSystem.out.println(scores.length);  <span class=\"comment\">// 注意是属性，不是方法！</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JavaScript数组像是一个<strong>可伸缩的折叠收纳箱</strong>，随时能塞东西、拿东西、变大变小。Java数组像是一个<strong>固定大小的快递柜</strong>，有多少格子一开始就定好了，你不能后期加格子，只能换个大柜子（创建新数组）。</div><h3>2. 方法定义：Java的\"函数\"</h3><p>Java里没有\"函数\"这个说法，只有\"方法\"——必须定义在类里面。这和JavaScript的函数可以独立存在完全不同。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">方法定义对比</span></div><code><span class=\"comment\">// JavaScript</span>\nfunction <span class=\"func\">add</span>(a, b) {\n    <span class=\"keyword\">return</span> a + b;\n}\n\n<span class=\"comment\">// Java</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> <span class=\"func\">add</span>(<span class=\"keyword\">int</span> a, <span class=\"keyword\">int</span> b) {\n    <span class=\"keyword\">return</span> a + b;\n}</code></div><p>Java方法的完整格式：<code class='inline'>修饰符 返回类型 方法名(参数列表) { 方法体 }</code></p><h3>3. 方法重载：同名不同参</h3><p>Java允许同一个类里定义多个同名方法，只要<strong>参数个数或类型不同</strong>就行。这叫方法重载（Overload）。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">方法重载</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> <span class=\"func\">add</span>(<span class=\"keyword\">int</span> a, <span class=\"keyword\">int</span> b) {\n    <span class=\"keyword\">return</span> a + b;\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">double</span> <span class=\"func\">add</span>(<span class=\"keyword\">double</span> a, <span class=\"keyword\">double</span> b) {\n    <span class=\"keyword\">return</span> a + b;\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> <span class=\"func\">add</span>(<span class=\"keyword\">int</span> a, <span class=\"keyword\">int</span> b, <span class=\"keyword\">int</span> c) {\n    <span class=\"keyword\">return</span> a + b + c;\n}\n\nadd(1, 2);       <span class=\"comment\">// 调第一个</span>\nadd(1.5, 2.5);   <span class=\"comment\">// 调第二个</span>\nadd(1, 2, 3);    <span class=\"comment\">// 调第三个</span></code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>这就像前端里你写了一个<code class='inline'>formatDate()</code>工具函数，可以接收Date对象、时间戳字符串、或者年月日三个数字——同一个名字，不同的\"入口\"，内部逻辑各自处理。Java的方法重载就是把这个概念正式化了。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserPointsCalculator.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserPointsCalculator {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">int</span>[] userPoints = {<span <span class=\"keyword\">class</span>=\"number\">120</span>, <span <span class=\"keyword\">class</span>=\"number\">350</span>, <span <span class=\"keyword\">class</span>=\"number\">80</span>, <span <span class=\"keyword\">class</span>=\"number\">560</span>, <span <span class=\"keyword\">class</span>=\"number\">210</span>};\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"原始积分: \"</span> + <span class=\"func\">arrayToString</span>(userPoints));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"总积分: \"</span> + <span class=\"func\">sum</span>(userPoints));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"平均分: \"</span> + <span class=\"func\">average</span>(userPoints));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"最高分: \"</span> + <span class=\"func\">max</span>(userPoints));\n        <span class=\"func\">addBonus</span>(userPoints, <span <span class=\"keyword\">class</span>=\"number\">50</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"加奖励后: \"</span> + <span class=\"func\">arrayToString</span>(userPoints));\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> <span class=\"func\">sum</span>(<span class=\"keyword\">int</span>[] arr) {\n        <span class=\"keyword\">int</span> total = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> num : arr) total += num;\n        <span class=\"keyword\">return</span> total;\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">double</span> <span class=\"func\">average</span>(<span class=\"keyword\">int</span>[] arr) {\n        <span class=\"keyword\">return</span> (<span class=\"keyword\">double</span>) <span class=\"func\">sum</span>(arr) / arr.length;\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> <span class=\"func\">max</span>(<span class=\"keyword\">int</span>[] arr) {\n        <span class=\"keyword\">int</span> m = arr[<span <span class=\"keyword\">class</span>=\"number\">0</span>];\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> num : arr) <span class=\"keyword\">if</span> (num &gt; m) m = num;\n        <span class=\"keyword\">return</span> m;\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">addBonus</span>(<span class=\"keyword\">int</span>[] arr, <span class=\"keyword\">int</span> bonus) {\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; arr.length; i++) arr[i] += bonus;\n    }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">String</span> <span class=\"func\">arrayToString</span>(<span class=\"keyword\">int</span>[] arr) {\n        <span class=\"type\">StringBuilder</span> sb = <span class=\"keyword\">new</span> <span class=\"type\">StringBuilder</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[\"</span>);\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; arr.length; i++) {\n            sb.<span class=\"func\">append</span>(arr[i]);\n            <span class=\"keyword\">if</span> (i &lt; arr.length - <span <span class=\"keyword\">class</span>=\"number\">1</span>) sb.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\", \"</span>);\n        }\n        sb.<span class=\"func\">append</span>(<span <span class=\"keyword\">class</span>=\"string\">\"]\"</span>);\n        <span class=\"keyword\">return</span> sb.<span class=\"func\">toString</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><p><strong>练习目标</strong>：实现数组工具类。</p><ol><li>写一个<code class='inline'>reverse(int[] arr)</code>方法，反转数组元素顺序</li><li>写一个<code class='inline'>findIndex(int[] arr, int target)</code>方法，查找目标值的索引，找不到返回-1</li><li>写一个<code class='inline'>isSorted(int[] arr)</code>方法，判断数组是否升序排列</li></ol><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">参考答案</span></div><code><span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">reverse</span>(<span class=\"keyword\">int</span>[] arr) {\n    <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; arr.length / <span <span class=\"keyword\">class</span>=\"number\">2</span>; i++) {\n        <span class=\"keyword\">int</span> temp = arr[i];\n        arr[i] = arr[arr.length - <span <span class=\"keyword\">class</span>=\"number\">1</span> - i];\n        arr[arr.length - <span <span class=\"keyword\">class</span>=\"number\">1</span> - i] = temp;\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">int</span> <span class=\"func\">findIndex</span>(<span class=\"keyword\">int</span>[] arr, <span class=\"keyword\">int</span> target) {\n    <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; arr.length; i++) {\n        <span class=\"keyword\">if</span> (arr[i] == target) <span class=\"keyword\">return</span> i;\n    }\n    <span class=\"keyword\">return</span> -<span <span class=\"keyword\">class</span>=\"number\">1</span>;\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">boolean</span> <span class=\"func\">isSorted</span>(<span class=\"keyword\">int</span>[] arr) {\n    <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">1</span>; i &lt; arr.length; i++) {\n        <span class=\"keyword\">if</span> (arr[i] &lt; arr[i - <span <span class=\"keyword\">class</span>=\"number\">1</span>]) <span class=\"keyword\">return</span> <span class=\"keyword\">false</span>;\n    }\n    <span class=\"keyword\">return</span> <span class=\"keyword\">true</span>;\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>数组越界</strong></td><td>访问scores[5]但数组只有3个元素</td><td>访问前检查索引范围</td></tr><tr><td><strong>数组长度是属性</strong></td><td>写arr.length()会报错</td><td>数组用.length，字符串用.length()</td></tr><tr><td><strong>数组不能直接打印</strong></td><td>打印数组得到的是地址</td><td>用Arrays.toString(arr)或手动遍历</td></tr><tr><td><strong>基本类型数组是引用传递</strong></td><td>方法里修改数组元素会影响原数组</td><td>理解引用传递的本质</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📚</span>📚 课后作业</div><ol><li>实现冒泡排序算法，对int数组进行升序排列</li><li>写一个方法，合并两个已排序的数组成一个有序数组</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第5课：周实战 —— 命令行用户注册校验工具。综合运用本周知识，做一个带输入校验的CLI注册程序。</div>"
},
{
    id: 5,
    week: 1,
    title: "周实战：命令行用户注册校验工具",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>综合运用第1-4课的所有知识</li><li>实现一个带输入校验的命令行交互程序</li><li>理解Scanner类的使用（命令行输入）</li><li>掌握简单的字符串校验逻辑</li><li>体验从零开始完成一个小项目的完整流程</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📋</span>📋 前置知识</div><ul><li>已完成第1-4课</li><li>熟悉变量、控制流、数组、方法的使用</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Scanner：Java的命令行输入工具</h3><p>在JavaScript的Node.js里，你可以用<code class='inline'>readline</code>或<code class='inline'>prompt-sync</code>来获取用户输入。Java里对应的工具是<code class='inline'>java.util.Scanner</code>。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">Scanner基本用法</span></div><code><span class=\"keyword\">import</span> java.util.<span class=\"type\">Scanner</span>;\n\n<span class=\"type\">Scanner</span> scanner = <span class=\"keyword\">new</span> <span class=\"type\">Scanner</span>(<span class=\"type\">System</span>.in);\n<span class=\"type\">System</span>.out.<span class=\"func\">print</span>(<span <span class=\"keyword\">class</span>=\"string\">\"请输入用户名: \"</span>);\n<span class=\"keyword\">String</span> username = scanner.<span class=\"func\">nextLine</span>();\n<span class=\"type\">System</span>.out.<span class=\"func\">print</span>(<span <span class=\"keyword\">class</span>=\"string\">\"请输入年龄: \"</span>);\n<span class=\"keyword\">int</span> age = scanner.<span class=\"func\">nextInt</span>();\nscanner.<span class=\"func\">close</span>();</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Scanner就像前端里的<code class='inline'>window.prompt()</code>或者Node.js的<code class='inline'>readline.question()</code>——它帮你在控制台里等用户打字，然后把打的内容存到变量里。</div><h3>2. 字符串常用方法</h3><p>Java的String有很多实用的方法，和JavaScript的字符串方法一一对应：</p><table class=\"compare-table\"><tr><th>功能</th><th>JavaScript</th><th>Java</th></tr><tr><td>获取长度</td><td>str.length</td><td>str.length()</td></tr><tr><td>截取子串</td><td>str.slice(0,5)</td><td>str.substring(0,5)</td></tr><tr><td>查找索引</td><td>str.indexOf('a')</td><td>str.indexOf(\"a\")</td></tr><tr><td>去掉空白</td><td>str.trim()</td><td>str.trim()</td></tr><tr><td>是否包含</td><td>str.includes('a')</td><td>str.contains(\"a\")</td></tr><tr><td>替换</td><td>str.replace('a','b')</td><td>str.replace(\"a\",\"b\")</td></tr><tr><td>转大小写</td><td>str.toUpperCase()</td><td>str.toUpperCase()</td></tr><tr><td>分割</td><td>str.split(',')</td><td>str.split(\",\")</td></tr></table></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><p>我们来实现一个命令行用户注册校验工具：</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserRegistrationCLI.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.<span class=\"type\">Scanner</span>;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserRegistrationCLI {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"type\">Scanner</span> scanner = <span class=\"keyword\">new</span> <span class=\"type\">Scanner</span>(<span class=\"type\">System</span>.in);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"===== 用户注册系统 =====\"</span>);\n        \n        <span class=\"keyword\">String</span> username;\n        <span class=\"keyword\">while</span> (<span class=\"keyword\">true</span>) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">print</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span class=\"func\">请输入用户名</span>(<span <span class=\"keyword\">class</span>=\"number\">3</span>-20位字母数字): \"</span>);\n            username = scanner.<span class=\"func\">nextLine</span>().<span class=\"func\">trim</span>();\n            <span class=\"keyword\">if</span> (<span class=\"func\">isValidUsername</span>(username)) <span class=\"keyword\">break</span>;\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户名不合法，请重新输入！\"</span>);\n        }\n        \n        <span class=\"keyword\">String</span> password;\n        <span class=\"keyword\">while</span> (<span class=\"keyword\">true</span>) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">print</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span class=\"func\">请输入密码</span>(至少6位): \"</span>);\n            password = scanner.<span class=\"func\">nextLine</span>();\n            <span class=\"keyword\">if</span> (password.<span class=\"func\">length</span>() &gt;= <span <span class=\"keyword\">class</span>=\"number\">6</span>) <span class=\"keyword\">break</span>;\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"密码太短，请重新输入！\"</span>);\n        }\n        \n        <span class=\"keyword\">int</span> age;\n        <span class=\"keyword\">while</span> (<span class=\"keyword\">true</span>) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">print</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span class=\"func\">请输入年龄</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>-<span <span class=\"keyword\">class</span>=\"number\">150</span>): \"</span>);\n            <span class=\"keyword\">String</span> ageInput = scanner.<span class=\"func\">nextLine</span>();\n            <span class=\"keyword\">try</span> {\n                age = <span class=\"type\">Integer</span>.<span class=\"func\">parseInt</span>(ageInput);\n                <span class=\"keyword\">if</span> (age &gt;= <span <span class=\"keyword\">class</span>=\"number\">1</span> &amp;&amp; age &lt;= <span <span class=\"keyword\">class</span>=\"number\">150</span>) <span class=\"keyword\">break</span>;\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"年龄超出范围！\"</span>);\n            } <span class=\"keyword\">catch</span> (NumberFormatException e) {\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"请输入数字！\"</span>);\n            }\n        }\n        \n        <span class=\"keyword\">String</span> phone;\n        <span class=\"keyword\">while</span> (<span class=\"keyword\">true</span>) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">print</span>(<span <span class=\"keyword\">class</span>=\"string\">\"请输入手机号: \"</span>);\n            phone = scanner.<span class=\"func\">nextLine</span>().<span class=\"func\">trim</span>();\n            <span class=\"keyword\">if</span> (<span class=\"func\">isValidPhone</span>(phone)) <span class=\"keyword\">break</span>;\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"手机号格式不正确！\"</span>);\n        }\n        \n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"\\n===== 注册成功 =====\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户名: \"</span> + username);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"年龄: \"</span> + age);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println
