ring</span> message, T data) {\n        <span class=\"keyword\">this</span>.code = code; <span class=\"keyword\">this</span>.message = message; <span class=\"keyword\">this</span>.data = data;\n    }\n    <span class=\"keyword\">static</span> &lt;T&gt; ApiResponse&lt;T&gt; <span class=\"func\">ok</span>(T data) { <span class=\"keyword\">return</span> <span class=\"keyword\">new</span> ApiResponse&lt;&gt;(<span <span class=\"keyword\">class</span>=\"number\">200</span>, <span <span class=\"keyword\">class</span>=\"string\">\"ok\"</span>, data); }\n    <span class=\"keyword\">static</span> &lt;T&gt; ApiResponse&lt;T&gt; <span class=\"func\">fail</span>(<span class=\"keyword\">String</span> msg) { <span class=\"keyword\">return</span> <span class=\"keyword\">new</span> ApiResponse&lt;&gt;(<span <span class=\"keyword\">class</span>=\"number\">500</span>, msg, <span class=\"keyword\">null</span>); }\n}\n\n<span class=\"keyword\">class</span> User { <span class=\"keyword\">String</span> name; <span class=\"func\">User</span>(<span class=\"keyword\">String</span> name){ <span class=\"keyword\">this</span>.name=name; } }\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> GenericDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        ApiResponse&lt;User&gt; userResp = ApiResponse.<span class=\"func\">ok</span>(<span class=\"keyword\">new</span> <span class=\"func\">User</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>));\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(userResp.code + <span <span class=\"keyword\">class</span>=\"string\">\" \"</span> + userResp.data.name);\n        \n        ApiResponse&lt;<span class=\"keyword\">String</span>&gt; msgResp = ApiResponse.<span class=\"func\">ok</span>(<span <span class=\"keyword\">class</span>=\"string\">\"操作成功\"</span>);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(msgResp.data);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>写一个泛型工具类Pair&lt;K,V&gt;，存储一对值</li><li>写一个泛型方法swap，交换数组中两个位置的元素</li><li>用泛型封装一个分页结果类PageResult&lt;T&gt;</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>泛型擦除</strong></td><td>运行时泛型类型信息被擦除</td><td>不能用T.class，不能用instanceof T</td></tr><tr><td><strong>基本类型不能作泛型参数</strong></td><td>List<int>报错</td><td>用包装类List<Integer></td></tr><tr><td><strong>泛型数组不能创建</strong></td><td>new T[10]报错</td><td>用List<T>或Object[]代替</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第15课：周实战 —— 购物车数据管理。综合运用集合和泛型，实现完整的购物车。</div>"
},

    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>综合运用List、Map、泛型设计购物车</li><li>实现购物车的增删改查和价格计算</li><li>理解值对象（VO）和领域对象（DO）的区别</li><li>完成一个接近真实业务的购物车模块</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">ShoppingCart.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.*;\n\n<span class=\"keyword\">class</span> CartItem {\n    <span class=\"keyword\">String</span> productId;\n    <span class=\"keyword\">String</span> name;\n    <span class=\"keyword\">double</span> price;\n    <span class=\"keyword\">int</span> quantity;\n    <span class=\"func\">CartItem</span>(<span class=\"keyword\">String</span> id, <span class=\"keyword\">String</span> name, <span class=\"keyword\">double</span> price, <span class=\"keyword\">int</span> qty) {\n        <span class=\"keyword\">this</span>.productId=id; <span class=\"keyword\">this</span>.name=name; <span class=\"keyword\">this</span>.price=price; <span class=\"keyword\">this</span>.quantity=qty;\n    }\n    <span class=\"keyword\">double</span> <span class=\"func\">getSubtotal</span>() { <span class=\"keyword\">return</span> price * quantity; }\n}\n\n<span class=\"keyword\">class</span> ShoppingCart {\n    <span class=\"keyword\">private</span> <span class=\"type\">Map</span>&lt;<span class=\"keyword\">String</span>, CartItem&gt; items = <span class=\"keyword\">new</span> <span class=\"type\">HashMap</span>&lt;&gt;();\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">addItem</span>(CartItem item) {\n        <span class=\"keyword\">if</span> (items.<span class=\"func\">containsKey</span>(item.productId)) {\n            CartItem existing = items.<span class=\"func\">get</span>(item.productId);\n            existing.quantity += item.quantity;\n        } <span class=\"keyword\">else</span> {\n            items.<span class=\"func\">put</span>(item.productId, item);\n        }\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">removeItem</span>(<span class=\"keyword\">String</span> productId) {\n        items.<span class=\"func\">remove</span>(productId);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">updateQuantity</span>(<span class=\"keyword\">String</span> productId, <span class=\"keyword\">int</span> quantity) {\n        <span class=\"keyword\">if</span> (items.<span class=\"func\">containsKey</span>(productId)) {\n            <span class=\"keyword\">if</span> (quantity &lt;= <span <span class=\"keyword\">class</span>=\"number\">0</span>) <span class=\"func\">removeItem</span>(productId);\n            <span class=\"keyword\">else</span> items.<span class=\"func\">get</span>(productId).quantity = quantity;\n        }\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">double</span> <span class=\"func\">getTotal</span>() {\n        <span class=\"keyword\">double</span> total = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n        <span class=\"keyword\">for</span> (CartItem item : items.<span class=\"func\">values</span>()) total += item.<span class=\"func\">getSubtotal</span>();\n        <span class=\"keyword\">return</span> total;\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">display</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"===== 购物车 =====\"</span>);\n        <span class=\"keyword\">for</span> (CartItem item : items.<span class=\"func\">values</span>()) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(item.name + <span <span class=\"keyword\">class</span>=\"string\">\" x\"</span> + item.quantity + <span <span class=\"keyword\">class</span>=\"string\">\" = \"</span> + item.<span class=\"func\">getSubtotal</span>());\n        }\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"总计: \"</span> + <span class=\"func\">getTotal</span>());\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> CartDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        ShoppingCart cart = <span class=\"keyword\">new</span> <span class=\"func\">ShoppingCart</span>();\n        cart.<span class=\"func\">addItem</span>(<span class=\"keyword\">new</span> <span class=\"func\">CartItem</span>(<span <span class=\"keyword\">class</span>=\"string\">\"P001\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"键盘\"</span>, <span <span class=\"keyword\">class</span>=\"number\">299</span>, <span <span class=\"keyword\">class</span>=\"number\">1</span>));\n        cart.<span class=\"func\">addItem</span>(<span class=\"keyword\">new</span> <span class=\"func\">CartItem</span>(<span <span class=\"keyword\">class</span>=\"string\">\"P002\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"鼠标\"</span>, <span <span class=\"keyword\">class</span>=\"number\">99</span>, <span <span class=\"keyword\">class</span>=\"number\">2</span>));\n        cart.addItem(new CartItem(\"P001\", \"键盘\", 299, 1));  <span class=\"comment\">// 合并</span>\n        cart.<span class=\"func\">display</span>();\n        cart.<span class=\"func\">updateQuantity</span>(<span <span class=\"keyword\">class</span>=\"string\">\"P002\"</span>, <span <span class=\"keyword\">class</span>=\"number\">1</span>);\n        cart.<span class=\"func\">display</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>增加满减优惠功能（满300减50）</li><li>增加商品库存校验，不能超库存购买</li><li>实现购物车清空功能</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>购物车商品合并</strong></td><td>同一商品多次添加应该合并数量</td><td>用Map<String, CartItem>以productId为key</td></tr><tr><td><strong>金额计算精度</strong></td><td>double计算有精度问题</td><td>用BigDecimal或转long存分</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第4周：异常、IO与多线程基础。进入更高级的Java特性。</div>"
},
{
    id: 16,
    week: 4,
    title: "异常处理 —— 用户登录失败的各种情况",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解Java异常体系的层级结构</li><li>掌握try-catch-finally的使用</li><li>掌握try-with-resources（自动关闭资源）</li><li>能够自定义业务异常</li><li>学会在真实业务中合理地处理异常</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Java异常体系</h3><p>Java的异常分为两大类：</p><ul><li><strong>Checked Exception（受检异常）</strong>：编译器强制你处理的异常，如IOException、SQLException</li><li><strong>Unchecked Exception（非受检异常）</strong>：运行时异常，如NullPointerException、IllegalArgumentException</li></ul><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">异常处理基本结构</span></div><code><span class=\"keyword\">try</span> {\n    <span class=\"keyword\">int</span> result = <span <span class=\"keyword\">class</span>=\"number\">10</span> / <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n} <span class=\"keyword\">catch</span> (ArithmeticException e) {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"除零错误: \"</span> + e.<span class=\"func\">getMessage</span>());\n} <span class=\"keyword\">finally</span> {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"无论是否异常，这里都会执行\"</span>);\n}</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>Checked Exception就像是<strong>TypeScript的编译时类型检查</strong>——编译器逼你必须处理某些可能出错的情况。Unchecked Exception就像<strong>运行时的JS报错</strong>——逻辑错误，只有跑起来才知道。</div><h3>2. try-with-resources：自动关闭资源</h3><p>Java 7引入的语法糖，自动关闭实现了AutoCloseable接口的资源（如Scanner、FileInputStream、数据库连接等）。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">try-with-resources</span></div><code><span class=\"keyword\">try</span> (<span class=\"type\">Scanner</span> scanner = <span class=\"keyword\">new</span> <span class=\"type\">Scanner</span>(<span class=\"type\">System</span>.in)) {\n    <span class=\"keyword\">String</span> line = scanner.<span class=\"func\">nextLine</span>();\n}  <span class=\"comment\">// scanner会自动关闭，无需手动close()</span></code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">LoginException.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">class</span> LoginException <span class=\"keyword\">extends</span> <span class=\"type\">Exception</span> {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">LoginException</span>(<span class=\"keyword\">String</span> message) { <span class=\"keyword\">super</span>(message); }\n}\n\n<span class=\"keyword\">class</span> UserService {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">login</span>(<span class=\"keyword\">String</span> username, <span class=\"keyword\">String</span> password) <span class=\"keyword\">throws</span> LoginException {\n        <span class=\"keyword\">if</span> (username == <span class=\"keyword\">null</span> || username.<span class=\"func\">isEmpty</span>()) {\n            <span class=\"keyword\">throw</span> <span class=\"keyword\">new</span> <span class=\"func\">LoginException</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户名不能为空\"</span>);\n        }\n        <span class=\"keyword\">if</span> (password == <span class=\"keyword\">null</span> || password.<span class=\"func\">length</span>() &lt; <span <span class=\"keyword\">class</span>=\"number\">6</span>) {\n            <span class=\"keyword\">throw</span> <span class=\"keyword\">new</span> <span class=\"func\">LoginException</span>(<span <span class=\"keyword\">class</span>=\"string\">\"密码不能少于6位\"</span>);\n        }\n        <span class=\"keyword\">if</span> (!username.<span class=\"func\">equals</span>(<span <span class=\"keyword\">class</span>=\"string\">\"admin\"</span>) || !password.<span class=\"func\">equals</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123456</span>\"</span>)) {\n            <span class=\"keyword\">throw</span> <span class=\"keyword\">new</span> <span class=\"func\">LoginException</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户名或密码错误\"</span>);\n        }\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"登录成功！\"</span>);\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> LoginExceptionDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        UserService service = <span class=\"keyword\">new</span> <span class=\"func\">UserService</span>();\n        <span class=\"keyword\">String</span>[][] tests = {{<span <span class=\"keyword\">class</span>=\"string\">\"\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123</span>\"</span>}, {<span <span class=\"keyword\">class</span>=\"string\">\"admin\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"wrong\"</span>}, {<span <span class=\"keyword\">class</span>=\"string\">\"admin\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123456</span>\"</span>}};\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">String</span>[] t : tests) {\n            <span class=\"keyword\">try</span> {\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"尝试登录: \"</span> + t[<span <span class=\"keyword\">class</span>=\"number\">0</span>]);\n                service.<span class=\"func\">login</span>(t[<span <span class=\"keyword\">class</span>=\"number\">0</span>], t[<span <span class=\"keyword\">class</span>=\"number\">1</span>]);\n            } <span class=\"keyword\">catch</span> (LoginException e) {\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"登录失败: \"</span> + e.<span class=\"func\">getMessage</span>());\n            }\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>自定义一个BusinessException，包含错误码和错误信息</li><li>写一个方法解析数字字符串，处理NumberFormatException并返回默认值</li><li>用try-with-resources读取文件内容</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>吞掉异常</strong></td><td>catch里什么都不做</td><td>至少打印日志，最好抛出新异常</td></tr><tr><td><strong>在finally里return</strong></td><td>会覆盖try里的return值</td><td>避免在finally里return</td></tr><tr><td><strong>捕获Exception太宽泛</strong></td><td>catch(Exception e)捕获所有异常</td><td>尽量捕获具体异常类型</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第17课：文件IO —— 读写配置文件与CSV导出。学习Java的文件操作。</div>"
},
{
    id: 17,
    week: 4,
    title: "文件IO —— 读写配置文件与CSV导出",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握File类的使用</li><li>理解字节流和字符流的区别</li><li>掌握BufferedReader/BufferedWriter的高效读写</li><li>能够读写配置文件和导出CSV</li><li>熟练使用try-with-resources管理流</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 字节流 vs 字符流</h3><ul><li><strong>字节流（InputStream/OutputStream）</strong>：以字节为单位，适合二进制文件（图片、视频）</li><li><strong>字符流（Reader/Writer）</strong>：以字符为单位，适合文本文件，自动处理编码</li></ul><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>字节流就像<strong>原始的二进制数据传输</strong>（WebSocket的ArrayBuffer），字符流就像<strong>已经解码好的文本</strong>（JSON字符串）。处理文本文件时，优先用字符流。</div><h3>2. 常用IO类</h3><ul><li>FileReader/FileWriter：基本字符流</li><li>BufferedReader/BufferedWriter：带缓冲的字符流（更快）</li><li>InputStreamReader/OutputStreamWriter：字节流转字符流的桥梁</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">FileDemo.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.io.*;\n<span class=\"keyword\">import</span> java.nio.file.*;\n<span class=\"keyword\">import</span> java.util.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> FileDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) <span class=\"keyword\">throws</span> IOException {\n        <span class=\"comment\">// 写配置文件</span>\n        Properties props = <span class=\"keyword\">new</span> <span class=\"func\">Properties</span>();\n        props.<span class=\"func\">setProperty</span>(<span <span class=\"keyword\">class</span>=\"string\">\"app.name\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"电商系统\"</span>);\n        props.<span class=\"func\">setProperty</span>(<span <span class=\"keyword\">class</span>=\"string\">\"app.version\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">1.0</span>\"</span>);\n        <span class=\"keyword\">try</span> (<span class=\"type\">OutputStream</span> out = <span class=\"keyword\">new</span> <span class=\"func\">FileOutputStream</span>(<span <span class=\"keyword\">class</span>=\"string\">\"app.properties\"</span>)) {\n            props.<span class=\"func\">store</span>(out, <span <span class=\"keyword\">class</span>=\"string\">\"Application Config\"</span>);\n        }\n        \n        <span class=\"comment\">// 读配置文件</span>\n        Properties readProps = <span class=\"keyword\">new</span> <span class=\"func\">Properties</span>();\n        <span class=\"keyword\">try</span> (<span class=\"type\">InputStream</span> in = <span class=\"keyword\">new</span> <span class=\"func\">FileInputStream</span>(<span <span class=\"keyword\">class</span>=\"string\">\"app.properties\"</span>)) {\n            readProps.<span class=\"func\">load</span>(in);\n        }\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"应用名: \"</span> + readProps.<span class=\"func\">getProperty</span>(<span <span class=\"keyword\">class</span>=\"string\">\"app.name\"</span>));\n        \n        <span class=\"comment\">// 导出CSV</span>\n        <span class=\"type\">List</span>&lt;<span class=\"keyword\">String</span>[]&gt; users = <span class=\"type\">Arrays</span>.<span class=\"func\">asList</span>(\n            <span class=\"keyword\">new</span> <span class=\"keyword\">String</span>[]{<span <span class=\"keyword\">class</span>=\"string\">\"ID\"</span>,<span <span class=\"keyword\">class</span>=\"string\">\"姓名\"</span>,<span <span class=\"keyword\">class</span>=\"string\">\"年龄\"</span>},\n            <span class=\"keyword\">new</span> <span class=\"keyword\">String</span>[]{<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">1</span>\"</span>,<span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>,<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">25</span>\"</span>},\n            <span class=\"keyword\">new</span> <span class=\"keyword\">String</span>[]{<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">2</span>\"</span>,<span <span class=\"keyword\">class</span>=\"string\">\"Bob\"</span>,<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">30</span>\"</span>}\n        );\n        <span class=\"keyword\">try</span> (BufferedWriter writer = Files.<span class=\"func\">newBufferedWriter</span>(Paths.<span class=\"func\">get</span>(<span <span class=\"keyword\">class</span>=\"string\">\"users.csv\"</span>))) {\n            <span class=\"keyword\">for</span> (<span class=\"keyword\">String</span>[] row : users) {\n                writer.<span class=\"func\">write</span>(<span class=\"keyword\">String</span>.<span class=\"func\">join</span>(<span <span class=\"keyword\">class</span>=\"string\">\",\"</span>, row));\n                writer.<span class=\"func\">newLine</span>();\n            }\n        }\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"CSV导出成功！\"</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>读取一个文本文件，统计行数和字符数</li><li>实现文件复制功能（字节流）</li><li>读取CSV文件并解析成对象列表</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>没关闭流</strong></td><td>导致文件句柄泄漏</td><td>用try-with-resources自动关闭</td></tr><tr><td><strong>编码问题</strong></td><td>读取文件出现乱码</td><td>指定编码：new InputStreamReader(in, StandardCharsets.UTF_8)</td></tr><tr><td><strong>路径分隔符</strong></td><td>Windows用\\\\，Linux用/</td><td>用File.separator或Paths.get()</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第18课：多线程基础 —— 异步发送通知。学习Thread和线程池入门。</div>"
},
{

    week: 4,
    title: "多线程基础 —— 异步发送短信/邮件通知",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解进程和线程的区别</li><li>掌握Thread类和Runnable接口创建线程</li><li>理解线程的生命周期</li><li>掌握线程池的基本使用（Executors）</li><li>能够实现简单的异步任务</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 线程是什么？</h3><p>线程是程序执行的最小单位。一个进程可以包含多个线程，它们共享进程的内存空间，但各自独立执行。</p><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>进程就像<strong>一个工厂</strong>，线程就像<strong>工厂里的工人</strong>。一个工厂可以有多个工人同时干活，他们共享工厂的设备（内存），但各自做不同的任务。多线程就是让多个工人同时工作，提高效率。</div><h3>2. 创建线程的两种方式</h3><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">创建线程</span></div><code><span class=\"comment\">// 方式1：继承Thread类</span>\n<span class=\"keyword\">class</span> MyThread <span class=\"keyword\">extends</span> <span class=\"type\">Thread</span> {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">run</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"线程运行中...\"</span>);\n    }\n}\nMyThread t1 = <span class=\"keyword\">new</span> <span class=\"func\">MyThread</span>();\nt1.<span class=\"func\">start</span>();\n\n<span class=\"comment\">// 方式2：实现Runnable接口（推荐！）</span>\n<span class=\"keyword\">class</span> MyTask <span class=\"keyword\">implements</span> <span class=\"type\">Runnable</span> {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">run</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"任务运行中...\"</span>);\n    }\n}\n<span class=\"type\">Thread</span> t2 = <span class=\"keyword\">new</span> <span class=\"type\">Thread</span>(<span class=\"keyword\">new</span> <span class=\"func\">MyTask</span>());\nt2.<span class=\"func\">start</span>();\n\n<span class=\"comment\">// 方式2的Lambda简化</span>\n<span class=\"keyword\">new</span> <span class=\"type\">Thread</span>(() -&gt; <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"Lambda线程\"</span>)).<span class=\"func\">start</span>();</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>推荐用Runnable方式，因为Java是单继承，继承了Thread就不能继承其他类了。而且Runnable更适合线程池。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">NotificationService.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.concurrent.*;\n\n<span class=\"keyword\">class</span> SmsTask <span class=\"keyword\">implements</span> <span class=\"type\">Runnable</span> {\n    <span class=\"keyword\">private</span> <span class=\"keyword\">String</span> phone;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"func\">SmsTask</span>(<span class=\"keyword\">String</span> phone) { <span class=\"keyword\">this</span>.phone = phone; }\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">run</span>() {\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[\"</span> + <span class=\"type\">Thread</span>.<span class=\"func\">currentThread</span>().<span class=\"func\">getName</span>() + <span <span class=\"keyword\">class</span>=\"string\">\"] 发送短信到: \"</span> + phone);\n        <span class=\"keyword\">try</span> { <span class=\"type\">Thread</span>.<span class=\"func\">sleep</span>(<span <span class=\"keyword\">class</span>=\"number\">500</span>); } <span class=\"keyword\">catch</span> (InterruptedException e) {}\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"短信发送完成: \"</span> + phone);\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> NotificationService {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"comment\">// 创建固定大小的线程池</span>\n        ExecutorService executor = Executors.<span class=\"func\">newFixedThreadPool</span>(<span <span class=\"keyword\">class</span>=\"number\">3</span>);\n        \n        <span class=\"keyword\">String</span>[] phones = {<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">13800138000</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">13900139000</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">13700137000</span>\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">13600136000</span>\"</span>};\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">String</span> phone : phones) {\n            executor.<span class=\"func\">submit</span>(<span class=\"keyword\">new</span> <span class=\"func\">SmsTask</span>(phone));\n        }\n        \n        executor.<span class=\"func\">shutdown</span>();\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"所有任务已提交\"</span>);\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>用多线程同时下载3个文件（用sleep模拟下载时间）</li><li>用ScheduledExecutorService实现定时任务（每秒打印当前时间）</li><li>对比单线程和多线程处理批量任务的效率</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>调用run而非start</strong></td><td>thread.run()只是普通方法调用，不会启动新线程</td><td>必须用thread.start()</td></tr><tr><td><strong>线程池未关闭</strong></td><td>程序不会退出</td><td>用完调用shutdown()</td></tr><tr><td><strong>共享变量不加锁</strong></td><td>多线程修改同一变量导致数据混乱</td><td>下节课学同步机制</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第19课：线程安全与同步基础。学习synchronized和原子类。</div>"
},
{
    id: 19,
    week: 4,
    title: "线程安全与同步基础 —— 秒杀场景库存扣减",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解线程安全问题的原因</li><li>掌握synchronized关键字的使用</li><li>了解原子类（AtomicInteger等）</li><li>理解volatile的作用和局限</li><li>能够编写简单的线程安全代码</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 什么是线程安全问题？</h3><p>当多个线程同时访问共享数据，并且至少有一个线程在修改数据时，就可能出现数据不一致的问题。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">线程不安全的例子</span></div><code><span class=\"keyword\">class</span> Counter {\n    <span class=\"keyword\">int</span> count = <span <span class=\"keyword\">class</span>=\"number\">0</span>;\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">increment</span>() {\n        count++;  <span class=\"comment\">// 实际上这是3步操作：读、加、写</span>\n    }\n}\n<span class=\"comment\">// 两个线程同时执行increment，结果可能小于预期！</span></code></div><h3>2. synchronized：给方法加锁</h3><p>synchronized关键字可以确保同一时间只有一个线程执行某段代码。</p><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">synchronized用法</span></div><code><span class=\"comment\">// 同步方法</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> synchronized <span class=\"keyword\">void</span> <span class=\"func\">increment</span>() {\n    count++;\n}\n\n<span class=\"comment\">// 同步代码块（更灵活）</span>\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">increment</span>() {\n    <span class=\"func\">synchronized</span>(<span class=\"keyword\">this</span>) {\n        count++;\n    }\n}</code></div><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>synchronized就像<strong>厕所的门锁</strong>——一个人进去后把门锁上，其他人必须等里面的人出来才能进去。这样可以保证同一时刻只有一个人在使用共享资源。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">SecKillDemo.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.concurrent.*;\n<span class=\"keyword\">import</span> java.util.concurrent.atomic.AtomicInteger;\n\n<span class=\"keyword\">class</span> SecKillService {\n    <span class=\"keyword\">private</span> AtomicInteger stock = <span class=\"keyword\">new</span> <span class=\"func\">AtomicInteger</span>(<span <span class=\"keyword\">class</span>=\"number\">100</span>);\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">boolean</span> <span class=\"func\">buy</span>() {\n        <span class=\"keyword\">int</span> current = stock.<span class=\"func\">get</span>();\n        <span class=\"keyword\">if</span> (current &lt;= <span <span class=\"keyword\">class</span>=\"number\">0</span>) <span class=\"keyword\">return</span> <span class=\"keyword\">false</span>;\n        <span class=\"keyword\">return</span> stock.<span class=\"func\">compareAndSet</span>(current, current - <span <span class=\"keyword\">class</span>=\"number\">1</span>);\n    }\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">int</span> <span class=\"func\">getStock</span>() { <span class=\"keyword\">return</span> stock.<span class=\"func\">get</span>(); }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> SecKillDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) <span class=\"keyword\">throws</span> InterruptedException {\n        SecKillService service = <span class=\"keyword\">new</span> <span class=\"func\">SecKillService</span>();\n        ExecutorService executor = Executors.<span class=\"func\">newFixedThreadPool</span>(<span <span class=\"keyword\">class</span>=\"number\">10</span>);\n        \n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; <span <span class=\"keyword\">class</span>=\"number\">150</span>; i++) {\n            executor.<span class=\"func\">submit</span>(() -&gt; {\n                <span class=\"keyword\">boolean</span> success = service.<span class=\"func\">buy</span>();\n                <span class=\"keyword\">if</span> (success) {\n                    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span class=\"type\">Thread</span>.<span class=\"func\">currentThread</span>().<span class=\"func\">getName</span>() + <span <span class=\"keyword\">class</span>=\"string\">\" 抢购成功！\"</span>);\n                }\n            });\n        }\n        \n        executor.<span class=\"func\">shutdown</span>();\n        executor.<span class=\"func\">awaitTermination</span>(<span <span class=\"keyword\">class</span>=\"number\">5</span>, TimeUnit.SECONDS);\n        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"剩余库存: \"</span> + service.<span class=\"func\">getStock</span>());\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>用synchronized实现一个线程安全的计数器</li><li>对比synchronized和AtomicInteger的性能差异</li><li>写一个线程安全的单例模式</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>锁的对象不对</strong></td><td>synchronized(new Object())每次锁都不一样</td><td>锁同一个共享对象</td></tr><tr><td><strong>死锁</strong></td><td>A锁1等2，B锁2等1</td><td>保持加锁顺序一致</td></tr><tr><td><strong>过度同步</strong></td><td>所有方法都加synchronized</td><td>只在必要的地方加锁</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第20课：周实战 —— 多线程批量处理用户导入。综合运用IO和多线程。</div>"
},
{
    id: 20,
    week: 4,
    title: "周实战：多线程批量用户导入",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>综合运用文件IO和多线程</li><li>实现生产者-消费者模型</li><li>掌握BlockingQueue的使用</li><li>完成一个接近真实场景的用户导入系统</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserImport.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.util.concurrent.*;\n\n<span class=\"keyword\">class</span> UserImporter {\n    <span class=\"keyword\">private</span> BlockingQueue&lt;<span class=\"keyword\">String</span>&gt; queue = <span class=\"keyword\">new</span> LinkedBlockingQueue&lt;&gt;(<span <span class=\"keyword\">class</span>=\"number\">100</span>);\n    <span class=\"keyword\">private</span> ExecutorService executor = Executors.<span class=\"func\">newFixedThreadPool</span>(<span <span class=\"keyword\">class</span>=\"number\">4</span>);\n    \n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">void</span> <span class=\"func\">start</span>() {\n        <span class=\"comment\">// 生产者：读取文件</span>\n        executor.<span class=\"func\">submit</span>(() -&gt; {\n            <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">1</span>; i &lt;= <span <span class=\"keyword\">class</span>=\"number\">50</span>; i++) {\n                <span class=\"keyword\">try</span> {\n                    queue.<span class=\"func\">put</span>(<span <span class=\"keyword\">class</span>=\"string\">\"user\"</span> + i + <span <span class=\"keyword\">class</span>=\"string\">\"@example.com\"</span>);\n                    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[生产者] 读取: user\"</span> + i);\n                    <span class=\"type\">Thread</span>.<span class=\"func\">sleep</span>(<span <span class=\"keyword\">class</span>=\"number\">50</span>);\n                } <span class=\"keyword\">catch</span> (InterruptedException e) { <span class=\"keyword\">break</span>; }\n            }\n        });\n        \n        <span class=\"comment\">// 消费者：处理数据</span>\n        <span class=\"keyword\">for</span> (<span class=\"keyword\">int</span> i = <span <span class=\"keyword\">class</span>=\"number\">0</span>; i &lt; <span <span class=\"keyword\">class</span>=\"number\">3</span>; i++) {\n            executor.<span class=\"func\">submit</span>(() -&gt; {\n                <span class=\"keyword\">while</span> (<span class=\"keyword\">true</span>) {\n                    <span class=\"keyword\">try</span> {\n                        <span class=\"keyword\">String</span> user = queue.<span class=\"func\">take</span>();\n                        <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"[消费者 \"</span> + <span class=\"type\">Thread</span>.<span class=\"func\">currentThread</span>().<span class=\"func\">getName</span>() + <span <span class=\"keyword\">class</span>=\"string\">\"] 处理: \"</span> + user);\n                        <span class=\"type\">Thread</span>.<span class=\"func\">sleep</span>(<span <span class=\"keyword\">class</span>=\"number\">100</span>);\n                    } <span class=\"keyword\">catch</span> (InterruptedException e) { <span class=\"keyword\">break</span>; }\n                }\n            });\n        }\n        \n        executor.<span class=\"func\">shutdown</span>();\n    }\n}\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserImport {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        <span class=\"keyword\">new</span> <span class=\"func\">UserImporter</span>().<span class=\"func\">start</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>给导入系统增加进度显示（已处理/总数）</li><li>增加错误处理（某条记录处理失败不影响其他记录）</li><li>用CountDownLatch等待所有任务完成</li></ol></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第5周：数据库与JDBC。我们将学习如何用Java操作数据库。</div>"
},
{
    id: 21,
    week: 5,
    title: "JDBC基础 —— 连接MySQL数据库",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解JDBC的作用和架构</li><li>掌握JDBC连接数据库的5个步骤</li><li>学会使用Maven引入数据库驱动</li><li>能够编写最简单的数据库连接程序</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. JDBC是什么？</h3><p>JDBC（Java Database Connectivity）是Java访问数据库的标准API。它为各种关系型数据库提供统一的访问接口，就像前端里<strong>fetch/axios</strong>为HTTP请求提供统一接口一样。</p><h3>2. JDBC的5个基本步骤</h3><ol><li>加载驱动（Class.forName）</li><li>建立连接（DriverManager.getConnection）</li><li>创建执行器（Statement/PreparedStatement）</li><li>执行SQL并获取结果（ResultSet）</li><li>关闭资源（close）</li></ol><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>JDBC就像前端调用API：<code class='inline'>fetch(url)</code> = <code class='inline'>getConnection(url)</code>；发送请求 = 执行SQL；接收JSON = 遍历ResultSet。只不过数据库返回的是行和列，不是JSON对象。</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">JDBC基本步骤</span></div><code><span class=\"comment\">// 1. 加载驱动</span>\nClass.<span class=\"func\">forName</span>(<span <span class=\"keyword\">class</span>=\"string\">\"com.mysql.cj.jdbc.Driver\"</span>);\n\n<span class=\"comment\">// 2. 建立连接</span>\nString url = \"jdbc:mysql:<span class=\"comment\">//localhost:3306/mydb\";</span>\n<span class=\"type\">Connection</span> conn = DriverManager.<span class=\"func\">getConnection</span>(url, <span <span class=\"keyword\">class</span>=\"string\">\"root\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"password\"</span>);\n\n<span class=\"comment\">// 3. 创建Statement</span>\nStatement stmt = conn.<span class=\"func\">createStatement</span>();\n\n<span class=\"comment\">// 4. 执行查询</span>\n<span class=\"type\">ResultSet</span> rs = stmt.<span class=\"func\">executeQuery</span>(<span <span class=\"keyword\">class</span>=\"string\">\"SELECT * FROM users\"</span>);\n<span class=\"keyword\">while</span> (rs.<span class=\"func\">next</span>()) {\n    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(rs.<span class=\"func\">getString</span>(<span <span class=\"keyword\">class</span>=\"string\">\"name\"</span>));\n}\n\n<span class=\"comment\">// 5. 关闭资源</span>\nrs.<span class=\"func\">close</span>(); stmt.<span class=\"func\">close</span>(); conn.<span class=\"func\">close</span>();</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">JdbcDemo.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.sql.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> JdbcDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) {\n        String url = \"jdbc:mysql:<span class=\"comment\">//localhost:3306/test\";</span>\n        <span class=\"keyword\">String</span> user = <span <span class=\"keyword\">class</span>=\"string\">\"root\"</span>;\n        <span class=\"keyword\">String</span> password = <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123456</span>\"</span>;\n        \n        <span class=\"keyword\">try</span> (<span class=\"type\">Connection</span> conn = DriverManager.<span class=\"func\">getConnection</span>(url, user, password)) {\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"连接成功！\"</span>);\n            DatabaseMetaData meta = conn.<span class=\"func\">getMetaData</span>();\n            <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"数据库版本: \"</span> + meta.<span class=\"func\">getDatabaseProductVersion</span>());\n        } <span class=\"keyword\">catch</span> (SQLException e) {\n            <span class=\"type\">System</span>.err.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"连接失败: \"</span> + e.<span class=\"func\">getMessage</span>());\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>下载MySQL驱动jar包，成功连接到本地数据库</li><li>查询数据库中所有表名（DatabaseMetaData.getTables）</li><li>用try-with-resources改写上述连接代码</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>驱动类名写错</strong></td><td>com.mysql.jdbc.Driver已废弃</td><td>用com.mysql.cj.jdbc.Driver</td></tr><tr><td><strong>没关连接</strong></td><td>连接数耗尽导致应用崩溃</td><td>用try-with-resources自动关闭</td></tr><tr><td><strong>时区问题</strong></td><td>连接MySQL8报错</td><td>URL加参数：?serverTimezone=Asia/Shanghai</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第22课：SQL操作 —— CRUD与PreparedStatement。学习增删改查和防止SQL注入。</div>"
},
{
    id: 22,
    week: 5,
    title: "SQL操作 —— CRUD与PreparedStatement",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>掌握Statement和PreparedStatement的区别</li><li>理解SQL注入攻击原理</li><li>熟练使用CRUD操作</li><li>掌握ResultSet的遍历方法</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. Statement vs PreparedStatement</h3><ul><li><strong>Statement</strong>：直接拼接SQL字符串，有SQL注入风险</li><li><strong>PreparedStatement</strong>：预编译SQL，参数化查询，防止SQL注入，性能更好</li></ul><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">SQL注入示例</span></div><code><span class=\"keyword\">String</span> username = request.<span class=\"func\">getParameter</span>(<span <span class=\"keyword\">class</span>=\"string\">\"user\"</span>);\n<span class=\"comment\">// 用户输入：admin' OR '1'='1</span>\n<span class=\"keyword\">String</span> sql = <span <span class=\"keyword\">class</span>=\"string\">\"SELECT * FROM users WHERE name='\"</span> + username + <span <span class=\"keyword\">class</span>=\"string\">\"'\"</span>;\n<span class=\"comment\">// 实际执行的SQL：SELECT * FROM users WHERE name='admin' OR '1'='1'</span>\n<span class=\"comment\">// 结果：绕过了登录验证！</span></code></div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">PreparedStatement防止注入</span></div><code><span class=\"keyword\">String</span> sql = <span <span class=\"keyword\">class</span>=\"string\">\"SELECT * FROM users WHERE name = ? AND password = ?\"</span>;\n<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(sql);\nps.setString(1, username);  <span class=\"comment\">// 自动转义特殊字符</span>\nps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, password);\n<span class=\"type\">ResultSet</span> rs = ps.<span class=\"func\">executeQuery</span>();</code></div><div class=\"tip-box\">💡 <strong>提示：</strong>永远使用PreparedStatement处理用户输入！这是后端开发的安全底线。</div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">UserCrud.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> java.sql.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> UserCrud {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) <span class=\"keyword\">throws</span> SQLException {\n        String url = \"jdbc:mysql:<span class=\"comment\">//localhost:3306/test?serverTimezone=Asia/Shanghai\";</span>\n        <span class=\"keyword\">try</span> (<span class=\"type\">Connection</span> conn = DriverManager.<span class=\"func\">getConnection</span>(url, <span <span class=\"keyword\">class</span>=\"string\">\"root\"</span>, <span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123456</span>\"</span>)) {\n            \n            <span class=\"comment\">// CREATE</span>\n            <span class=\"keyword\">String</span> insert = <span <span class=\"keyword\">class</span>=\"string\">\"INSERT INTO <span class=\"func\">users</span>(name, age) <span class=\"func\">VALUES</span>(?, ?)\"</span>;\n            <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(insert)) {\n                ps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);\n                ps.<span class=\"func\">setInt</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, <span <span class=\"keyword\">class</span>=\"number\">25</span>);\n                ps.<span class=\"func\">executeUpdate</span>();\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"插入成功\"</span>);\n            }\n            \n            <span class=\"comment\">// READ</span>\n            <span class=\"keyword\">String</span> select = <span <span class=\"keyword\">class</span>=\"string\">\"SELECT * FROM users WHERE age &gt; ?\"</span>;\n            <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(select)) {\n                ps.<span class=\"func\">setInt</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"number\">20</span>);\n                <span class=\"type\">ResultSet</span> rs = ps.<span class=\"func\">executeQuery</span>();\n                <span class=\"keyword\">while</span> (rs.<span class=\"func\">next</span>()) {\n                    <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(rs.<span class=\"func\">getInt</span>(<span <span class=\"keyword\">class</span>=\"string\">\"id\"</span>) + <span <span class=\"keyword\">class</span>=\"string\">\": \"</span> + rs.<span class=\"func\">getString</span>(<span <span class=\"keyword\">class</span>=\"string\">\"name\"</span>));\n                }\n            }\n            \n            <span class=\"comment\">// UPDATE</span>\n            <span class=\"keyword\">String</span> update = <span <span class=\"keyword\">class</span>=\"string\">\"UPDATE users SET age = ? WHERE name = ?\"</span>;\n            <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(update)) {\n                ps.<span class=\"func\">setInt</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"number\">26</span>);\n                ps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">2</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);\n                <span class=\"keyword\">int</span> rows = ps.<span class=\"func\">executeUpdate</span>();\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"更新 \"</span> + rows + <span <span class=\"keyword\">class</span>=\"string\">\" 行\"</span>);\n            }\n            \n            <span class=\"comment\">// DELETE</span>\n            <span class=\"keyword\">String</span> delete = <span <span class=\"keyword\">class</span>=\"string\">\"DELETE FROM users WHERE name = ?\"</span>;\n            <span class=\"keyword\">try</span> (<span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(delete)) {\n                ps.<span class=\"func\">setString</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>, <span <span class=\"keyword\">class</span>=\"string\">\"Alice\"</span>);\n                ps.<span class=\"func\">executeUpdate</span>();\n            }\n        }\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>写一个方法，根据ID查询用户信息并返回User对象</li><li>实现批量插入（PreparedStatement.addBatch + executeBatch）</li><li>模拟SQL注入攻击，对比Statement和PreparedStatement的区别</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>参数索引从1开始</strong></td><td>setString(0, ...)会报错</td><td>JDBC参数索引从1开始，不是0</td></tr><tr><td><strong>executeQuery vs executeUpdate</strong></td><td>INSERT用executeQuery会报错</td><td>查询用executeQuery，增删改用executeUpdate</td></tr><tr><td><strong>ResultSet已关闭</strong></td><td>在try块外访问rs</td><td>在try块内完成ResultSet遍历</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第23课：数据库连接池 —— HikariCP。学习高效管理数据库连接。</div>"
},
{
    id: 23,
    week: 5,
    title: "数据库连接池 —— HikariCP",
    duration: "2小时",
    difficulty: "入门级",
    content: "<div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🎯</span>🎯 本课学习目标</div><ul><li>理解为什么需要数据库连接池</li><li>掌握HikariCP的基本配置</li><li>理解连接池的核心参数</li><li>能够在项目中正确使用连接池</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">📖</span>📖 核心概念讲解</div><h3>1. 为什么需要连接池？</h3><p>创建数据库连接是非常耗时的操作（涉及TCP握手、认证等）。如果每个请求都创建新连接，性能会很差。连接池预先创建一批连接，用完归还，复用连接。</p><div class=\"analogy-box\"><div class=\"label\">💡 前端类比</div>连接池就像<strong>共享单车停车点</strong>——车（连接）已经停在那里了，你扫码（borrow）骑走，用完还回停车点（return）。不用每次都去工厂造一辆新车。</div><h3>2. HikariCP：最快的连接池</h3><p>HikariCP是Spring Boot 2.x默认的连接池，以性能著称。核心配置参数：</p><ul><li><strong>jdbcUrl</strong>：数据库地址</li><li><strong>username/password</strong>：用户名密码</li><li><strong>maximumPoolSize</strong>：最大连接数（默认10）</li><li><strong>minimumIdle</strong>：最小空闲连接数</li><li><strong>connectionTimeout</strong>：获取连接等待超时时间</li></ul></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">💻</span>💻 完整可运行代码示例</div><div class=\"code-block\"><div class=\"code-header\"><span class=\"code-title\">HikariDemo.java</span></div><code><span class=\"keyword\">package</span> com.example;\n\n<span class=\"keyword\">import</span> com.zaxxer.hikari.HikariConfig;\n<span class=\"keyword\">import</span> com.zaxxer.hikari.HikariDataSource;\n<span class=\"keyword\">import</span> java.sql.*;\n\n<span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">class</span> HikariDemo {\n    <span <span class=\"keyword\">class</span>=\"keyword\">public</span> <span class=\"keyword\">static</span> <span class=\"keyword\">void</span> <span class=\"func\">main</span>(<span class=\"keyword\">String</span>[] args) <span class=\"keyword\">throws</span> SQLException {\n        HikariConfig config = <span class=\"keyword\">new</span> <span class=\"func\">HikariConfig</span>();\n        config.setJdbcUrl(\"jdbc:mysql:<span class=\"comment\">//localhost:3306/test?serverTimezone=Asia/Shanghai\");</span>\n        config.<span class=\"func\">setUsername</span>(<span <span class=\"keyword\">class</span>=\"string\">\"root\"</span>);\n        config.<span class=\"func\">setPassword</span>(<span <span class=\"keyword\">class</span>=\"string\">\"<span <span class=\"keyword\">class</span>=\"number\">123456</span>\"</span>);\n        config.<span class=\"func\">setMaximumPoolSize</span>(<span <span class=\"keyword\">class</span>=\"number\">10</span>);\n        config.<span class=\"func\">setMinimumIdle</span>(<span <span class=\"keyword\">class</span>=\"number\">5</span>);\n        config.<span class=\"func\">setConnectionTimeout</span>(<span <span class=\"keyword\">class</span>=\"number\">30000</span>);\n        \n        HikariDataSource ds = <span class=\"keyword\">new</span> <span class=\"func\">HikariDataSource</span>(config);\n        \n        <span class=\"keyword\">try</span> (<span class=\"type\">Connection</span> conn = ds.<span class=\"func\">getConnection</span>();\n             <span class=\"type\">PreparedStatement</span> ps = conn.<span class=\"func\">prepareStatement</span>(<span <span class=\"keyword\">class</span>=\"string\">\"SELECT <span class=\"func\">COUNT</span>(*) FROM users\"</span>);\n             <span class=\"type\">ResultSet</span> rs = ps.<span class=\"func\">executeQuery</span>()) {\n            <span class=\"keyword\">if</span> (rs.<span class=\"func\">next</span>()) {\n                <span class=\"type\">System</span>.out.<span class=\"func\">println</span>(<span <span class=\"keyword\">class</span>=\"string\">\"用户总数: \"</span> + rs.<span class=\"func\">getInt</span>(<span <span class=\"keyword\">class</span>=\"number\">1</span>));\n            }\n        }\n        \n        ds.<span class=\"func\">close</span>();\n    }\n}</code></div></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">🛠️</span>🛠️ 本课小练习</div><ol><li>对比直接使用DriverManager和连接池的查询性能（循环查询100次）</li><li>配置一个适合高并发场景的连接池参数</li><li>模拟连接池耗尽的情况</li></ol></div><div class=\"section\"><div class=\"section-title\"><span class=\"icon\">⚠️</span>⚠️ 常见坑点总结</div><table class=\"pitfalls-table\"><tr><th>坑点</th><th>说明</th><th>如何避免</th></tr><tr><td><strong>连接未归还</strong></td><td>从池里借了连接没close</td><td>用完必须close或try-with-resources</td></tr><tr><td><strong>连接池大小设置</strong></td><td>不是越大越好</td><td>通常CPU核数*2+1，根据实际压测调整</td></tr><tr><td><strong>忘记关DataSource</strong></td><td>应用退出时连接没释放</td><td>JVM关闭钩子或Spring管理生命周期</td></tr></table></div><div style=\"margin-top:24px;padding:16px;background:linear-gradient(135deg,#eff6ff,#f5f3ff);border-radius:10px;border-left:4px solid #2563eb;\"><strong style=\"color:#2563eb;\">下节预告：</strong>第24课：事务管理 —— 银行转账场景。学习ACID和事务控制。</div>"
},
